<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字学习 · HSK 1 Character Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f4;
    --bg2: #f2ede4;
    --bg3: #ebe4d8;
    --surface: #ffffff;
    --ink: #1c1410;
    --ink2: #4a3728;
    --ink3: #8a7060;
    --ink4: #b8a898;
    --red: #c0392b;
    --red-bg: #fdf0ee;
    --gold: #9a6f1a;
    --gold-bg: #fdf6e3;
    --green: #2e7d4a;
    --green-bg: #edf7f1;
    --blue: #1a5fa0;
    --blue-bg: #edf4fc;
    --purple: #6b3fa0;
    --purple-bg: #f4eefb;
    --border: rgba(60,40,20,0.1);
    --border2: rgba(60,40,20,0.18);
    --sidebar-w: 320px;
    --header-h: 56px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1612;
      --bg2: #221e19;
      --bg3: #2c271f;
      --surface: #252018;
      --ink: #f0ebe2;
      --ink2: #c8b89a;
      --ink3: #8a7a65;
      --ink4: #5a4e40;
      --border: rgba(255,220,160,0.08);
      --border2: rgba(255,220,160,0.15);
      --red-bg: #2a1410;
      --gold-bg: #241d0a;
      --green-bg: #0d2018;
      --blue-bg: #0d1a2a;
      --purple-bg: #1a0f2a;
    }
  }

  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg); color: var(--ink); display: flex; flex-direction: column; }

  /* ── Header ── */
  .app-header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    gap: 10px;
    flex-shrink: 0;
    z-index: 10;
  }
  .logo { display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
  .logo-cn { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: 0.05em; }
  .logo-sep { width: 1px; height: 18px; background: var(--border2); flex-shrink: 0; }
  .logo-en { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); }
  .collection-select {
    margin-left: 16px; font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
    padding: 5px 9px; border-radius: 7px; border: 1px solid var(--border2);
    background: var(--bg2); color: var(--ink); outline: none; cursor: pointer;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .hbadge {
    font-size: 11px; padding: 2px 9px; border-radius: 99px;
    background: var(--gold-bg); color: var(--gold);
    border: 1px solid rgba(154,111,26,0.2); font-weight: 500; white-space: nowrap;
  }
  .hbadge.green { background: var(--green-bg); color: var(--green); border-color: rgba(46,125,74,0.2); }

  /* cache file button */
  .cache-btn {
    font-size: 11px; padding: 3px 10px; border-radius: 6px;
    border: 1px solid var(--border2); background: var(--bg2); color: var(--ink3);
    cursor: pointer; white-space: nowrap; font-family: inherit;
    transition: background 0.15s;
  }
  .cache-btn:hover { background: var(--bg3); }
  .cache-btn.linked { border-color: rgba(46,125,74,0.4); color: var(--green); background: var(--green-bg); }

  /* ── Layout ── */
  .app-body { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border2); display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stab {
    flex: 1; padding: 9px 4px; font-size: 12px; font-weight: 500; text-align: center;
    cursor: pointer; border: none; background: none; color: var(--ink3);
    border-bottom: 2px solid transparent; transition: all 0.15s; font-family: inherit;
  }
  .stab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .stab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .stab-panel.active { display: flex; }

  .sidebar-controls { padding: 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 7px; flex-shrink: 0; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; stroke: var(--ink4); fill: none; pointer-events: none; }
  .search-wrap input {
    width: 100%; padding: 7px 10px 7px 28px; font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
    border: 1px solid var(--border2); border-radius: 7px; background: var(--bg2); color: var(--ink); outline: none; transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--blue); background: var(--surface); }
  .search-wrap input::placeholder { color: var(--ink4); }
  .filter-row { display: flex; gap: 5px; }
  .filter-row select {
    flex: 1; padding: 5px 6px; font-size: 11px; font-family: 'Noto Sans SC', sans-serif;
    border: 1px solid var(--border2); border-radius: 7px; background: var(--bg2); color: var(--ink); outline: none; cursor: pointer;
  }
  .char-count { font-size: 10.5px; color: var(--ink4); text-align: right; }

  /* ── Character grid ── */
  .char-scroll { flex: 1; overflow-y: auto; padding: 8px; }
  .char-scroll::-webkit-scrollbar { width: 3px; }
  .char-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .char-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 8px 3px 6px; cursor: pointer; text-align: center;
    transition: all 0.15s; position: relative; overflow: hidden;
  }
  .char-btn:hover { border-color: var(--border2); background: var(--bg2); transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
  .char-btn.active { border-color: var(--blue); background: var(--blue-bg); box-shadow: 0 0 0 2px rgba(26,95,160,0.15); }
  .char-btn.active .cb-char { color: var(--blue); }
  .char-btn.cached::after { content: ''; position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; border-radius: 50%; background: var(--green); opacity: 0.7; }
  .cb-char { font-family: 'Noto Serif SC', serif; font-size: 20px; line-height: 1.1; color: var(--ink); display: block; }
  .cb-pin { font-size: 9px; color: var(--ink3); margin-top: 2px; }
  .cb-en { font-size: 8.5px; color: var(--ink4); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Expressions list ── */
  .expr-scroll { flex: 1; overflow-y: auto; padding: 8px; }
  .expr-scroll::-webkit-scrollbar { width: 3px; }
  .expr-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .expr-list { display: flex; flex-direction: column; gap: 5px; }
  .expr-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 9px 11px; cursor: pointer; text-align: left;
    transition: all 0.15s; position: relative;
  }
  .expr-btn:hover { border-color: var(--border2); background: var(--bg2); }
  .expr-btn.active { border-color: var(--purple); background: var(--purple-bg); }
  .expr-btn.active .eb-cn { color: var(--purple); }
  .eb-cn { font-family: 'Noto Serif SC', serif; font-size: 16px; color: var(--ink); margin-bottom: 1px; }
  .eb-pin { font-size: 10px; color: var(--ink3); font-style: italic; }
  .eb-en { font-size: 10px; color: var(--ink4); }

  /* ── Detail panel ── */
  .detail-panel { flex: 1; overflow-y: auto; background: var(--bg); }
  .detail-panel::-webkit-scrollbar { width: 5px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .detail-empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--ink4); }
  .detail-empty .empty-char { font-family: 'Noto Serif SC', serif; font-size: 80px; opacity: 0.1; line-height: 1; }
  .detail-empty p { font-size: 14px; }

  /* ── Detail content ── */
  .detail-content { padding: 1.75rem 2.25rem; max-width: 620px; }

  .detail-hero {
    display: flex; gap: 1.25rem; align-items: flex-start;
    margin-bottom: 1.75rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border2);
  }
  .hero-char { font-family: 'Noto Serif SC', serif; font-size: 80px; line-height: 1; color: var(--ink); flex-shrink: 0; }
  .hero-meta { flex: 1; padding-top: 4px; }
  .hero-pinyin { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 26px; color: var(--ink2); margin-bottom: 5px; }
  .hero-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag { font-size: 10.5px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .tag-cat { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(26,95,160,0.15); }
  .tag-stroke { background: var(--bg3); color: var(--ink3); border: 1px solid var(--border2); }
  .tag-expr { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(107,63,160,0.15); }
  .hero-meaning { font-size: 15px; font-weight: 500; color: var(--ink); }
  .hero-meaning-sub { font-size: 12px; color: var(--ink3); margin-top: 2px; }

  /* ── Sections ── */
  .section { margin-bottom: 1.6rem; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink4); white-space: nowrap; }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* Radicals */
  .radicals-grid { display: flex; flex-direction: column; gap: 7px; }
  .radical-row { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 9px 13px; }
  .radical-char { font-family: 'Noto Serif SC', serif; font-size: 28px; line-height: 1; color: var(--ink); flex-shrink: 0; width: 34px; text-align: center; }
  .radical-info { flex: 1; }
  .radical-top { display: flex; align-items: baseline; gap: 7px; margin-bottom: 1px; }
  .radical-pin { font-size: 12px; font-style: italic; color: var(--ink2); font-family: 'DM Serif Display', serif; }
  .radical-meaning { font-size: 12px; font-weight: 500; color: var(--ink); }
  .radical-role { font-size: 11.5px; color: var(--ink3); line-height: 1.5; }

  /* Compound words */
  .compounds-grid { display: flex; flex-direction: column; gap: 7px; }
  .compound-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 10px 13px;
  }
  .compound-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
  .compound-chars { display: flex; gap: 3px; }
  .compound-char-link {
    font-family: 'Noto Serif SC', serif; font-size: 20px; line-height: 1; color: var(--blue);
    cursor: pointer; padding: 1px 3px; border-radius: 4px; transition: background 0.12s;
    text-decoration: none; border: none; background: none; font-family: 'Noto Serif SC', serif;
  }
  .compound-char-link:hover { background: var(--blue-bg); }
  .compound-char-nolink { font-family: 'Noto Serif SC', serif; font-size: 20px; line-height: 1; color: var(--ink3); padding: 1px 3px; }
  .compound-pin { font-size: 12px; font-style: italic; color: var(--ink3); font-family: 'DM Serif Display', serif; }
  .compound-meaning { font-size: 12px; font-weight: 500; color: var(--ink); }
  .compound-note { font-size: 11.5px; color: var(--ink3); line-height: 1.5; }

  /* Expressions */
  .expr-detail-box { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; margin-bottom: 7px; }
  .expr-hero-cn { font-family: 'Noto Serif SC', serif; font-size: 26px; color: var(--ink); display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 3px; }
  .expr-hero-char-link {
    color: var(--purple); cursor: pointer; border-radius: 4px; padding: 0 2px;
    transition: background 0.12s; border: none; background: none;
    font-family: 'Noto Serif SC', serif; font-size: inherit;
  }
  .expr-hero-char-link:hover { background: var(--purple-bg); }
  .expr-hero-pin { font-size: 14px; font-style: italic; color: var(--ink3); font-family: 'DM Serif Display', serif; margin-bottom: 3px; }
  .expr-hero-en { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
  .expr-breakdown { display: flex; flex-direction: column; gap: 4px; }
  .expr-char-row { display: flex; gap: 8px; align-items: flex-start; padding: 5px 0; border-top: 1px solid var(--border); }
  .expr-char-glyph { font-family: 'Noto Serif SC', serif; font-size: 22px; color: var(--ink); flex-shrink: 0; width: 28px; }
  .expr-char-info { flex: 1; }
  .expr-char-top { display: flex; gap: 6px; align-items: baseline; }
  .expr-char-pin { font-size: 11px; font-style: italic; color: var(--ink3); font-family: 'DM Serif Display', serif; }
  .expr-char-meaning { font-size: 11px; font-weight: 500; color: var(--ink); }
  .expr-char-role { font-size: 11px; color: var(--ink4); }
  .expr-link-btn {
    font-size: 10px; padding: 2px 7px; border-radius: 5px;
    background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(107,63,160,0.2);
    cursor: pointer; font-family: inherit; flex-shrink: 0; white-space: nowrap;
    transition: background 0.12s;
  }
  .expr-link-btn:hover { background: var(--purple); color: white; }
  .expr-note { font-size: 12px; color: var(--ink3); line-height: 1.7; margin-top: 6px; padding-top: 8px; border-top: 1px solid var(--border); }

  /* prose / memory / examples */
  .prose { font-size: 13.5px; line-height: 1.8; color: var(--ink2); }
  .memory-box { background: var(--green-bg); border: 1px solid rgba(46,125,74,0.2); border-left: 3px solid var(--green); border-radius: 9px; padding: 11px 15px; font-size: 13px; line-height: 1.75; color: var(--green); }
  .examples { display: flex; flex-direction: column; gap: 8px; }
  .example { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; }
  .ex-cn { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--ink); margin-bottom: 3px; line-height: 1.5; }
  .ex-pin { font-size: 11.5px; color: var(--ink3); font-style: italic; margin-bottom: 2px; }
  .ex-en { font-size: 11.5px; color: var(--ink4); }

  /* loading / error / cache notice */
  .loading-wrap { padding: 3rem 0; text-align: center; color: var(--ink4); }
  .loading-spinner { width: 26px; height: 26px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap p { font-size: 12.5px; }
  .error-box { background: var(--red-bg); border: 1px solid rgba(192,57,43,0.2); border-radius: 9px; padding: 11px 14px; font-size: 12.5px; color: var(--red); display: flex; align-items: center; gap: 8px; }
  .cache-notice { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); margin-bottom: 1rem; opacity: 0.8; }

  /* toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--ink); color: var(--bg); font-size: 12px; padding: 7px 16px;
    border-radius: 20px; pointer-events: none; opacity: 0; transition: all 0.3s; z-index: 100; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 680px) {
    :root { --sidebar-w: 100vw; }
    .app-body { flex-direction: column; }
    .sidebar { width: 100%; height: 240px; border-right: none; border-bottom: 1px solid var(--border2); }
    .char-grid { grid-template-columns: repeat(5, 1fr); }
    .detail-content { padding: 1.25rem; }
    .hero-char { font-size: 60px; }
  }
</style>
<script>window.__EMBEDDED_CACHE__={"c:爱":{"radicals":[{"char":"爫","pinyin":"zhǎo","meaning":"claw/hand reaching down","role":"top — a hand reaching out in longing"},{"char":"冖","pinyin":"mì","meaning":"cover","role":"middle — a sheltering cover over the heart"},{"char":"友","pinyin":"yǒu","meaning":"friend","role":"bottom — love grows from friendship"}],"etymology":"爱 originally depicted a person walking away while turning their head back — the ache of longing. The simplified form keeps 友 (friend) at the bottom, encoding the truth that love begins in friendship. Oracle bone forms showed a heart being cradled in cupped hands.","memory_tip":"Picture someone walking away but turning back with a hand outstretched — that bittersweet reaching IS 爱. The friend (友) at the bottom says: love starts with friendship. Three characters — 我爱你 — are among the most powerful in any language.","examples":[{"cn":"我爱我的家人。","pinyin":"Wǒ ài wǒ de jiārén.","en":"I love my family."},{"cn":"她爱喝茶。","pinyin":"Tā ài hē chá.","en":"She loves drinking tea."},{"cn":"我爱你。","pinyin":"Wǒ ài nǐ.","en":"I love you."}]},"c:八":{"radicals":[{"char":"八","pinyin":"bā","meaning":"eight / divide","role":"the whole character — two diverging strokes representing division"}],"etymology":"八 is among the most ancient characters: two strokes spreading apart, representing something being split in two. Eight was the number after two groups of four were divided. In Chinese culture 8 is the luckiest number because 八 (bā) sounds exactly like 发 (fā) — to prosper.","memory_tip":"Two lines walking away from each other — splitting! Remember: 8 is China's luckiest number because bā sounds like fā (getting rich). Phone numbers and prices with lots of 8s sell at a premium in China. Two parting strokes = 八 = prosperity!","examples":[{"cn":"我有八本书。","pinyin":"Wǒ yǒu bā běn shū.","en":"I have eight books."},{"cn":"他八岁了。","pinyin":"Tā bā suì le.","en":"He is eight years old."},{"cn":"八月很热。","pinyin":"Bā yuè hěn rè.","en":"August is very hot."}]},"c:爸爸":{"radicals":[{"char":"父","pinyin":"fù","meaning":"father","role":"top of 爸 — a hand wielding a rod, symbol of paternal authority"},{"char":"巴","pinyin":"bā","meaning":"hope/cling","role":"phonetic — gives the bā sound, like a baby's earliest syllable"}],"etymology":"爸 combines 父 (father — a hand with a staff, authority) with 巴 for its sound. Reduplicated as 爸爸 because babies naturally repeat syllables. The 'baba/papa/dada' sound is universal across human languages — infants produce bilabial stops first, and Chinese simply wrote it down.","memory_tip":"父 (authority rod) + 巴 (baby sound 'bā') = 爸, doubled to 爸爸 because that's how babies call! Just like 妈妈 mirrors mama, 爸爸 mirrors papa/dada. The characters encode the very first sounds a child makes.","examples":[{"cn":"我爸爸是老师。","pinyin":"Wǒ bàba shì lǎoshī.","en":"My dad is a teacher."},{"cn":"爸爸在家吗？","pinyin":"Bàba zài jiā ma?","en":"Is dad at home?"},{"cn":"我和爸爸去商店。","pinyin":"Wǒ hé bàba qù shāngdiàn.","en":"I'm going to the shop with dad."}]},"c:杯子":{"radicals":[{"char":"木","pinyin":"mù","meaning":"wood/tree","role":"left of 杯 — early cups were carved from wood"},{"char":"不","pinyin":"bù","meaning":"not (phonetic)","role":"right of 杯 — provides the bēi sound only"},{"char":"子","pinyin":"zǐ","meaning":"child/small thing","role":"noun suffix — marks it as a concrete, physical object"}],"etymology":"杯 has the wood radical (木) because earliest drinking vessels were carved from wood or bamboo. The 子 suffix is a prolific Chinese device turning words into tangible objects: 桌子 (table), 椅子 (chair), 杯子 (cup). It adds little meaning — it simply marks the word as a graspable physical thing.","memory_tip":"Wood (木) on the left — ancient cups were wooden. The 子 ending is the 'thing-ifier' — it appears on 桌子 (table-thing), 椅子 (chair-thing), 杯子 (cup-thing). When you see 子 after a household word, think: this is a real, holdable object. Wooden cup-thing = 杯子!","examples":[{"cn":"这个杯子是我的。","pinyin":"Zhège bēizi shì wǒ de.","en":"This cup is mine."},{"cn":"杯子里有水。","pinyin":"Bēizi lǐ yǒu shuǐ.","en":"There is water in the cup."},{"cn":"我买了一个新杯子。","pinyin":"Wǒ mǎi le yī gè xīn bēizi.","en":"I bought a new cup."}]},"c:北京":{"radicals":[{"char":"北","pinyin":"běi","meaning":"north","role":"two people sitting back-to-back — facing away from the warm south"},{"char":"京","pinyin":"jīng","meaning":"capital city","role":"a tall watchtower on a raised platform — landmark of a capital"}],"etymology":"北 showed two people sitting back-to-back. In ancient Chinese cosmology one faced south (the honorable, warm direction), so one's back was always to the cold north. 京 depicts a high watchtower on a mound — every great capital had one. Together they mean Northern Capital, the city that has anchored Chinese civilization for over 800 years.","memory_tip":"北 = backs turned (cold north is behind you). 京 = tall tower on a hill (every capital needs one). North + Capital = Beijing! Notice the pattern: 南京 = Southern Capital (Nanjing), 東京 = Eastern Capital (Tokyo). Once you know 京 = capital, you can read half of East Asia's city names.","examples":[{"cn":"北京是中国的首都。","pinyin":"Běijīng shì Zhōngguó de shǒudū.","en":"Beijing is the capital of China."},{"cn":"我想去北京。","pinyin":"Wǒ xiǎng qù Běijīng.","en":"I want to go to Beijing."},{"cn":"他在北京工作。","pinyin":"Tā zài Běijīng gōngzuò.","en":"He works in Beijing."}]},"c:本":{"radicals":[{"char":"木","pinyin":"mù","meaning":"tree/wood","role":"the full tree — base character"},{"char":"一","pinyin":"yī","meaning":"a line","role":"a short stroke at the base of the tree — marking the root"}],"etymology":"本 is elegant simplicity: take 木 (tree) and add a dash at the base to mark the root. It means 'root, origin, fundamental'. Extended to books (a book is foundational knowledge) and became the measure word for bound volumes. 日本 (Japan) means 'origin of the sun' — Japan is where the sun rises from China's eastern horizon.","memory_tip":"Tree (木) + dash at the roots = 本 = the fundamental root! Books are the root of learning, so 本 became the counter for books. 三本书 = three books. Also: 日本 = Japan (sun's origin) — the sun rises from that direction. Roots, origins, fundamentals — all 本.","examples":[{"cn":"我有三本书。","pinyin":"Wǒ yǒu sān běn shū.","en":"I have three books."},{"cn":"这本书很好看。","pinyin":"Zhè běn shū hěn hǎokàn.","en":"This book is very good."},{"cn":"他买了两本中文书。","pinyin":"Tā mǎi le liǎng běn Zhōngwén shū.","en":"He bought two Chinese books."}]},"c:不":{"radicals":[{"char":"一","pinyin":"yī","meaning":"sky/ceiling","role":"top horizontal stroke — a barrier overhead"},{"char":"丿","pinyin":"piě","meaning":"diagonal stroke","role":"the body angling upward"},{"char":"卜","pinyin":"bǔ","meaning":"lower portion","role":"the blocked lower path"}],"etymology":"不 originally depicted a bird flying upward toward the sky but blocked by a barrier — unable to break through. The bird strains upward but hits a ceiling. This image of blockage and inability evolved into the universal negation character. Some scholars alternatively see roots hitting an impenetrable hard layer underground.","memory_tip":"A bird trying to fly UP but hitting a CEILING (the top line) — blocked! That blocked frustration IS 不 (no, not, cannot). The bird can't get through — 不! Watch how tone changes meaning: 不 is 4th tone before 4th tone words but 2nd tone before them. The most essential negative in Chinese.","examples":[{"cn":"我不是学生。","pinyin":"Wǒ bú shì xuésheng.","en":"I am not a student."},{"cn":"他不在家。","pinyin":"Tā bú zài jiā.","en":"He is not at home."},{"cn":"我不喝茶。","pinyin":"Wǒ bù hē chá.","en":"I don't drink tea."}]},"c:不客气":{"radicals":[{"char":"不","pinyin":"bù","meaning":"not","role":"negation — cutting formality short"},{"char":"客","pinyin":"kè","meaning":"guest/visitor","role":"roof (宀) over arriving person (夂) — a formally received guest"},{"char":"气","pinyin":"qì","meaning":"air/manner/airs","role":"steam rising (原义) → manner, ceremony, putting on airs"}],"etymology":"客 shows a roof sheltering an arriving person — a guest treated with formal ceremony. 气 depicted steam rising, extended to energy, breath, manner. 不客气 = 'don't be like a formal guest / don't stand on ceremony'. It is the generous deflection after 谢谢 — dissolving the social debt created by thanks.","memory_tip":"A stiff formal guest (客) puffing with ceremony (气) — and you wave: 不! 'Relax! We're friends!' That's 不客气. After someone says 谢谢, you give them 不客气 and erase the formality. It's warmer than 'you're welcome' — it says 'there's no need for any of this between us'.","examples":[{"cn":"谢谢你！不客气！","pinyin":"Xièxie nǐ! Bú kèqi!","en":"Thank you! You're welcome!"},{"cn":"不客气，这是我应该做的。","pinyin":"Bú kèqi, zhè shì wǒ yīnggāi zuò de.","en":"Don't mention it — it's what I should do."},{"cn":"帮你是我的事，不客气。","pinyin":"Bāng nǐ shì wǒ de shì, bú kèqi.","en":"Helping you is my job — no need to thank me."}]},"c:菜":{"radicals":[{"char":"艹","pinyin":"cǎo","meaning":"grass/plant","role":"top — the plant radical, this is vegetation"},{"char":"采","pinyin":"cǎi","meaning":"to pick/gather","role":"phonetic and semantic — a hand picking leaves from a tree"}],"etymology":"菜 has the grass/plant radical (艹) identifying it as vegetation. Below is 采 (to pick), which itself shows a hand (爪) reaching to pluck from a tree (木) — the act of harvesting. 菜 = plants you pick and eat = vegetables. Extended to mean any cooked dish, since Chinese meals traditionally centered on plant dishes.","memory_tip":"Grass crown (艹) says: it's a plant! Below, a hand picking from a tree (采). Plants you pick and eat = 菜. When you see 艹 on top of a character, think: something green and growing. 好吃的菜 = delicious dish. 你喜欢什么菜？ = What dishes do you like?","examples":[{"cn":"这个菜很好吃。","pinyin":"Zhège cài hěn hǎochī.","en":"This dish is very delicious."},{"cn":"妈妈做了三个菜。","pinyin":"Māma zuò le sān gè cài.","en":"Mom made three dishes."},{"cn":"你喜欢吃什么菜？","pinyin":"Nǐ xǐhuān chī shénme cài?","en":"What dishes do you like?"}]},"c:茶":{"radicals":[{"char":"艹","pinyin":"cǎo","meaning":"grass/plant","role":"top — plant radical, tea is a leaf product"},{"char":"人","pinyin":"rén","meaning":"person","role":"middle — a person harvesting between plant and bush"},{"char":"木","pinyin":"mù","meaning":"tree/bush","role":"bottom — the woody tea bush being harvested"}],"etymology":"茶 reads as a complete picture top-to-bottom: leafy plant (艹), person (人) harvesting in the middle, from a woody bush (木) below. This single character gave the world 'tea': through Cantonese 'cha' and Hokkien 'tê', virtually every language on earth — English, Russian, Arabic, Persian, Swahili — borrowed its tea-word from 茶.","memory_tip":"Read top to bottom: leaves (艹), person picking (人), tea bush (木) — a complete harvest scene! The English word 'tea', Russian 'чай', Arabic 'شاي' all come from this character. You're learning the origin of a word used by billions. Every cup of tea in the world traces back to 茶.","examples":[{"cn":"我喜欢喝茶。","pinyin":"Wǒ xǐhuān hē chá.","en":"I like drinking tea."},{"cn":"你喝茶还是水？","pinyin":"Nǐ hē chá háishi shuǐ?","en":"Do you drink tea or water?"},{"cn":"这杯茶很好喝。","pinyin":"Zhè bēi chá hěn hǎohē.","en":"This cup of tea is delicious."}]},"c:吃":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"left — the open mouth ready to receive food"},{"char":"乞","pinyin":"qǐ","meaning":"to beg/request","role":"right — phonetic; a person bent low asking, suggesting hunger"}],"etymology":"吃 pairs the mouth radical (口) with 乞 (to beg), which shows a person bent over with an outstretched hand. The phonetic 乞 carries a semantic undertone: eating arises from hunger, the primal need that moves people to beg. An open, wanting mouth — that is 吃.","memory_tip":"Mouth (口) wide open on the left! On the right, someone bending to beg (乞) for food. Begging open-mouth = eating! Key pattern: 吃 and 喝 both have 口 (mouth). 吃 = mouth + solid food; 喝 = mouth + liquid. Both start with that open mouth — which makes sense!","examples":[{"cn":"我们吃饭吧。","pinyin":"Wǒmen chīfàn ba.","en":"Let's eat."},{"cn":"你吃了吗？","pinyin":"Nǐ chī le ma?","en":"Have you eaten?"},{"cn":"这个很好吃！","pinyin":"Zhège hěn hǎochī!","en":"This is delicious!"}]},"c:出租车":{"radicals":[{"char":"出","pinyin":"chū","meaning":"exit/emerge","role":"two mountain shapes stacked — rising up and going out"},{"char":"租","pinyin":"zū","meaning":"rent/lease","role":"grain (禾) + occupy (且) — historically paying grain as rent"},{"char":"车","pinyin":"chē","meaning":"vehicle/car","role":"pictograph of a cart's axle and wheel hubs seen from directly above"}],"etymology":"出 shows two mountain shapes representing emergence — something rising out. 租 combines grain (禾, once used as payment) with 且 (occupy). 车 is a top-down view of an ancient cart: central axle with spoke-wheels on each side. Three characters tell the complete story: an outgoing rental vehicle = taxi.","memory_tip":"出 (going out) + 租 (rent) + 车 (car/cart from above) = taxi! And 车 really does look like a cart from a bird's-eye view — axle in the middle, wheels on the sides. Ancient Chinese engineers were illustrating their vehicles! 坐出租车 = ride a taxi (sit in the outgoing rental cart).","examples":[{"cn":"我们坐出租车去吧。","pinyin":"Wǒmen zuò chūzūchē qù ba.","en":"Let's take a taxi."},{"cn":"出租车在哪儿？","pinyin":"Chūzūchē zài nǎr?","en":"Where is the taxi?"},{"cn":"坐出租车要多少钱？","pinyin":"Zuò chūzūchē yào duōshao qián?","en":"How much does a taxi cost?"}]},"c:打电话":{"radicals":[{"char":"打","pinyin":"dǎ","meaning":"hit/make/do","role":"hand radical (扌) + phonetic 丁 — a hand performing actions"},{"char":"电","pinyin":"diàn","meaning":"electricity/lightning","role":"rain with a lightning bolt (申) inside — the electric flash"},{"char":"话","pinyin":"huà","meaning":"speech/words","role":"speech radical (讠) + tongue (舌) — words produced by the tongue"}],"etymology":"打 originally meant 'to strike' and extended to many hand-actions: 打球 (play ball), 打工 (work for hire), 打电话 (dial a phone). 电 captured the lightning bolt in rain — electricity. 话 places the speech radical next to 舌 (tongue), the organ of speech. Make-by-hand + electric + tongue-words = phone call.","memory_tip":"Hand action (打) + electricity (电) + speech (话) = make an electric speech = phone call! Think of picking up a handset (hand action) sending your voice through electricity. 给我打电话 = Call me! The three characters literally describe what telephoning is: a hand-activated electric speech act.","examples":[{"cn":"我给妈妈打电话。","pinyin":"Wǒ gěi māma dǎ diànhuà.","en":"I'm calling my mom."},{"cn":"你可以给我打电话。","pinyin":"Nǐ kěyǐ gěi wǒ dǎ diànhuà.","en":"You can call me."},{"cn":"他在打电话。","pinyin":"Tā zài dǎ diànhuà.","en":"He is on the phone."}]},"c:大":{"radicals":[{"char":"大","pinyin":"dà","meaning":"big/large","role":"the whole character — a person with arms spread wide open"}],"etymology":"大 is one of the most perfect pictographs in Chinese: a person (人) standing with arms flung wide — demonstrating size with their whole body. The wider the arms, the bigger the thing. It forms a natural trio with 小 (small, contracted) and 中 (medium, balanced). The human body as the original ruler of measurement.","memory_tip":"Stand up and spread your arms WIDE — that is 大! A person (body + two spread arms) showing 'THIS big!' Compare: 大 (arms wide = big), 小 (contracted = small), 中 (balanced = medium). The body as a measuring tool. Da! Big! Simple and unforgettable.","examples":[{"cn":"这个苹果很大。","pinyin":"Zhège píngguǒ hěn dà.","en":"This apple is very big."},{"cn":"北京是一个大城市。","pinyin":"Běijīng shì yī gè dà chéngshì.","en":"Beijing is a big city."},{"cn":"他有一个大家。","pinyin":"Tā yǒu yī gè dà jiā.","en":"He has a large family."}]},"c:的":{"radicals":[{"char":"白","pinyin":"bái","meaning":"white/clear","role":"left — clarity, explicitness"},{"char":"勺","pinyin":"sháo","meaning":"spoon","role":"right — phonetic component, gives the 'de' sound"}],"etymology":"的 is the most common character in Mandarin — appearing roughly once in every 12 characters in any text. It is a structural particle with no literal meaning: 我的书 (my book), 漂亮的猫 (beautiful cat). Its sole job is to link a modifier to what it modifies. Mastering 的 unlocks the grammar of description in Chinese.","memory_tip":"的 is the all-purpose glue of Chinese grammar. Anything before 的 describes what follows: 我的 = my, 漂亮的 = beautiful, 他的 = his. Rule: [description] + 的 + [noun]. You'll see it constantly — in fact, you cannot read a Chinese paragraph without 的. The most frequent character in the language.","examples":[{"cn":"这是我的书。","pinyin":"Zhè shì wǒ de shū.","en":"This is my book."},{"cn":"他是我的好朋友。","pinyin":"Tā shì wǒ de hǎo péngyou.","en":"He is my good friend."},{"cn":"这个漂亮的杯子是谁的？","pinyin":"Zhège piàoliang de bēizi shì shéi de?","en":"Whose is this beautiful cup?"}]},"c:点":{"radicals":[{"char":"占","pinyin":"zhān","meaning":"divine/occupy","role":"upper part — phonetic, gives the diǎn sound"},{"char":"灬","pinyin":"huǒ","meaning":"fire (four-dot form)","role":"bottom — four fire-dots representing drops or flames"}],"etymology":"点 has the four-dot fire radical (灬) at the bottom — originally depicting drops of liquid or flames. The upper 占 provides sound only. 点 began as 'a small dot or drop' and extended to: a precise point in time (o'clock), a small amount (一点), ordering food (点菜), igniting a flame (点火). All meanings trace to the idea of a small, precise mark.","memory_tip":"Four little dots at the bottom (灬) — drops or sparks, something small and precise. That's 点: a dot, a time-point, a little bit. Three o'clock = 三点 (three time-dots). A little water = 一点水 (one tiny drop). 点菜 = dotting/pointing at menu items to order. Small but mighty!","examples":[{"cn":"现在三点了。","pinyin":"Xiànzài sān diǎn le.","en":"It's three o'clock now."},{"cn":"我想喝一点水。","pinyin":"Wǒ xiǎng hē yīdiǎn shuǐ.","en":"I want to drink a little water."},{"cn":"他八点来。","pinyin":"Tā bā diǎn lái.","en":"He's coming at eight o'clock."}]},"c:电脑":{"radicals":[{"char":"电","pinyin":"diàn","meaning":"electricity/lightning","role":"lightning bolt (申) inside rain — the electric flash"},{"char":"脑","pinyin":"nǎo","meaning":"brain","role":"flesh radical (月) + phonetic — the physical organ of thought"}],"etymology":"电脑 = electric brain = computer. 脑 has the flesh/body radical (月/肉) because it's a physical organ. When China named computers in the 1960s, they called them 'electric brains' — far more poetic than the Latin 'computare' (to reckon). The naming reflects seeing computation as a form of thought, not just calculation.","memory_tip":"Electric (电) brain (脑) = computer. So much more evocative than 'computer'! 脑 has the flesh radical because brains are organs — even artificial ones. Learn the 电 pattern: 电脑 (electric brain = computer), 电视 (electric watch = TV), 电话 (electric speech = phone). One prefix, a whole technology family.","examples":[{"cn":"我的电脑很新。","pinyin":"Wǒ de diànnǎo hěn xīn.","en":"My computer is very new."},{"cn":"他在用电脑工作。","pinyin":"Tā zài yòng diànnǎo gōngzuò.","en":"He is working on the computer."},{"cn":"这个电脑多少钱？","pinyin":"Zhège diànnǎo duōshao qián?","en":"How much does this computer cost?"}]},"c:电视":{"radicals":[{"char":"电","pinyin":"diàn","meaning":"electricity","role":"the electric component — lightning in rain"},{"char":"视","pinyin":"shì","meaning":"to look/watch","role":"reveal/show radical (示) + phonetic — making things visible, the act of seeing"}],"etymology":"电 (electricity) + 视 (to see/watch) = electric seeing = television. 视 combines the 'show/reveal' radical with a phonetic component — it is about making things visible to the eye. The Chinese naming system is elegantly consistent: 电 + action = electrical device. TV = electric-watching, computer = electric-brain, phone = electric-speech.","memory_tip":"电 (electricity) + 视 (watch/see) = TV! The 电-device pattern: 电视 (TV = electric-watch), 电脑 (computer = electric-brain), 电话 (phone = electric-speech), 电影 (movie = electric-shadow). Master 电 and you name an entire technological era. 看电视 = do the electric-watching.","examples":[{"cn":"他在看电视。","pinyin":"Tā zài kàn diànshì.","en":"He is watching TV."},{"cn":"你喜欢看什么电视？","pinyin":"Nǐ xǐhuān kàn shénme diànshì?","en":"What TV shows do you like?"},{"cn":"我家有两个电视。","pinyin":"Wǒ jiā yǒu liǎng gè diànshì.","en":"My home has two TVs."}]},"c:电影":{"radicals":[{"char":"电","pinyin":"diàn","meaning":"electricity","role":"the electric component — lightning in rain"},{"char":"影","pinyin":"yǐng","meaning":"shadow/image/reflection","role":"bright scenery (景) + shadow stripes (彡) — light and darkness interplaying"}],"etymology":"电影 = electric shadow = movie. 影 is a poetic character: 景 (bright scenery, light) combined with 彡 (stripes suggesting shadow or flowing texture) — the dance of light and shadow. Early cinema was literally the projection of moving shadows using electric light. The Chinese name captures the actual magic of film far better than 'movie' ever did.","memory_tip":"Electric (电) shadows (影) = movies! Chinese cinema terminology is pure poetry. 影 = bright light (景) making moving shadows (彡) — that's literally what a film projector does. 看电影 = watch the electric shadows. Next time you're in a cinema, remember: you're watching 电影 — electric shadow-play.","examples":[{"cn":"我们去看电影吧！","pinyin":"Wǒmen qù kàn diànyǐng ba!","en":"Let's go see a movie!"},{"cn":"这个电影很好看。","pinyin":"Zhège diànyǐng hěn hǎokàn.","en":"This movie is really good."},{"cn":"你喜欢什么电影？","pinyin":"Nǐ xǐhuān shénme diànyǐng?","en":"What movies do you like?"}]},"c:东西":{"radicals":[{"char":"东","pinyin":"dōng","meaning":"east","role":"sun rising through trees — the east"},{"char":"西","pinyin":"xī","meaning":"west","role":"a bird settling into its nest at dusk — the west"}],"etymology":"East (东) + West (西) = thing/stuff — one of Chinese's most surprising compounds. In ancient China, goods traveled along the east-west Silk Road trade routes. The markets where east-meets-west goods were sold were called 'east-west markets'. 'Things from east and west' became shorthand for 'goods', then 'things in general'. The whole compass of trade = stuff.","memory_tip":"East (东) + West (西) = stuff/things! The entire span of Silk Road trade — goods from east and west = 东西 (everything). Next time you ask 这是什么东西？(What's this thing?), you're asking 'what east-west thing is this?' The ancient Silk Road lives in every everyday conversation about things.","examples":[{"cn":"桌子上有东西。","pinyin":"Zhuōzi shàng yǒu dōngxi.","en":"There are things on the table."},{"cn":"你买了什么东西？","pinyin":"Nǐ mǎi le shénme dōngxi?","en":"What things did you buy?"},{"cn":"我的东西在哪儿？","pinyin":"Wǒ de dōngxi zài nǎr?","en":"Where are my things?"}]},"c:都":{"radicals":[{"char":"者","pinyin":"zhě","meaning":"person who / one who","role":"left — phonetic component"},{"char":"阝","pinyin":"yì","meaning":"city/mound","role":"right — the city/settlement radical, indicating urban gathering"}],"etymology":"都 originally meant 'capital city' — where all people and resources converge (首都 = capital, 都市 = city). From 'all gathered in the capital', it extended to mean 'all, both, every'. The semantic path is natural: a capital gathers everything from the whole country, so 都 came to mean 'all'. The city radical (阝) anchors the original meaning.","memory_tip":"Originally 'capital city' — where EVERYONE gathers. When all people converge in one place, you can say 都 (all) are there. 都 traveled from 'capital' to 'all' via the logic of gathering. 我们都是朋友 = We are ALL friends. The city where everything meets = 都 = all, every, both.","examples":[{"cn":"我们都是朋友。","pinyin":"Wǒmen dōu shì péngyou.","en":"We are all friends."},{"cn":"他们都来了。","pinyin":"Tāmen dōu lái le.","en":"They all came."},{"cn":"这些菜我都喜欢。","pinyin":"Zhèxiē cài wǒ dōu xǐhuān.","en":"I like all of these dishes."}]},"c:读":{"radicals":[{"char":"讠","pinyin":"yán","meaning":"speech/words","role":"left — the speech radical; reading was traditionally done aloud"},{"char":"卖","pinyin":"mài","meaning":"sell","role":"right — phonetic only, provides the dú sound"}],"etymology":"读 carries the speech radical (讠) on the left because in ancient China, reading was always done aloud. Scholars chanted their texts, students recited by voicing every word, and silent reading was rare until modernity. To 读 is to give a text your voice. The right side 卖 (sell) is purely phonetic.","memory_tip":"The speech radical (讠) on the left — reading is an act of SPEAKING! Ancient Chinese scholars always read aloud, chanting their classics. 读书 = read books (by voicing them). 读 reminds you: speak Chinese aloud to learn it. The tradition of scholars chanting texts lives in every 读 you encounter.","examples":[{"cn":"我每天读书。","pinyin":"Wǒ měitiān dú shū.","en":"I read every day."},{"cn":"他在读中文。","pinyin":"Tā zài dú Zhōngwén.","en":"He is reading/studying Chinese."},{"cn":"请大声读这个句子。","pinyin":"Qǐng dàshēng dú zhège jùzi.","en":"Please read this sentence aloud."}]},"c:对不起":{"radicals":[{"char":"对","pinyin":"duì","meaning":"face/toward/correct","role":"hand (寸) + facing — pointing correctly toward someone, confronting directly"},{"char":"不","pinyin":"bù","meaning":"not/cannot","role":"negation — the blocked bird unable to rise"},{"char":"起","pinyin":"qǐ","meaning":"rise/stand up","role":"movement upward — rising to meet someone face to face"}],"etymology":"对不起 literally means 'unable to stand up and face you' — 对 (face/toward) + 不 (cannot) + 起 (rise up to meet). The phrase encodes the physical shame of wrongdoing in Chinese face culture: you've behaved so badly that you literally cannot lift your head and look the person in the eye. A profound apology.","memory_tip":"对 (face someone) + 不 (cannot) + 起 (rise to meet) = 'I can't face you' = sorry! The shame of wrongdoing: you can't even stand up and look someone in the eye. The response 没关系 (no connection) cuts the cord of blame. 对不起 → 没关系: apology offered, apology dissolved.","examples":[{"cn":"对不起，我来晚了。","pinyin":"Duìbuqǐ, wǒ lái wǎn le.","en":"Sorry, I'm late."},{"cn":"对不起，这是我的错。","pinyin":"Duìbuqǐ, zhè shì wǒ de cuò.","en":"Sorry, this is my fault."},{"cn":"A：对不起！B：没关系。","pinyin":"A: Duìbuqǐ! B: Méi guānxi.","en":"A: Sorry! B: No worries."}]},"c:多":{"radicals":[{"char":"夕","pinyin":"xī","meaning":"evening/crescent moon","role":"top component — one moon, one evening"},{"char":"夕","pinyin":"xī","meaning":"evening/crescent moon","role":"bottom — a second moon stacked; doubling = many moons = much"}],"etymology":"多 is two copies of 夕 (evening/crescent moon) stacked — two moons, many moons, much time. The principle of visual doubling to suggest abundance is ancient and intuitive: two of the same thing means more than one = many. This character pairs with 少 (few) to form 多少 (how many/how much).","memory_tip":"Two moons (夕 + 夕) stacked = many moons = lots! One moon is one night; two moons means so many nights — that's a lot of time. Two of anything = more = 多. The opposite is 少 (few). And together 多少 = how many? (spanning the whole range from few to many). Stack those moons!","examples":[{"cn":"这里人很多。","pinyin":"Zhèlǐ rén hěn duō.","en":"There are many people here."},{"cn":"我有很多朋友。","pinyin":"Wǒ yǒu hěn duō péngyou.","en":"I have many friends."},{"cn":"不要吃太多。","pinyin":"Bú yào chī tài duō.","en":"Don't eat too much."}]},"c:多少":{"radicals":[{"char":"多","pinyin":"duō","meaning":"many/much","role":"two stacked moons — abundance, the high end of the scale"},{"char":"少","pinyin":"shǎo","meaning":"few/little","role":"small (小) with an extra cutting stroke — even less than small"}],"etymology":"多少 pairs two opposites — 多 (many) and 少 (few) — to create the open quantity question 'how many/how much?' Chinese forms range-questions by combining the two extremes: 大小 (size), 长短 (length), 多少 (quantity). Asking 多少 spans the full spectrum and invites the listener to place themselves anywhere on it.","memory_tip":"多 (many) + 少 (few) = how many? You're asking the whole range: 'is it more or less?' Visualize a scale with 多 on one end and 少 on the other — 多少 asks: where does it fall? 多少钱 = how much money? The two opposites collapse into one question mark. Elegant!","examples":[{"cn":"这个多少钱？","pinyin":"Zhège duōshao qián?","en":"How much does this cost?"},{"cn":"你有多少本书？","pinyin":"Nǐ yǒu duōshao běn shū?","en":"How many books do you have?"},{"cn":"多少人来了？","pinyin":"Duōshao rén lái le?","en":"How many people came?"}]},"c:儿子":{"radicals":[{"char":"儿","pinyin":"ér","meaning":"child/son","role":"a simplified person with two legs prominent — a toddler walking"},{"char":"子","pinyin":"zǐ","meaning":"child/son","role":"a swaddled baby with arms outstretched — an infant"}],"etymology":"儿 shows a simplified person with prominent legs — a toddler taking first steps. 子 is an ancient pictograph of a swaddled baby with arms out. Both mean 'child', and together as 儿子 they specifically mean 'son'. The pairing of two child-images, each showing a different life stage, intensifies and specifies the meaning.","memory_tip":"儿 = toddler on two wobbly legs (look — just two legs walking!). 子 = swaddled baby with arms out. Two stages of a boy's early life = 儿子 (son). Compare: 女儿 (daughter) = female (女) + child (儿). The two child characters, 儿 and 子, show up everywhere in Chinese — they're the building blocks of family vocabulary.","examples":[{"cn":"他有一个儿子。","pinyin":"Tā yǒu yī gè érzi.","en":"He has one son."},{"cn":"我的儿子三岁了。","pinyin":"Wǒ de érzi sān suì le.","en":"My son is three years old."},{"cn":"这是我儿子的书。","pinyin":"Zhè shì wǒ érzi de shū.","en":"This is my son's book."}]},"c:二":{"radicals":[{"char":"二","pinyin":"èr","meaning":"two","role":"the whole character — two horizontal strokes stacked"}],"etymology":"二 is pure visual counting: two horizontal strokes = two. Together with 一 (one stroke) and 三 (three strokes), these form the world's most intuitive number system — tally marks elevated into characters. These three number characters are among the oldest in existence, found on oracle bones from 3,500 years ago.","memory_tip":"One line = 一, two lines = 二, three lines = 三. Count the strokes! Ancient Chinese tally marks became permanent characters. But heads up: in spoken Chinese, 两 (liǎng) is used instead of 二 before measure words: 两个 (two of them), 两本书 (two books). 二 is for math and ordinals; 两 is for counting things.","examples":[{"cn":"我有二十本书。","pinyin":"Wǒ yǒu èrshí běn shū.","en":"I have twenty books."},{"cn":"他二十二岁了。","pinyin":"Tā èrshí èr suì le.","en":"He is twenty-two years old."},{"cn":"二月很冷。","pinyin":"Èr yuè hěn lěng.","en":"February is very cold."}]},"c:饭店":{"radicals":[{"char":"饣","pinyin":"shí","meaning":"food/eat","role":"left of 饭 — the food radical, like chopsticks over a bowl"},{"char":"反","pinyin":"fǎn","meaning":"reverse/transform","role":"right of 饭 — phonetic; raw ingredients transformed by cooking"},{"char":"店","pinyin":"diàn","meaning":"shop/establishment","role":"shelter roof (广) over 占 (occupy) — a covered commercial space"}],"etymology":"饭 combines the food radical (饣) with 反 (transform/reverse) — raw ingredients transformed by cooking into a meal. 店 shows a shelter (广) over 占 (to occupy), meaning a covered establishment. 饭店 = food establishment = restaurant or hotel. Large Chinese establishments often serve both functions — food is always central.","memory_tip":"饭 = food transformed (饣 food radical + 反 transform). 店 = a sheltered business space. Food-place = 饭店. Note: in China, grand 饭店 are often hotels too — the kitchen is always the heart. The food radical (饣, like a bowl with chopsticks) appears in all eating words: 饭 (rice/meal), 饿 (hungry), 饮 (drink).","examples":[{"cn":"我们去饭店吃饭吧。","pinyin":"Wǒmen qù fàndiàn chīfàn ba.","en":"Let's go to the restaurant to eat."},{"cn":"这个饭店的菜很好吃。","pinyin":"Zhège fàndiàn de cài hěn hǎochī.","en":"This restaurant's food is delicious."},{"cn":"饭店在哪儿？","pinyin":"Fàndiàn zài nǎr?","en":"Where is the restaurant?"}]},"c:飞机":{"radicals":[{"char":"飞","pinyin":"fēi","meaning":"fly","role":"a pictograph of a bird or crane in flight — wings spread, neck extended, lifting upward"},{"char":"机","pinyin":"jī","meaning":"machine/opportunity","role":"wood radical (木) + several/table (几) — originally a wooden weaving mechanism"}],"etymology":"飞 is a beautiful pictograph of a bird mid-flight — spread wings, extended neck, upward motion captured in three strokes. 机 originally depicted a weaving loom (木 wood + 几 a small frame), then generalized to any machine or mechanism. 飞机 = flying machine = airplane. The character 飞 itself looks airborne.","memory_tip":"飞 looks like a bird with wings spread, soaring! (Trace it — top strokes are wings, the sweep is the body lifting.) Add 机 (machine) and you have flying machine = 飞机. 飞 is one of those characters that *looks* like what it means — dynamic, upward, alive. Whoosh!","examples":[{"cn":"我坐飞机去北京。","pinyin":"Wǒ zuò fēijī qù Běijīng.","en":"I'm taking a plane to Beijing."},{"cn":"飞机几点到？","pinyin":"Fēijī jǐ diǎn dào?","en":"What time does the plane arrive?"},{"cn":"我喜欢坐飞机。","pinyin":"Wǒ xǐhuān zuò fēijī.","en":"I like flying."}]},"c:分钟":{"radicals":[{"char":"分","pinyin":"fēn","meaning":"divide/minute","role":"knife (刀) cutting apart something (八) — the act of dividing"},{"char":"钟","pinyin":"zhōng","meaning":"clock/bell","role":"metal radical (钅) + heavy (重) — a heavy bronze bell that marks time"}],"etymology":"分 shows a knife (刀) cutting apart (八 = divide) — the action of dividing. An hour divided into sixty pieces = minutes. 钟 combines metal (钅) with 重 (heavy) — the heavy bronze bell that traditionally rang the hours in Chinese temples and city towers. Together: a divided piece of the bell's time = minute.","memory_tip":"分 = knife splitting time into pieces (minutes are time-divisions). 钟 = heavy bronze bell (the original time-keeper). Splitting + bell = a piece of the bell's time = minute! Picture monks hearing the temple bell ring — each 分钟 is one slice between those deep bronze rings.","examples":[{"cn":"我等了三十分钟。","pinyin":"Wǒ děng le sānshí fēnzhōng.","en":"I waited thirty minutes."},{"cn":"五分钟后我来。","pinyin":"Wǔ fēnzhōng hòu wǒ lái.","en":"I'll come in five minutes."},{"cn":"走路要二十分钟。","pinyin":"Zǒulù yào èrshí fēnzhōng.","en":"It takes twenty minutes to walk."}]},"c:高兴":{"radicals":[{"char":"高","pinyin":"gāo","meaning":"tall/high","role":"depicts a tall multi-story building — elevated, lofty"},{"char":"兴","pinyin":"xìng","meaning":"prosper/mood/spirit","role":"hands raised jubilantly around a vessel — celebration and high spirits"}],"etymology":"高 depicts a tall building — lofty and elevated. 兴 originally showed hands raised in jubilation, associated with prosperity and elevated spirit. Together 高兴 = elevated spirits = happy! The compound pictures happiness as a feeling of being literally lifted up — your mood rises like a tall building.","memory_tip":"高 = tall (like a soaring building). 兴 = raised hands and excited energy. 高兴 = your mood soars high = happy! When you're 高兴, your spirits are as tall as a skyscraper. Feel yourself lifting up — that upward surge is 高兴. Compare: 高兴 (joyful/glad) vs 快乐 (happy/joyous — more general).","examples":[{"cn":"我很高兴认识你。","pinyin":"Wǒ hěn gāoxìng rènshi nǐ.","en":"I'm very happy to meet you."},{"cn":"他今天很高兴。","pinyin":"Tā jīntiān hěn gāoxìng.","en":"He is very happy today."},{"cn":"你高兴吗？","pinyin":"Nǐ gāoxìng ma?","en":"Are you happy?"}]},"c:个":{"radicals":[{"char":"人","pinyin":"rén","meaning":"person","role":"top — a person, one individual"},{"char":"丨","pinyin":"gǔn","meaning":"vertical stroke","role":"single line below — one unit standing"}],"etymology":"个 (simplified from 個) is the most common and versatile measure word in Chinese, used for people and a vast range of objects when no specific counter applies. The traditional form 個 combined person (人) with solid/hard (固) — one solid unit. When in doubt about which measure word to use, 个 is almost always acceptable.","memory_tip":"个 is your default counter — when in doubt, use 个! It works for people, apples, ideas, phones, problems — almost anything. 一个人 (one person), 一个苹果 (one apple), 一个问题 (one question). Think of 个 as the 'one unit' counter: one person-unit standing on a single line. The Swiss Army knife of measure words.","examples":[{"cn":"我有两个朋友。","pinyin":"Wǒ yǒu liǎng gè péngyou.","en":"I have two friends."},{"cn":"给我一个苹果。","pinyin":"Gěi wǒ yī gè píngguǒ.","en":"Give me one apple."},{"cn":"这个是什么？","pinyin":"Zhège shì shénme?","en":"What is this?"}]},"c:工作":{"radicals":[{"char":"工","pinyin":"gōng","meaning":"work/craftsman","role":"a pictograph of a carpenter's square or ruler — the craftsman's tool"},{"char":"作","pinyin":"zuò","meaning":"make/do/create","role":"person radical (亻) + rising action — a person actively creating something"}],"etymology":"工 is an ancient pictograph of a carpenter's square — the I-shaped tool of the skilled craftsman. It became the symbol of work and skill. 作 shows a person (亻) in active motion, making or creating. Both characters independently mean work/do, making 工作 a powerful doublet that means work, job, or to work.","memory_tip":"工 looks exactly like a steel I-beam or carpenter's square — the tool of the worker! 作 is a person (亻) actively doing something. Worker's-tool + person-in-action = 工作 (work). 你做什么工作？= What work do you do? The I-beam shape of 工 is unforgettable — it's the shape of labor.","examples":[{"cn":"我在北京工作。","pinyin":"Wǒ zài Běijīng gōngzuò.","en":"I work in Beijing."},{"cn":"他的工作很忙。","pinyin":"Tā de gōngzuò hěn máng.","en":"His work is very busy."},{"cn":"你做什么工作？","pinyin":"Nǐ zuò shénme gōngzuò?","en":"What work do you do?"}]},"c:狗":{"radicals":[{"char":"犭","pinyin":"quǎn","meaning":"dog/animal","role":"left — the animal radical, a simplified running dog"},{"char":"句","pinyin":"jù","meaning":"sentence/phrase","role":"right — phonetic component, provides the gǒu sound"}],"etymology":"狗 has the dog/animal radical (犭) on the left — three strokes suggesting a running dog's body, head, and legs. The right side 句 is phonetic only. The dog radical (犭, full form 犬) appears in many animal-related characters. Dogs were among the first domesticated animals in China, present in archaeological sites from 10,000 years ago.","memory_tip":"The three left strokes (犭) are a running dog — see the curved body? That's the animal radical for dogs and other creatures. Every animal character has this little creature on its left: 猫 (cat), 狗 (dog), 猪 (pig). When you see 犭 on the left, an animal is involved. The right side (句) just helps you say gǒu.","examples":[{"cn":"我家有一只狗。","pinyin":"Wǒ jiā yǒu yī zhī gǒu.","en":"My family has a dog."},{"cn":"这只狗很可爱。","pinyin":"Zhè zhī gǒu hěn kě'ài.","en":"This dog is very cute."},{"cn":"你喜欢狗还是猫？","pinyin":"Nǐ xǐhuān gǒu háishi māo?","en":"Do you like dogs or cats?"}]},"c:汉语":{"radicals":[{"char":"汉","pinyin":"hàn","meaning":"Han (Chinese ethnic group / dynasty)","role":"water radical (氵) + phonetic — originally the Han River in central China"},{"char":"语","pinyin":"yǔ","meaning":"language/speech","role":"speech radical (讠) + I/me (吾) — one's own native tongue"}],"etymology":"汉 originally referred to the Han River, then named the Han dynasty (206 BCE–220 CE), then became the name of China's majority ethnic group. 语 combines the speech radical with 吾 (I/me, archaic) — literally 'my own tongue/speech'. 汉语 = the language of the Han people. It emphasizes spoken Chinese, while 中文 emphasizes written Chinese.","memory_tip":"汉 = Han Chinese (named after the glorious Han dynasty, China's golden age). 语 = language (speech radical 讠 + 'my own' 吾 = my own tongue). Han + tongue = 汉语 = Mandarin Chinese. When someone says 你的汉语很好 (your Chinese is very good), they're complimenting your Han-tongue skills!","examples":[{"cn":"我在学汉语。","pinyin":"Wǒ zài xué Hànyǔ.","en":"I am studying Chinese."},{"cn":"他的汉语很好。","pinyin":"Tā de Hànyǔ hěn hǎo.","en":"His Chinese is very good."},{"cn":"汉语难不难？","pinyin":"Hànyǔ nán bu nán?","en":"Is Chinese difficult?"}]},"c:好":{"radicals":[{"char":"女","pinyin":"nǚ","meaning":"woman/female","role":"left — a woman in a graceful posture"},{"char":"子","pinyin":"zǐ","meaning":"child/son","role":"right — a child or infant"}],"etymology":"好 is one of Chinese's most beloved characters: woman (女) + child (子) = good! The ancient reading: a woman with a child represents completeness, harmony, family happiness — everything considered good. It is also the first character many learners write, appearing in the universal greeting 你好 (hello = you good).","memory_tip":"Woman (女) + Child (子) = Good (好)! A mother with her child was the ancient Chinese image of perfection and harmony. It's also your very first Chinese word: 你好 = hello (you good). And 好 is everywhere: 好吃 (delicious = good-eat), 好看 (beautiful = good-look), 好喝 (tasty drink = good-drink). 好 is the all-purpose positive!","examples":[{"cn":"今天天气很好。","pinyin":"Jīntiān tiānqì hěn hǎo.","en":"The weather today is very good."},{"cn":"你好！我叫李明。","pinyin":"Nǐ hǎo! Wǒ jiào Lǐ Míng.","en":"Hello! My name is Li Ming."},{"cn":"这个菜很好吃。","pinyin":"Zhège cài hěn hǎochī.","en":"This dish is very delicious."}]},"c:号":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"top — a mouth calling out a number or making an announcement"},{"char":"丂","pinyin":"kǎo","meaning":"obstruction/breath","role":"bottom — breath being forced out through an opening"}],"etymology":"号 originally depicted a mouth calling out loudly — announcing a number, a name, a signal. It evolved to mean 'number, date, mark, title, or call sign'. The top 口 (mouth) makes the vocal connection explicit. 号 is used for dates in a month (几号 = what date?), sequence numbers, telephone numbers, and even ship or aircraft designations.","memory_tip":"A mouth (口) calling out: 'Number one! Number two!' That's 号 — a called-out number or mark. 今天几号？= What date is today? (What number is today called?) 我的号码是... = My number is... The mouth announces the number. Every date, every sequence, every ID number is a 号.","examples":[{"cn":"今天几号？","pinyin":"Jīntiān jǐ hào?","en":"What's the date today?"},{"cn":"我的电话号码是多少？","pinyin":"Wǒ de diànhuà hàomǎ shì duōshao?","en":"What is my phone number?"},{"cn":"今天十五号。","pinyin":"Jīntiān shíwǔ hào.","en":"Today is the 15th."}]},"c:喝":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"left — the mouth performing the drinking action"},{"char":"曷","pinyin":"hé","meaning":"why/what (archaic)","role":"right — phonetic component, provides the hē sound"}],"etymology":"喝 has the mouth radical (口) indicating it is an oral action involving the mouth. The right side 曷 is phonetic. 喝 means to drink. Both 吃 (eat) and 喝 (drink) carry the mouth radical 口 — because both involve putting things into your mouth. The difference: 吃 = solids, 喝 = liquids.","memory_tip":"Mouth (口) on the left — something enters the mouth. When you drink, your mouth opens and liquid flows in. 喝 = the mouth-action for liquids. Remember the pair: 吃 (eat) = mouth + solid things; 喝 (drink) = mouth + liquid things. Both start with that open mouth (口). What goes in determines which word!","examples":[{"cn":"你喝水吗？","pinyin":"Nǐ hē shuǐ ma?","en":"Do you drink water?"},{"cn":"我喜欢喝茶。","pinyin":"Wǒ xǐhuān hē chá.","en":"I like drinking tea."},{"cn":"喝一杯水吧。","pinyin":"Hē yī bēi shuǐ ba.","en":"Have a glass of water."}]},"c:和":{"radicals":[{"char":"禾","pinyin":"hé","meaning":"grain/cereal crop","role":"left — a grain stalk bending with its heavy load"},{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"right — a mouth, speech, and togetherness"}],"etymology":"和 shows grain (禾) beside a mouth (口) — nourished people speaking together in harmony. Originally meaning 'harmonious, peaceful', 和 extended to mean 'and, with, together'. The image: when everyone is fed (grain) and communicating (mouth), there is harmony and connection — which became the word for 'and'.","memory_tip":"Grain (禾) + mouth (口) = harmony = and. When people are fed and talking together, there's peace and connection. That connected harmony became 和 = and/with. 你和我 = you and I, together. The grain feeds us; the mouth connects us. Harmony = 和 = and.","examples":[{"cn":"我和你是朋友。","pinyin":"Wǒ hé nǐ shì péngyou.","en":"You and I are friends."},{"cn":"茶和水都好喝。","pinyin":"Chá hé shuǐ dōu hǎohē.","en":"Both tea and water taste good."},{"cn":"他和她是同学。","pinyin":"Tā hé tā shì tóngxué.","en":"He and she are classmates."}]},"c:很":{"radicals":[{"char":"彳","pinyin":"chì","meaning":"step/walk","role":"left — the walking/path radical, suggesting movement"},{"char":"艮","pinyin":"gèn","meaning":"stubborn/firm/stop","role":"right — firm, resistant, unyielding"}],"etymology":"很 has the walking radical (彳) on the left and 艮 (resistant, unyielding, stubborn) on the right. Originally it conveyed pushing forward against resistance — walking with force. This forceful, pushing quality became the intensifier 'very'. The etymology: resistance creates force, and force creates intensity.","memory_tip":"Walking (彳) against resistance (艮) — pushing hard, really straining forward. That force and effort became 'very'. When something is 很 something, it's forcefully, pushingly so. 很好 = forcefully good = very good! Think: not just good, but PUSHING-through-resistance good. That intensity is 很.","examples":[{"cn":"他很高兴。","pinyin":"Tā hěn gāoxìng.","en":"He is very happy."},{"cn":"这个菜很好吃。","pinyin":"Zhège cài hěn hǎochī.","en":"This dish is very delicious."},{"cn":"今天很冷。","pinyin":"Jīntiān hěn lěng.","en":"Today is very cold."}]},"c:后面":{"radicals":[{"char":"后","pinyin":"hòu","meaning":"behind/after","role":"mouth (口) + following steps (彳) — one who comes after, who follows behind"},{"char":"面","pinyin":"miàn","meaning":"face/surface/side","role":"eye (目) set within an outline — a face looking outward, a surface or side"}],"etymology":"后 shows following steps with a mouth calling out — the follower behind. 面 depicts an eye (目) within an outline, representing a face or surface. 后面 = the back side/surface = behind. The suffix 面 (face/side) turns directional words into location words: 前面 (front), 后面 (back), 里面 (inside), 外面 (outside).","memory_tip":"后 = the follower behind. 面 = a face or surface (eye inside an outline). Back-face = the face of the back = 后面 = behind! Learn the 面-pattern: 前面 (front-face = in front), 后面 (back-face = behind), 里面 (inside-face = inside), 外面 (outside-face = outside). 面 is your location-word builder.","examples":[{"cn":"学校后面有公园。","pinyin":"Xuéxiào hòumiàn yǒu gōngyuán.","en":"There is a park behind the school."},{"cn":"我在你后面。","pinyin":"Wǒ zài nǐ hòumiàn.","en":"I'm behind you."},{"cn":"他站在后面。","pinyin":"Tā zhàn zài hòumiàn.","en":"He is standing at the back."}]},"c:回":{"radicals":[{"char":"囗","pinyin":"wéi","meaning":"enclosure/boundary","role":"outer square — the outer space, the world outside"},{"char":"口","pinyin":"kǒu","meaning":"inner space","role":"inner square — the center, the origin, home"}],"etymology":"回 is a pictograph of a spiral or a square-within-a-square — an ancient symbol of circular return. You go out (outer square) and spiral back to the center (inner square). It means 'return, go back, circle back'. The geometry of 回 IS its meaning: going around and coming back to where you started.","memory_tip":"A box inside a box — like a maze or spiral seen from above. You go out (outer square) and find your way back in (inner square). That return journey is 回! 回家 = go home (return to family). 回来 = come back. The concentric squares draw you inward — homeward. 回 is the shape of homecoming.","examples":[{"cn":"我想回家。","pinyin":"Wǒ xiǎng huí jiā.","en":"I want to go home."},{"cn":"他明天回来。","pinyin":"Tā míngtiān huí lái.","en":"He is coming back tomorrow."},{"cn":"你几点回家？","pinyin":"Nǐ jǐ diǎn huí jiā?","en":"What time are you going home?"}]},"c:会":{"radicals":[{"char":"亼","pinyin":"jí","meaning":"gather/assemble","role":"top — a roof with people gathering underneath"},{"char":"云","pinyin":"yún","meaning":"cloud/say (archaic)","role":"bottom — people speaking together, sharing"}],"etymology":"会 originally depicted people gathering under a roof to speak and share knowledge — an assembly, a meeting. From 'people coming together and understanding each other through communication' came the meaning 'understand how to do something, be capable'. The meeting where skills are exchanged became the word for capability.","memory_tip":"People gathering (亼 = roof + assembly) to speak and share (云 = speech/cloud) = a meeting where knowledge flows = to know how to do something! When people gather and share skills, they all become 会 (capable). 我会说中文 = I know how to speak Chinese — I learned it by gathering with others.","examples":[{"cn":"我会说汉语。","pinyin":"Wǒ huì shuō Hànyǔ.","en":"I can speak Chinese."},{"cn":"你会做饭吗？","pinyin":"Nǐ huì zuò fàn ma?","en":"Can you cook?"},{"cn":"他明天会来。","pinyin":"Tā míngtiān huì lái.","en":"He will come tomorrow."}]},"c:几":{"radicals":[{"char":"几","pinyin":"jī","meaning":"small table / how many","role":"the whole character — a pictograph of a small low table with two legs"}],"etymology":"几 is a pictograph of a small low table or stool — two legs with a flat top. As a question word it means 'how many' for small numbers (generally under 10); for larger or unknown quantities use 多少. The table image connected to counting because objects were counted on tables. 几 also appears in 茶几 (tea table).","memory_tip":"几 = a small table with two legs! And you use it to ask 'how many?' (small numbers). Think: how many legs does that little table have? — two (几). Use 几 for small numbers you expect: 你几岁？(how old are you?), 现在几点？(what time is it?). For big or unknown quantities: use 多少.","examples":[{"cn":"你有几本书？","pinyin":"Nǐ yǒu jǐ běn shū?","en":"How many books do you have?"},{"cn":"你家有几个人？","pinyin":"Nǐ jiā yǒu jǐ gè rén?","en":"How many people are in your family?"},{"cn":"现在几点了？","pinyin":"Xiànzài jǐ diǎn le?","en":"What time is it now?"}]},"c:家":{"radicals":[{"char":"宀","pinyin":"mián","meaning":"roof/shelter","role":"top — a roof overhead, protection"},{"char":"豕","pinyin":"shǐ","meaning":"pig","role":"bottom — a pig living under the roof"}],"etymology":"家 is one of the most charming characters: a roof (宀) over a pig (豕) = home! In ancient Chinese agricultural society, a home was not complete without livestock — especially pigs. Having a pig under your roof was proof of food, wealth, and a functioning household. The pig = prosperity = home.","memory_tip":"Pig (豕) under a roof (宀) = home! Ancient Chinese kept pigs in their courtyards — no pig, no proper home. 我家 = my home. 回家 = go home (return to the pig-under-the-roof!). Today 家 has expanded: 国家 (nation = country's family), 大家 (everyone = big family). The pig started it all.","examples":[{"cn":"我的家在北京。","pinyin":"Wǒ de jiā zài Běijīng.","en":"My home is in Beijing."},{"cn":"我想回家。","pinyin":"Wǒ xiǎng huí jiā.","en":"I want to go home."},{"cn":"他家很大。","pinyin":"Tā jiā hěn dà.","en":"His home is very big."}]},"c:叫":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"left — the mouth calling out"},{"char":"丩","pinyin":"jiū","meaning":"entangle/twist","role":"right — twisted, interlocked; phonetic"}],"etymology":"叫 combines the mouth (口) with a twisting/hooking sound shape. It means 'to call out, to shout, to be called, to be named'. The image: the mouth making a sound that reaches out and hooks someone — calling their name. Both meanings ('to call someone' and 'to be named') come from this vocal reaching-out.","memory_tip":"Mouth (口) calling out — 叫! Your name is what you're called (叫), and calling someone means opening your mouth and projecting sound toward them. 你叫什么名字？= What are you called? Your mouth answers. 我叫王明 = I'm called Wang Ming. The mouth reaching out = 叫.","examples":[{"cn":"你叫什么名字？","pinyin":"Nǐ jiào shénme míngzi?","en":"What is your name?"},{"cn":"我叫王明。","pinyin":"Wǒ jiào Wáng Míng.","en":"My name is Wang Ming."},{"cn":"请叫我小王。","pinyin":"Qǐng jiào wǒ Xiǎo Wáng.","en":"Please call me Xiao Wang."}]},"c:今天":{"radicals":[{"char":"今","pinyin":"jīn","meaning":"now/present/today","role":"a cover over a person — sheltered in the present moment"},{"char":"天","pinyin":"tiān","meaning":"sky/heaven/day","role":"big person (大) with a line above the head — the sky/heaven overhead"}],"etymology":"今 shows something gathered under a cover — the present, right now. 天 depicts a person (大) with a line above their head representing the sky — the sky marks each day. 今天 = this day's sky = today. Every day is a new sky overhead, and today's sky is 今天.","memory_tip":"今 = now (something sheltered in this moment). 天 = sky/day (person with sky above). Now + day = today = 今天! Remember the time family: 今天 (today), 明天 (tomorrow = bright day), 昨天 (yesterday = old day). The sky changes each day — today's sky is 今天.","examples":[{"cn":"今天天气很好。","pinyin":"Jīntiān tiānqì hěn hǎo.","en":"The weather today is very good."},{"cn":"今天几号？","pinyin":"Jīntiān jǐ hào?","en":"What's the date today?"},{"cn":"他今天来吗？","pinyin":"Tā jīntiān lái ma?","en":"Is he coming today?"}]},"c:九":{"radicals":[{"char":"九","pinyin":"jiǔ","meaning":"nine","role":"the whole character — an arm or hook curving and bending back"}],"etymology":"九 is an ancient pictograph possibly depicting a bent arm or dragon's claw — the largest single digit, curling powerfully back on itself. Nine was the supreme number in Chinese cosmology, associated with the emperor (九五之尊 = the emperor's supreme dignity) and the dragon. 久 (jiǔ, long time) is a homophone, so 9 also evokes longevity.","memory_tip":"九 looks like a bent arm or hook — the biggest reach before 10. It's also one stroke curving back on itself, like the number 9. Culture note: 9 is the emperor's number (九龙 = nine dragons = imperial power) and sounds like 久 (long time) = longevity. Lucky! 九九归一 = everything returns to one (after 9 cycles).","examples":[{"cn":"我有九本书。","pinyin":"Wǒ yǒu jiǔ běn shū.","en":"I have nine books."},{"cn":"他九岁了。","pinyin":"Tā jiǔ suì le.","en":"He is nine years old."},{"cn":"九月天气很好。","pinyin":"Jiǔ yuè tiānqì hěn hǎo.","en":"September has good weather."}]},"c:开":{"radicals":[{"char":"一","pinyin":"yī","meaning":"horizontal bar","role":"the crossbar bolt being lifted — a gate's locking bar"},{"char":"廾","pinyin":"gǒng","meaning":"two hands","role":"bottom — two hands lifting the bar open"}],"etymology":"开 depicts two hands (廾) lifting a horizontal crossbar (一) off a gate to open it. The original pictograph showed hands removing the bolt from doors. This gives all of 开's meanings: open (a door), start (begin removing obstacles), drive (operate a vehicle, open the road ahead). The image of hands removing a barrier.","memory_tip":"Two hands (廾) at the bottom lifting a horizontal bar (一) — opening a gate! 开 = open/start/drive. Why drive? Because driving opens the way ahead. 开门 = open the door; 开车 = drive (open-vehicle); 开始 = begin (open-start). Whenever you open, start, or drive, you're doing the two-hands-lifting-a-bar action of 开.","examples":[{"cn":"请开门。","pinyin":"Qǐng kāi mén.","en":"Please open the door."},{"cn":"他会开车。","pinyin":"Tā huì kāi chē.","en":"He can drive."},{"cn":"商店几点开门？","pinyin":"Shāngdiàn jǐ diǎn kāi mén?","en":"What time does the shop open?"}]},"c:看":{"radicals":[{"char":"手","pinyin":"shǒu","meaning":"hand","role":"top — a hand simplified, placed above the eye"},{"char":"目","pinyin":"mù","meaning":"eye","role":"bottom — an eye looking outward"}],"etymology":"看 is a brilliant compositional character: a hand (手, simplified) placed above an eye (目) — exactly how you shade your eyes from the sun to see into the distance. This gesture of hand-over-eye to look far is the literal origin of 看 (to look, watch, read). The character IS the gesture.","memory_tip":"A hand (手) shading an eye (目) from the sun — squinting into the distance! That's 看: to look, watch, read. Hold your hand over your eyes right now and look into the distance — you're making the 看 gesture! Hand over eye = seeing clearly. 看书 = read (look at books), 看电视 = watch TV (look at TV).","examples":[{"cn":"我在看书。","pinyin":"Wǒ zài kàn shū.","en":"I am reading a book."},{"cn":"你看电视吗？","pinyin":"Nǐ kàn diànshì ma?","en":"Do you watch TV?"},{"cn":"我们去看电影吧。","pinyin":"Wǒmen qù kàn diànyǐng ba.","en":"Let's go watch a movie."}]},"c:看见":{"radicals":[{"char":"看","pinyin":"kàn","meaning":"look/watch","role":"hand over eye — the intentional act of looking"},{"char":"见","pinyin":"jiàn","meaning":"see/perceive/meet","role":"an eye (目 simplified) with legs — a person walking with eyes open, noticing things"}],"etymology":"看见 = look + see = to catch sight of, to notice. 见 shows an eye with legs — someone actively moving with eyes open, perceiving what they encounter. The distinction is crucial: 看 is the intentional act of looking; 看见 is the successful result of seeing. You can 看 without 看见 — you can look without actually seeing.","memory_tip":"看 = trying to look (hand shading eye). 见 = the eye that catches what it seeks (eye walking on legs). Looking + catching = 看见 = to see/notice! The difference: 我看了 (I looked) vs 我看见了 (I saw it). Tried vs succeeded. Look everywhere for your keys — then finally 看见了! (Found them!)","examples":[{"cn":"我看见他了。","pinyin":"Wǒ kànjiàn tā le.","en":"I saw him."},{"cn":"你看见我的书了吗？","pinyin":"Nǐ kànjiàn wǒ de shū le ma?","en":"Did you see my book?"},{"cn":"我没看见猫。","pinyin":"Wǒ méi kànjiàn māo.","en":"I didn't see the cat."}]},"c:块":{"radicals":[{"char":"土","pinyin":"tǔ","meaning":"earth/soil","role":"left — solid ground, something solid"},{"char":"鬼","pinyin":"guǐ","meaning":"ghost","role":"right — phonetic component, provides the kuài sound"}],"etymology":"块 has the earth radical (土) suggesting a solid chunk or lump of material. It means 'a lump, chunk, or piece'. Also used as the colloquial measure word for yuan (Chinese currency) — because ancient coins were metal lumps. 一块钱 = one yuan (one 'lump' of money). Solid earth-chunk = piece = yuan.","memory_tip":"Earth radical (土) = solid, chunky. 块 = a lump or piece. Money comes in 'pieces/lumps' (块) — that's why 块 means yuan in everyday speech. 五块钱 = five yuan = five 'lumps' of money. At a market: 多少钱？三块！(How much? Three yuan!) Solid chunks of earth → solid chunks of currency.","examples":[{"cn":"这个多少钱？五块。","pinyin":"Zhège duōshao qián? Wǔ kuài.","en":"How much? Five yuan."},{"cn":"给我两块钱。","pinyin":"Gěi wǒ liǎng kuài qián.","en":"Give me two yuan."},{"cn":"一块面包多少钱？","pinyin":"Yī kuài miànbāo duōshao qián?","en":"How much is a piece of bread?"}]},"c:来":{"radicals":[{"char":"木","pinyin":"mù","meaning":"tree","role":"central trunk — something rooted"},{"char":"人","pinyin":"rén","meaning":"person","role":"two strokes on each side — people approaching from different directions"}],"etymology":"来 originally depicted a wheat plant — the grain that comes from the field toward people. The image of something approaching, being brought in from the outside, evolved into 'to come'. The simplified form looks like a tree with small strokes on each side, suggesting things converging from both directions toward a center.","memory_tip":"People approaching from both sides toward the tree = 来 = come! Compare with 去 (go = departing away). 来 = toward you; 去 = away from you. Chinese direction always takes the speaker as the center. 他来了 = He came (toward me/here). 你来我家 = You come to my house (toward me). 来 is always homeward.","examples":[{"cn":"他明天来。","pinyin":"Tā míngtiān lái.","en":"He's coming tomorrow."},{"cn":"你从哪儿来？","pinyin":"Nǐ cóng nǎr lái?","en":"Where are you from?"},{"cn":"请进来！","pinyin":"Qǐng jìn lái!","en":"Please come in!"}]},"c:老师":{"radicals":[{"char":"老","pinyin":"lǎo","meaning":"old/elderly","role":"a bent old person with long hair and a walking stick — wisdom through age"},{"char":"师","pinyin":"shī","meaning":"teacher/master/army","role":"a dividing tool over cloth — one who shapes and measures others"}],"etymology":"老 depicts an elderly person bent with age, long-haired, perhaps leaning on a staff — the embodiment of experience and wisdom. 师 combines a weaving shuttle (巾) with a shaping/measuring tool, suggesting a master craftsperson who shapes others. 老师 = aged wisdom + skilled shaper = teacher.","memory_tip":"老 = bent elder full of wisdom (long hair, curved back). 师 = master craftsperson who shapes others. Wisdom-shaper = 老师 = teacher! Cultural note: in Chinese culture, calling someone 老师 is deep respect — use it for any teacher, expert, or respected person. Never call a teacher by their first name alone.","examples":[{"cn":"我的老师很好。","pinyin":"Wǒ de lǎoshī hěn hǎo.","en":"My teacher is very good."},{"cn":"老师在学校。","pinyin":"Lǎoshī zài xuéxiào.","en":"The teacher is at school."},{"cn":"她是我的汉语老师。","pinyin":"Tā shì wǒ de Hànyǔ lǎoshī.","en":"She is my Chinese teacher."}]},"c:了":{"radicals":[{"char":"了","pinyin":"liǎo","meaning":"complete/finish","role":"a simplified child (子) with arms bound in swaddling — fully wrapped up, complete"}],"etymology":"了 originated as a simplified form of 子 (child) with the arms bound in swaddling cloth — a baby fully wrapped and complete. This image of completion evolved into the most important grammatical particle in Mandarin: marking completed actions, changed states, or new situations. It also stands alone as a verb meaning 'to finish, to understand' (了解 liǎojiě).","memory_tip":"了 = baby wrapped up tight, all done! That sense of completeness is 了's superpower: it marks that something is finished or changed. 吃了 = ate (done!), 来了 = arrived (done!), 下雨了 = it started raining (changed!). Every action gets a satisfying 了 when complete. The wrapped-up baby = done!","examples":[{"cn":"我吃了。","pinyin":"Wǒ chī le.","en":"I've eaten."},{"cn":"他来了。","pinyin":"Tā lái le.","en":"He's arrived."},{"cn":"下雨了！","pinyin":"Xià yǔ le!","en":"It started raining!"}]},"c:冷":{"radicals":[{"char":"冫","pinyin":"bīng","meaning":"ice","role":"left — two ice crystals, the cold/ice radical"},{"char":"令","pinyin":"lìng","meaning":"order/command","role":"right — phonetic component, gives the
