<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字学习 · HSK 1 Character Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f4;
    --bg2: #f2ede4;
    --bg3: #ebe4d8;
    --surface: #ffffff;
    --ink: #1c1410;
    --ink2: #4a3728;
    --ink3: #8a7060;
    --ink4: #b8a898;
    --red: #c0392b;
    --red-bg: #fdf0ee;
    --gold: #9a6f1a;
    --gold-bg: #fdf6e3;
    --green: #2e7d4a;
    --green-bg: #edf7f1;
    --blue: #1a5fa0;
    --blue-bg: #edf4fc;
    --purple: #6b3fa0;
    --purple-bg: #f4eefb;
    --border: rgba(60,40,20,0.1);
    --border2: rgba(60,40,20,0.18);
    --sidebar-w: 320px;
    --header-h: 56px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1612;
      --bg2: #221e19;
      --bg3: #2c271f;
      --surface: #252018;
      --ink: #f0ebe2;
      --ink2: #c8b89a;
      --ink3: #8a7a65;
      --ink4: #5a4e40;
      --border: rgba(255,220,160,0.08);
      --border2: rgba(255,220,160,0.15);
      --red-bg: #2a1410;
      --gold-bg: #241d0a;
      --green-bg: #0d2018;
      --blue-bg: #0d1a2a;
      --purple-bg: #1a0f2a;
    }
  }

  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg); color: var(--ink); display: flex; flex-direction: column; }

  /* ── Header ── */
  .app-header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    gap: 10px;
    flex-shrink: 0;
    z-index: 10;
  }
  .logo { display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
  .logo-cn { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: 0.05em; }
  .logo-sep { width: 1px; height: 18px; background: var(--border2); flex-shrink: 0; }
  .logo-en { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .hbadge {
    font-size: 11px; padding: 2px 9px; border-radius: 99px;
    background: var(--gold-bg); color: var(--gold);
    border: 1px solid rgba(154,111,26,0.2); font-weight: 500; white-space: nowrap;
  }
  .hbadge.green { background: var(--green-bg); color: var(--green); border-color: rgba(46,125,74,0.2); }

  /* cache file button */
  .cache-btn {
    font-size: 11px; padding: 3px 10px; border-radius: 6px;
    border: 1px solid var(--border2); background: var(--bg2); color: var(--ink3);
    cursor: pointer; white-space: nowrap; font-family: inherit;
    transition: background 0.15s;
  }
  .cache-btn:hover { background: var(--bg3); }
  .cache-btn.linked { border-color: rgba(46,125,74,0.4); color: var(--green); background: var(--green-bg); }

  /* ── Layout ── */
  .app-body { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border2); display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stab {
    flex: 1; padding: 9px 4px; font-size: 12px; font-weight: 500; text-align: center;
    cursor: pointer; border: none; background: none; color: var(--ink3);
    border-bottom: 2px solid transparent; transition: all 0.15s; font-family: inherit;
  }
  .stab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .stab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .stab-panel.active { display: flex; }

  .sidebar-controls { padding: 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 7px; flex-shrink: 0; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; stroke: var(--ink4); fill: none; pointer-events: none; }
  .search-wrap input {
    width: 100%; padding: 7px 10px 7px 28px; font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
    border: 1px solid var(--border2); border-radius: 7px; background: var(--bg2); color: var(--ink); outline: none; transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--blue); background: var(--surface); }
  .search-wrap input::placeholder { color: var(--ink4); }
  .filter-row { display: flex; gap: 5px; }
  .filter-row select {
    flex: 1; padding: 5px 6px; font-size: 11px; font-family: 'Noto Sans SC', sans-serif;
    border: 1px solid var(--border2); border-radius: 7px; background: var(--bg2); color: var(--ink); outline: none; cursor: pointer;
  }
  .char-count { font-size: 10.5px; color: var(--ink4); text-align: right; }

  /* ── Character grid ── */
  .char-scroll { flex: 1; overflow-y: auto; padding: 8px; }
  .char-scroll::-webkit-scrollbar { width: 3px; }
  .char-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .char-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 8px 3px 6px; cursor: pointer; text-align: center;
    transition: all 0.15s; position: relative; overflow: hidden;
  }
  .char-btn:hover { border-color: var(--border2); background: var(--bg2); transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
  .char-btn.active { border-color: var(--blue); background: var(--blue-bg); box-shadow: 0 0 0 2px rgba(26,95,160,0.15); }
  .char-btn.active .cb-char { color: var(--blue); }
  .char-btn.cached::after { content: ''; position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; border-radius: 50%; background: var(--green); opacity: 0.7; }
  .cb-char { font-family: 'Noto Serif SC', serif; font-size: 20px; line-height: 1.1; color: var(--ink); display: block; }
  .cb-pin { font-size: 9px; color: var(--ink3); margin-top: 2px; }
  .cb-en { font-size: 8.5px; color: var(--ink4); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Expressions list ── */
  .expr-scroll { flex: 1; overflow-y: auto; padding: 8px; }
  .expr-scroll::-webkit-scrollbar { width: 3px; }
  .expr-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .expr-list { display: flex; flex-direction: column; gap: 5px; }
  .expr-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 9px 11px; cursor: pointer; text-align: left;
    transition: all 0.15s; position: relative;
  }
  .expr-btn:hover { border-color: var(--border2); background: var(--bg2); }
  .expr-btn.active { border-color: var(--purple); background: var(--purple-bg); }
  .expr-btn.active .eb-cn { color: var(--purple); }
  .eb-cn { font-family: 'Noto Serif SC', serif; font-size: 16px; color: var(--ink); margin-bottom: 1px; }
  .eb-pin { font-size: 10px; color: var(--ink3); font-style: italic; }
  .eb-en { font-size: 10px; color: var(--ink4); }

  /* ── Detail panel ── */
  .detail-panel { flex: 1; overflow-y: auto; background: var(--bg); }
  .detail-panel::-webkit-scrollbar { width: 5px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .detail-empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--ink4); }
  .detail-empty .empty-char { font-family: 'Noto Serif SC', serif; font-size: 80px; opacity: 0.1; line-height: 1; }
  .detail-empty p { font-size: 14px; }

  /* ── Detail content ── */
  .detail-content { padding: 1.75rem 2.25rem; max-width: 620px; }

  .detail-hero {
    display: flex; gap: 1.25rem; align-items: flex-start;
    margin-bottom: 1.75rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border2);
  }
  .hero-char { font-family: 'Noto Serif SC', serif; font-size: 80px; line-height: 1; color: var(--ink); flex-shrink: 0; }
  .hero-meta { flex: 1; padding-top: 4px; }
  .hero-pinyin { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 26px; color: var(--ink2); margin-bottom: 5px; }
  .hero-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag { font-size: 10.5px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .tag-cat { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(26,95,160,0.15); }
  .tag-stroke { background: var(--bg3); color: var(--ink3); border: 1px solid var(--border2); }
  .tag-expr { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(107,63,160,0.15); }
  .hero-meaning { font-size: 15px; font-weight: 500; color: var(--ink); }
  .hero-meaning-sub { font-size: 12px; color: var(--ink3); margin-top: 2px; }

  /* ── Sections ── */
  .section { margin-bottom: 1.6rem; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink4); white-space: nowrap; }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* Radicals */
  .radicals-grid { display: flex; flex-direction: column; gap: 7px; }
  .radical-row { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 9px 13px; }
  .radical-char { font-family: 'Noto Serif SC', serif; font-size: 28px; line-height: 1; color: var(--ink); flex-shrink: 0; width: 34px; text-align: center; }
  .radical-info { flex: 1; }
  .radical-top { display: flex; align-items: baseline; gap: 7px; margin-bottom: 1px; }
  .radical-pin { font-size: 12px; font-style: italic; color: var(--ink2); font-family: 'DM Serif Display', serif; }
  .radical-meaning { font-size: 12px; font-weight: 500; color: var(--ink); }
  .radical-role { font-size: 11.5px; color: var(--ink3); line-height: 1.5; }

  /* Compound words */
  .compounds-grid { display: flex; flex-direction: column; gap: 7px; }
  .compound-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 10px 13px;
  }
  .compound-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
  .compound-chars { display: flex; gap: 3px; }
  .compound-char-link {
    font-family: 'Noto Serif SC', serif; font-size: 20px; line-height: 1; color: var(--blue);
    cursor: pointer; padding: 1px 3px; border-radius: 4px; transition: background 0.12s;
    text-decoration: none; border: none; background: none; font-family: 'Noto Serif SC', serif;
  }
  .compound-char-link:hover { background: var(--blue-bg); }
  .compound-char-nolink { font-family: 'Noto Serif SC', serif; font-size: 20px; line-height: 1; color: var(--ink3); padding: 1px 3px; }
  .compound-pin { font-size: 12px; font-style: italic; color: var(--ink3); font-family: 'DM Serif Display', serif; }
  .compound-meaning { font-size: 12px; font-weight: 500; color: var(--ink); }
  .compound-note { font-size: 11.5px; color: var(--ink3); line-height: 1.5; }

  /* Expressions */
  .expr-detail-box { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; margin-bottom: 7px; }
  .expr-hero-cn { font-family: 'Noto Serif SC', serif; font-size: 26px; color: var(--ink); display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 3px; }
  .expr-hero-char-link {
    color: var(--purple); cursor: pointer; border-radius: 4px; padding: 0 2px;
    transition: background 0.12s; border: none; background: none;
    font-family: 'Noto Serif SC', serif; font-size: inherit;
  }
  .expr-hero-char-link:hover { background: var(--purple-bg); }
  .expr-hero-pin { font-size: 14px; font-style: italic; color: var(--ink3); font-family: 'DM Serif Display', serif; margin-bottom: 3px; }
  .expr-hero-en { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
  .expr-breakdown { display: flex; flex-direction: column; gap: 4px; }
  .expr-char-row { display: flex; gap: 8px; align-items: flex-start; padding: 5px 0; border-top: 1px solid var(--border); }
  .expr-char-glyph { font-family: 'Noto Serif SC', serif; font-size: 22px; color: var(--ink); flex-shrink: 0; width: 28px; }
  .expr-char-info { flex: 1; }
  .expr-char-top { display: flex; gap: 6px; align-items: baseline; }
  .expr-char-pin { font-size: 11px; font-style: italic; color: var(--ink3); font-family: 'DM Serif Display', serif; }
  .expr-char-meaning { font-size: 11px; font-weight: 500; color: var(--ink); }
  .expr-char-role { font-size: 11px; color: var(--ink4); }
  .expr-link-btn {
    font-size: 10px; padding: 2px 7px; border-radius: 5px;
    background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(107,63,160,0.2);
    cursor: pointer; font-family: inherit; flex-shrink: 0; white-space: nowrap;
    transition: background 0.12s;
  }
  .expr-link-btn:hover { background: var(--purple); color: white; }
  .expr-note { font-size: 12px; color: var(--ink3); line-height: 1.7; margin-top: 6px; padding-top: 8px; border-top: 1px solid var(--border); }

  /* prose / memory / examples */
  .prose { font-size: 13.5px; line-height: 1.8; color: var(--ink2); }
  .memory-box { background: var(--green-bg); border: 1px solid rgba(46,125,74,0.2); border-left: 3px solid var(--green); border-radius: 9px; padding: 11px 15px; font-size: 13px; line-height: 1.75; color: var(--green); }
  .examples { display: flex; flex-direction: column; gap: 8px; }
  .example { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; }
  .ex-cn { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--ink); margin-bottom: 3px; line-height: 1.5; }
  .ex-pin { font-size: 11.5px; color: var(--ink3); font-style: italic; margin-bottom: 2px; }
  .ex-en { font-size: 11.5px; color: var(--ink4); }

  /* loading / error / cache notice */
  .loading-wrap { padding: 3rem 0; text-align: center; color: var(--ink4); }
  .loading-spinner { width: 26px; height: 26px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap p { font-size: 12.5px; }
  .error-box { background: var(--red-bg); border: 1px solid rgba(192,57,43,0.2); border-radius: 9px; padding: 11px 14px; font-size: 12.5px; color: var(--red); display: flex; align-items: center; gap: 8px; }
  .cache-notice { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); margin-bottom: 1rem; opacity: 0.8; }

  /* toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--ink); color: var(--bg); font-size: 12px; padding: 7px 16px;
    border-radius: 20px; pointer-events: none; opacity: 0; transition: all 0.3s; z-index: 100; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 680px) {
    :root { --sidebar-w: 100vw; }
    .app-body { flex-direction: column; }
    .sidebar { width: 100%; height: 240px; border-right: none; border-bottom: 1px solid var(--border2); }
    .char-grid { grid-template-columns: repeat(5, 1fr); }
    .detail-content { padding: 1.25rem; }
    .hero-char { font-size: 60px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <span class="logo-cn">汉字学习</span>
    <div class="logo-sep"></div>
    <span class="logo-en">HSK 1 Study</span>
  </div>
  <div class="header-right">
    <span class="hbadge green" id="cacheStats">0 / 150 cached</span>
    <button class="cache-btn" id="cacheFileBtn" onclick="handleCacheFile()" title="Link a local cache.json file for persistent storage across sessions">
      📂 Link cache file
    </button>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="stab active" onclick="switchTab('chars', this)">Characters</button>
      <button class="stab" onclick="switchTab('expr', this)">Expressions</button>
    </div>

    <!-- Characters tab -->
    <div class="stab-panel active" id="tab-chars">
      <div class="sidebar-controls">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Character, pinyin, or meaning…" oninput="filterChars()" autocomplete="off" spellcheck="false">
        </div>
        <div class="filter-row">
          <select id="catFilter" onchange="filterChars()">
            <option value="">All categories</option>
            <option value="noun">Nouns</option>
            <option value="verb">Verbs</option>
            <option value="adj">Adjectives</option>
            <option value="pronoun">Pronouns</option>
            <option value="number">Numbers</option>
            <option value="adv">Adverbs</option>
            <option value="particle">Particles</option>
            <option value="question">Questions</option>
            <option value="phrase">Phrases</option>
            <option value="measure">Measure words</option>
          </select>
          <select id="sortSelect" onchange="filterChars()">
            <option value="hsk">HSK order</option>
            <option value="pinyin">Pinyin A–Z</option>
            <option value="strokes">Strokes</option>
          </select>
        </div>
        <div class="char-count" id="charCount">150 characters</div>
      </div>
      <div class="char-scroll">
        <div class="char-grid" id="charGrid"></div>
      </div>
    </div>

    <!-- Expressions tab -->
    <div class="stab-panel" id="tab-expr">
      <div class="sidebar-controls">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="exprSearch" placeholder="Search expressions…" oninput="filterExprs()" autocomplete="off" spellcheck="false">
        </div>
        <div class="char-count" id="exprCount">32 expressions</div>
      </div>
      <div class="expr-scroll">
        <div class="expr-list" id="exprList"></div>
      </div>
    </div>
  </aside>

  <main class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="emptyState">
      <div class="empty-char">字</div>
      <p>Select a character or expression to begin</p>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const HSK1 = [
  {c:"爱",p:"ài",e:"love",s:10,cat:"verb"},
  {c:"八",p:"bā",e:"eight",s:2,cat:"number"},
  {c:"爸爸",p:"bàba",e:"dad / father",s:13,cat:"noun"},
  {c:"杯子",p:"bēizi",e:"cup / glass",s:11,cat:"noun"},
  {c:"北京",p:"Běijīng",e:"Beijing",s:12,cat:"noun"},
  {c:"本",p:"běn",e:"(measure word for books)",s:5,cat:"measure"},
  {c:"不",p:"bù",e:"no / not",s:4,cat:"adv"},
  {c:"不客气",p:"bú kèqi",e:"you're welcome",s:14,cat:"phrase"},
  {c:"菜",p:"cài",e:"dish / vegetable",s:11,cat:"noun"},
  {c:"茶",p:"chá",e:"tea",s:9,cat:"noun"},
  {c:"吃",p:"chī",e:"eat",s:6,cat:"verb"},
  {c:"出租车",p:"chūzūchē",e:"taxi",s:22,cat:"noun"},
  {c:"打电话",p:"dǎ diànhuà",e:"make a phone call",s:19,cat:"phrase"},
  {c:"大",p:"dà",e:"big / large",s:3,cat:"adj"},
  {c:"的",p:"de",e:"(possessive particle)",s:8,cat:"particle"},
  {c:"点",p:"diǎn",e:"o'clock / point",s:9,cat:"noun"},
  {c:"电脑",p:"diànnǎo",e:"computer",s:21,cat:"noun"},
  {c:"电视",p:"diànshì",e:"television",s:21,cat:"noun"},
  {c:"电影",p:"diànyǐng",e:"movie / film",s:22,cat:"noun"},
  {c:"东西",p:"dōngxi",e:"thing / stuff",s:14,cat:"noun"},
  {c:"都",p:"dōu",e:"all / both",s:10,cat:"adv"},
  {c:"读",p:"dú",e:"read / study",s:10,cat:"verb"},

// ─────────────────────────────────────────────
// CACHE — File System Access API with localStorage fallback
// ─────────────────────────────────────────────
let cacheData = {};     // { [charKey]: aiInfo }
let fileHandle = null;  // FileSystemFileHandle

async function initCache() {
  // Standalone build: cache embedded at build time
  if (window.__EMBEDDED_CACHE__) {
    cacheData = window.__EMBEDDED_CACHE__;
    markFileBtnAutoLoaded();
    return;
  }

  // Try to restore saved file handle from IndexedDB
  try {
    fileHandle = await idbGet('cacheFileHandle');
    if (fileHandle) {
      const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        await loadCacheFromFile();
        markFileBtnLinked(fileHandle.name);
        return;
      } else {
        fileHandle = null;
      }
    }
  } catch(e) { fileHandle = null; }

  // Auto-load from served cache file (works when running via dev server or same origin)
  try {
    const res = await fetch('./hsk1-cache.json');
    if (res.ok) {
      const parsed = await res.json();
      cacheData = parsed.cache || parsed;
      markFileBtnAutoLoaded();
      return;
    }
  } catch(e) {}

  // Fallback: load from localStorage
  try {
    const raw = localStorage.getItem('hsk1_cache_v2');
    if (raw) cacheData = JSON.parse(raw);
  } catch(e) {}
}

async function loadCacheFromFile() {
  try {
    const file = await fileHandle.getFile();
    const text = await file.text();
    const parsed = JSON.parse(text);
    // Handle both generator format {cache,errors,count} and flat format
    cacheData = parsed.cache || parsed;
  } catch(e) { cacheData = {}; }
}

async function saveCache() {
  const json = JSON.stringify(cacheData, null, 2);
  if (fileHandle) {
    try {
      const perm = await fileHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        const writable = await fileHandle.createWritable();
        await writable.write(json);
        await writable.close();
        return;
      }
    } catch(e) {}
  }
  // Fallback to localStorage
  try { localStorage.setItem('hsk1_cache_v2', json); } catch(e) {}
}

async function handleCacheFile() {
  if (!window.showOpenFilePicker && !window.showSaveFilePicker) {
    toast('File System API not supported in this browser. Using localStorage.');
    return;
  }
  try {
    // Try to open existing cache file
    const [fh] = await window.showOpenFilePicker({
      types: [{ description: 'Cache JSON', accept: { 'application/json': ['.json'] } }],
      multiple: false
    });
    fileHandle = fh;
    await idbSet('cacheFileHandle', fileHandle);
    await loadCacheFromFile();
    markFileBtnLinked(fileHandle.name);
    renderGrid();
    updateCacheStats();
    toast(`Linked: ${fileHandle.name} (${Object.keys(cacheData).length} entries loaded)`);
  } catch(e) {
    if (e.name === 'AbortError') return;
    // Maybe they want to create a new file
    try {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: 'hsk1-cache.json',
        types: [{ description: 'Cache JSON', accept: { 'application/json': ['.json'] } }]
      });
      await idbSet('cacheFileHandle', fileHandle);
      await saveCache();
      markFileBtnLinked(fileHandle.name);
      toast(`Created: ${fileHandle.name}`);
    } catch(e2) { if (e2.name !== 'AbortError') toast('Could not link file.'); }
  }
}

function markFileBtnLinked(name) {
  const btn = document.getElementById('cacheFileBtn');
  btn.textContent = `💾 ${name}`;
  btn.classList.add('linked');
  btn.title = `Cache linked to ${name}. Click to re-link.`;
}

function markFileBtnAutoLoaded() {
  const btn = document.getElementById('cacheFileBtn');
  btn.textContent = `✓ Cache loaded`;
  btn.classList.add('linked');
  btn.title = `Cache auto-loaded from hsk1-cache.json. Click to link file for write-back.`;
}

// ─────────────────────────────────────────────
// IndexedDB helpers (for persisting file handle)
// ─────────────────────────────────────────────
function idbGet(key) {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open('hsk1app', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('store');
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('store', 'readonly');
        const r = tx.objectStore('store').get(key);
        r.onsuccess = () => resolve(r.result ?? null);
        r.onerror = () => resolve(null);
      };
      req.onerror = () => resolve(null);
    } catch(e) { resolve(null); }
  });
}

function idbSet(key, value) {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open('hsk1app', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('store');
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('store', 'readwrite');
        tx.objectStore('store').put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => resolve();
      };
      req.onerror = () => resolve();
    } catch(e) { resolve(); }
  });
}

// CACHE ACCESSORS
// ─────────────────────────────────────────────
function cacheKey(word) { return 'c:' + word.c; }
function loadFromCache(word) { return cacheData[cacheKey(word)] || null; }
function saveToCache(word, info) {
  cacheData[cacheKey(word)] = info;
  saveCache();
}
function cachedCount() { return Object.keys(cacheData).filter(k => k.startsWith('c:')).length; }
function updateCacheStats() {
  const el = document.getElementById('cacheStats');
  if (el) el.textContent = `${cachedCount()} / ${HSK1.length} cached`;
}

// CHARACTERS
// ─────────────────────────────────────────────
let filtered = [...HSK1];
let activeIdx = null;
let activeWord = null;
let activeExprIdx = null;

function filterChars() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortSelect').value;
  filtered = HSK1.filter(w => {
    const mq = !q || w.c.includes(q) || w.p.toLowerCase().includes(q) || w.e.toLowerCase().includes(q);
    const mc = !cat || w.cat === cat;
    return mq && mc;
  });
  if (sort === 'pinyin') filtered.sort((a,b) => a.p.localeCompare(b.p, 'zh'));
  else if (sort === 'strokes') filtered.sort((a,b) => a.s - b.s);
  document.getElementById('charCount').textContent = `${filtered.length} character${filtered.length!==1?'s':''}`;
  activeIdx = null;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = filtered.map((w, i) => {
    const isActive = i === activeIdx;
    const isCached = !!loadFromCache(w);
    return `<button class="char-btn${isActive?' active':''}${isCached?' cached':''}" onclick="selectChar(${i})" title="${w.c} · ${w.p} · ${w.e}">
      <span class="cb-char">${w.c[0]}</span>
      <div class="cb-pin">${w.p.split(' ')[0]}</div>
      <div class="cb-en">${w.e.split('/')[0].trim()}</div>
    </button>`;
  }).join('');
}

function selectChar(idx, switchToTab) {
  activeIdx = idx;
  activeExprIdx = null;
  activeWord = filtered[idx];
  if (switchToTab) {
    document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.stab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.stab').classList.add('active');
    document.getElementById('tab-chars').classList.add('active');
  }
  renderGrid();
  renderExprList();
  showCharDetail(activeWord, idx);
}

// Navigate to a character by its glyph (used from compound/expression links)
function goToChar(glyph) {
  const idx = HSK1.findIndex(w => w.c[0] === glyph || w.c === glyph);
  if (idx === -1) { toast(`${glyph} is not in HSK 1 list`); return; }
  // Reset filter so character is visible
  document.getElementById('searchInput').value = '';
  document.getElementById('catFilter').value = '';
  document.getElementById('sortSelect').value = 'hsk';
  filtered = [...HSK1];
  document.getElementById('charCount').textContent = `${filtered.length} characters`;
  const filtIdx = filtered.findIndex(w => w.c === HSK1[idx].c);
  selectChar(filtIdx, true);
  // Scroll char into view
  setTimeout(() => {
    const btns = document.querySelectorAll('.char-btn');
    if (btns[filtIdx]) btns[filtIdx].scrollIntoView({ block: 'nearest' });
  }, 50);
}

// ─────────────────────────────────────────────
// COMPOUNDS rendering helper
// ─────────────────────────────────────────────
function renderCompoundChars(chars) {
  return chars.map(ch => {
    if (ch.link) {
      const target = HSK1.find(w => w.c === ch.link || w.c[0] === ch.link);
      if (target) return `<button class="compound-char-link" onclick="goToChar('${ch.g}')" title="Go to ${ch.g}">${ch.g}</button>`;
    }
    return `<span class="compound-char-nolink" title="${ch.p}: ${ch.e}">${ch.g}</span>`;
  }).join('');
}

  "radicals": [{"char": "radical_character", "pinyin": "pīnyīn", "meaning": "meaning in English", "role": "brief description of its role or contribution to this character"}],
  "etymology": "2-3 sentences on pictographic origin, semantic logic, or historical evolution. Be specific and interesting.",
  "memory_tip": "A vivid 2-3 sentence mnemonic or visual story to help remember this character. Make it fun and concrete.",
  "examples": [
    {"cn": "sentence using ${word.c[0]}", "pinyin": "full pinyin with tones", "en": "English translation"},
    {"cn": "sentence using ${word.c[0]}", "pinyin": "full pinyin with tones", "en": "English translation"},
    {"cn": "sentence using ${word.c[0]}", "pinyin": "full pinyin with tones", "en": "English translation"}
  ]
}

Rules: analyze primary character ${word.c[0]}. Example sentences use mostly HSK 1 vocabulary. Return ONLY the JSON.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const raw = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '';
    let info;
    try { info = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e) { throw new Error('Parse error'); }
    saveToCache(word, info);
    updateCacheStats();
    const container = document.getElementById('aiContent');
    if (!container || activeIdx !== idx) return;
    container.innerHTML = renderAI(info, false);
  } catch(err) {
    const container = document.getElementById('aiContent');
    if (container && activeIdx === idx) {
      container.innerHTML = `<div class="error-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Could not load analysis. Please try again.
      </div>`;
    }
  }
}

// ─────────────────────────────────────────────
// EXPRESSIONS
// ─────────────────────────────────────────────
let filteredExprs = [...EXPRESSIONS];

function filterExprs() {
  const q = document.getElementById('exprSearch').value.toLowerCase();
  filteredExprs = EXPRESSIONS.filter(ex =>
    !q || ex.c.includes(q) || ex.p.toLowerCase().includes(q) || ex.e.toLowerCase().includes(q)
  );
  document.getElementById('exprCount').textContent = `${filteredExprs.length} expression${filteredExprs.length!==1?'s':''}`;
  renderExprList();
}

function renderExprList() {
  const list = document.getElementById('exprList');
  list.innerHTML = filteredExprs.map((ex, i) => {
    const isActive = i === activeExprIdx;
    return `<button class="expr-btn${isActive?' active':''}" onclick="selectExpr(${i})">
      <div class="eb-cn">${ex.c}</div>
      <div class="eb-pin">${ex.p}</div>
      <div class="eb-en">${ex.e}</div>
    </button>`;
  }).join('');
}

function selectExpr(idx) {
  activeExprIdx = idx;
  activeIdx = null;
  renderExprList();
  renderGrid();
  showExprDetail(filteredExprs[idx]);
}

function showExprDetail(expr) {
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-content">
      <div class="detail-hero">
        <div class="hero-char" style="font-size:48px; padding-top:12px;">${expr.c}</div>
        <div class="hero-meta">
          <div class="hero-pinyin">${expr.p}</div>
          <div class="hero-tags"><span class="tag tag-expr">expression</span></div>
          <div class="hero-meaning">${expr.e}</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header"><span class="section-label">Character breakdown</span><div class="section-line"></div></div>
        <div class="expr-detail-box">
          <div class="expr-hero-cn">
            ${expr.chars.map(ch => ch.link
              ? `<button class="expr-hero-char-link" onclick="goToChar('${ch.g}')" title="View ${ch.g}">${ch.g}</button>`
              : `<span title="${ch.p}: ${ch.e}">${ch.g}</span>`
            ).join('')}
          </div>
          <div class="expr-hero-pin">${expr.p}</div>
          <div class="expr-hero-en">${expr.e}</div>
          <div class="expr-breakdown">
            ${expr.chars.map(ch => `
              <div class="expr-char-row">
                <div class="expr-char-glyph">${ch.g}</div>
                <div class="expr-char-info">
                  <div class="expr-char-top">
                    <span class="expr-char-pin">${ch.p}</span>
                    <span class="expr-char-meaning">${ch.e}</span>
                  </div>
                  ${ch.role ? `<div class="expr-char-role">${ch.role}</div>` : ''}
                </div>
                ${ch.link ? `<button class="expr-link-btn" onclick="goToChar('${ch.g}')">Study ${ch.g} →</button>` : ''}
              </div>`).join('')}
          </div>
          ${expr.note ? `<div class="expr-note">${expr.note}</div>` : ''}
        </div>
      </div>
    </div>
  `;
  panel.scrollTop = 0;
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
(async () => {
  await initCache();
  renderGrid();
  renderExprList();
  updateCacheStats();
})();
</script>
</body>
