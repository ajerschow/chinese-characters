lved. 衣服 = garment + wearing = clothes.","examples":[{"cn":"这件衣服多少钱？","pinyin":"Zhè jiàn yīfu duōshao qián?","en":"How much is this piece of clothing?"},{"cn":"我买了新衣服。","pinyin":"Wǒ mǎi le xīn yīfu.","en":"I bought new clothes."},{"cn":"她的衣服很漂亮。","pinyin":"Tā de yīfu hěn piàoliang.","en":"Her clothes are very beautiful."}]},"c:医生":{"radicals":[{"char":"医","pinyin":"yī","meaning":"medicine/heal","role":"an arrow in a quiver (矢) inside a container — treating wounds with tools"},{"char":"生","pinyin":"shēng","meaning":"life/birth","role":"plant sprouting from earth — alive, living"}],"etymology":"医 (simplified from 醫) originally showed arrows (矢, wounds) inside a vessel with wine (酉, used medicinally) — ancient battlefield medicine: removing projectiles and treating with fermented medicine. The full traditional character told the complete story of early Chinese healing. 生 = life. 医生 = healer of life = doctor.","memory_tip":"医 = ancient battlefield medicine (removing arrows, treating with wine — the original surgery!). 生 = life (sprouting plant). Doctor = healer of life = 医生! When you say 医生, you invoke 3,000 years of medical tradition. 我要看医生 = I need to see a doctor (I need to see the life-healer). 医生 is also a respectful title.","examples":[{"cn":"我去看医生。","pinyin":"Wǒ qù kàn yīshēng.","en":"I'm going to see the doctor."},{"cn":"他是一个好医生。","pinyin":"Tā shì yī gè hǎo yīshēng.","en":"He is a good doctor."},{"cn":"医生说我很健康。","pinyin":"Yīshēng shuō wǒ hěn jiànkāng.","en":"The doctor said I'm very healthy."}]},"c:医院":{"radicals":[{"char":"医","pinyin":"yī","meaning":"medicine/heal","role":"the medical component — healing and treatment"},{"char":"院","pinyin":"yuàn","meaning":"courtyard/institution","role":"mound radical (阝) + complete/walled (完) — a fully enclosed compound"}],"etymology":"医 (medicine/heal) + 院 (walled institution) = hospital. 院 combines the hill/mound radical (阝) with 完 (complete, walled in) — a fully enclosed compound or courtyard. Traditional Chinese hospitals were built around courtyards. 院 is the suffix for major institutions: 学院 (college), 法院 (court), 电影院 (cinema), 医院 (hospital).","memory_tip":"医 (healing) + 院 (walled compound/institution) = hospital! 院 is the institutional suffix: 医院 (hospital), 学院 (college), 法院 (court), 电影院 (cinema), 研究院 (research institute). Master 院 and you can read signs for major buildings. 你在医院吗？= Are you at the hospital? (In the healing-compound?)","examples":[{"cn":"他在医院。","pinyin":"Tā zài yīyuàn.","en":"He is in the hospital."},{"cn":"医院在哪儿？","pinyin":"Yīyuàn zài nǎr?","en":"Where is the hospital?"},{"cn":"我去医院看病。","pinyin":"Wǒ qù yīyuàn kàn bìng.","en":"I'm going to the hospital to see the doctor."}]},"c:椅子":{"radicals":[{"char":"木","pinyin":"mù","meaning":"wood/tree","role":"left of 椅 — chairs are traditionally made of wood"},{"char":"奇","pinyin":"qí","meaning":"strange/wonderful","role":"phonetic in 椅 — provides the yǐ sound"},{"char":"子","pinyin":"zǐ","meaning":"child/small thing","role":"noun suffix — marks it as a concrete physical object"}],"etymology":"椅 has the wood radical (木) because chairs are traditionally wooden, with 奇 providing the sound. The 子 suffix, as with 桌子 (table), 杯子 (cup), and 盘子 (plate), marks it as a concrete, physical object. The 子-suffix family of household objects is one of Chinese's most productive patterns.","memory_tip":"Wood radical (木) = it's wooden. 奇 = sound (yǐ). 子 = thing-suffix. Wooden-thing = 椅子 (chair)! The 子-suffix household object family: 杯子 (cup), 桌子 (table), 椅子 (chair), 瓶子 (bottle), 盘子 (plate), 筷子 (chopsticks). All concrete graspable objects. 请坐椅子！= Please sit on the chair!","examples":[{"cn":"请坐到椅子上。","pinyin":"Qǐng zuò dào yǐzi shàng.","en":"Please sit on the chair."},{"cn":"这把椅子很舒服。","pinyin":"Zhè bǎ yǐzi hěn shūfu.","en":"This chair is very comfortable."},{"cn":"椅子在桌子旁边。","pinyin":"Yǐzi zài zhuōzi pángbiān.","en":"The chair is next to the desk."}]},"c:有":{"radicals":[{"char":"又","pinyin":"yòu","meaning":"right hand/again","role":"top — a hand grasping something"},{"char":"月","pinyin":"yuè","meaning":"moon/flesh","role":"bottom — meat being held"}],"etymology":"有 shows a hand (又) holding a piece of meat (月/肉, the flesh/body radical) — the classic image of possession. In ancient times, meat was the most precious and tangible thing one could hold. From 'holding meat in hand' came the general meaning of 'have, possess, there is'. 有趣 (interesting = have-interest), 有名 (famous = have-name), 有用 (useful = have-use).","memory_tip":"Hand (又) holding meat (月) = have! In ancient times, holding meat = being wealthy. 有 = the most tangible possession = having. 我有... = I have... (I'm holding this in my hand, metaphorically). 没有 = not holding, gone. 有没有？= Do you have it or not? (holding or not-holding?). The hand-holding-meat = possession.","examples":[{"cn":"我有一只猫。","pinyin":"Wǒ yǒu yī zhī māo.","en":"I have a cat."},{"cn":"这里有医院吗？","pinyin":"Zhèlǐ yǒu yīyuàn ma?","en":"Is there a hospital here?"},{"cn":"你有时间吗？","pinyin":"Nǐ yǒu shíjiān ma?","en":"Do you have time?"}]},"c:语言":{"radicals":[{"char":"讠","pinyin":"yán","meaning":"speech","role":"left of 语 — the speech radical"},{"char":"吾","pinyin":"wú","meaning":"I/me (archaic)","role":"right of 语 — one's own speech, one's native tongue"},{"char":"言","pinyin":"yán","meaning":"speech/words","role":"left of 言 — mouth (口) with sound waves above — speech coming out"}],"etymology":"语 = speech radical (讠) + 吾 (I/me, archaic) = my own tongue = language. 言 is the full speech character: a mouth (口) with sound waves or marks above it — speech visibly emanating. Together 语言 = one's own speech + words = language. The pair captures both the personal (my tongue) and external (words spoken) dimensions of language.","memory_tip":"语 = my own speech (讠 + 吾 = my tongue). 言 = words emerging from a mouth (口 with waves above). My speech + words = 语言 = language! The speech radical (讠) is everywhere: 说 (speak), 话 (words), 语 (language), 读 (read), 请 (please), 谢 (thank). All language-related characters carry this mark. 语言 is the art of human connection.","examples":[{"cn":"汉语是一种语言。","pinyin":"Hànyǔ shì yī zhǒng yǔyán.","en":"Chinese is a language."},{"cn":"你会几种语言？","pinyin":"Nǐ huì jǐ zhǒng yǔyán?","en":"How many languages can you speak?"},{"cn":"语言学习很有意思。","pinyin":"Yǔyán xuéxí hěn yǒu yìsi.","en":"Language learning is very interesting."}]},"c:月":{"radicals":[{"char":"月","pinyin":"yuè","meaning":"moon/month","role":"the whole character — a crescent moon with a small internal stroke"}],"etymology":"月 is a pictograph of the crescent moon — curved and incomplete, with a small inner stroke. Compare with 日 (sun, which is complete/square). The moon measures months in the Chinese lunar calendar, so 月 means both 'moon' and 'month'. As a radical (body radical), 月 represents flesh/meat in characters like 脑 (brain), 胸 (chest), 脚 (foot).","memory_tip":"月 = crescent moon — curved and open! Compare: 日 (sun = square/complete) vs 月 (moon = crescent/open). Sun = full; Moon = curved gap. 月 means both moon AND month (the moon measures months). Sneaky: 月 also hides inside body-part characters as the 'flesh' radical: 脑 (brain), 腿 (leg), 脸 (face), 脚 (foot). Same shape, two meanings!","examples":[{"cn":"今年几月了？","pinyin":"Jīnnián jǐ yuè le?","en":"What month is it this year?"},{"cn":"我八月去北京。","pinyin":"Wǒ bā yuè qù Běijīng.","en":"I'm going to Beijing in August."},{"cn":"一年有十二个月。","pinyin":"Yī nián yǒu shí'èr gè yuè.","en":"A year has twelve months."}]},"c:在":{"radicals":[{"char":"才","pinyin":"cái","meaning":"just/sprout/talent","role":"top — a sprouting plant, the emergence of presence"},{"char":"土","pinyin":"tǔ","meaning":"earth/ground","role":"bottom — grounded, rooted in a specific place"}],"etymology":"在 shows a sprouting plant (才) rooted in the earth (土) — the image of being present, existing in a specific location. A plant cannot move; it IS where it is, rooted and present. This fixed rootedness = 在 (be at, exist in, be present). 在 serves as both a verb (to be located) and a preposition (at, in, on).","memory_tip":"Sprout (才) in earth (土) = 在 = being in a place! A plant can't move — it IS where it is, rooted. That rootedness = 在 = at/in/be-located. 我在家 = I am at home (rooted here). 在 + verb = currently doing (我在学习 = I'm studying = I'm rooted here learning). The planted sprout = presence = 在.","examples":[{"cn":"我在学校。","pinyin":"Wǒ zài xuéxiào.","en":"I am at school."},{"cn":"书在桌子上。","pinyin":"Shū zài zhuōzi shàng.","en":"The book is on the table."},{"cn":"他在看电视。","pinyin":"Tā zài kàn diànshì.","en":"He is watching TV."}]},"c:再见":{"radicals":[{"char":"再","pinyin":"zài","meaning":"again/once more","role":"something stored up high being brought down again — repetition, another time"},{"char":"见","pinyin":"jiàn","meaning":"see/meet/perceive","role":"an eye (目 simplified) with legs — someone walking with open eyes, catching sight"}],"etymology":"再 depicts something stored at height being brought down again — the idea of repetition, doing something once more. 见 shows an eye with legs — active seeing, going to meet and perceive. Together: 再见 = see again = goodbye. Chinese farewells are affirmations of future reunion, not expressions of ending.","memory_tip":"再 (again/once more) + 见 (see/meet) = see again = goodbye! Chinese goodbyes are optimistic: not 'farewell' but 'until we meet again'. 再 is always about returning: 再来一次 (one more time), 再见 (see you again), 再说 (say it again). Goodbye in Chinese is a promise of return. 再见 = I'll see you again!","examples":[{"cn":"再见！明天见！","pinyin":"Zàijiàn! Míngtiān jiàn!","en":"Goodbye! See you tomorrow!"},{"cn":"老师，再见！","pinyin":"Lǎoshī, zàijiàn!","en":"Goodbye, teacher!"},{"cn":"A: 再见！B: 再见！","pinyin":"A: Zàijiàn! B: Zàijiàn!","en":"A: Goodbye! B: Goodbye!"}]},"c:怎么":{"radicals":[{"char":"怎","pinyin":"zěn","meaning":"how (first part)","role":"heart/mind (心) at bottom + 乍 (suddenly/this way) on top — the mind asking 'in what way?'"},{"char":"么","pinyin":"me","meaning":"(question particle)","role":"small, vague suffix used in question and demonstrative words"}],"etymology":"怎 has 心 (heart/mind) at the bottom with 乍 (suddenly, in this way) above — the mind asking 'in what manner, in what way?' 么 is a diminutive suffix used in question and demonstrative words. 怎么 = how, why, in what way. It questions METHOD and MANNER. Family: 怎么 (how), 怎么样 (how is it), 这么 (this way), 那么 (that way).","memory_tip":"怎 = heart (心) asking 'how?' + 么 = question flavor = HOW?/WHY? 怎么 questions the method or manner: 你怎么去？= How are you getting there? 怎么了？= What happened? (How did things change?) The heart-question about method. Compare: 什么 (what) vs 怎么 (how). Both end in 么 — they're question-word cousins!","examples":[{"cn":"你怎么去学校？","pinyin":"Nǐ zěnme qù xuéxiào?","en":"How do you go to school?"},{"cn":"这个字怎么读？","pinyin":"Zhège zì zěnme dú?","en":"How do you read this character?"},{"cn":"你怎么了？","pinyin":"Nǐ zěnme le?","en":"What's wrong with you?"}]},"c:怎么样":{"radicals":[{"char":"怎","pinyin":"zěn","meaning":"how","role":"heart asking 'in what way'"},{"char":"么","pinyin":"me","meaning":"question suffix","role":"diminutive question marker"},{"char":"样","pinyin":"yàng","meaning":"appearance/form/type","role":"wood (木) + sheep (羊) — the beautiful form or appearance of something"}],"etymology":"怎么 (how) + 样 (appearance/type/form) = 'how does it appear?' = what's it like? 样 combines wood (木) with sheep (羊) — in ancient China, sheep (羊) was the character for beauty and fine form. A sheep-wood specimen = an example, a type, an appearance. 怎么样 asks about the quality or nature of something.","memory_tip":"怎么 (how) + 样 (appearance) = what's it like? = how is it? = 怎么样? Use it for evaluations and impressions: 天气怎么样？(How's the weather?) 他怎么样？(How is he?) 这个菜怎么样？(How's this dish?). 怎么样 is the 'how's it going' of Chinese. 样 also gives us: 样子 (appearance), 一样 (same = one-appearance).","examples":[{"cn":"你怎么样？","pinyin":"Nǐ zěnmeyàng?","en":"How are you? / How's it going?"},{"cn":"这个菜怎么样？","pinyin":"Zhège cài zěnmeyàng?","en":"How is this dish?"},{"cn":"北京的天气怎么样？","pinyin":"Běijīng de tiānqì zěnmeyàng?","en":"What's the weather like in Beijing?"}]},"c:这":{"radicals":[{"char":"辶","pinyin":"chuò","meaning":"walk/movement","role":"the movement radical — indicating direction toward the speaker"},{"char":"文","pinyin":"wén","meaning":"literature/culture/pattern","role":"upper right — phonetic component"}],"etymology":"这 has the movement radical (辶) suggesting directed motion or gesture — pointing toward something nearby, close to the speaker. It is the proximal demonstrative: 'this' (near me), as opposed to 那 (that, further away). The movement radical captures the pointing gesture: gesturing toward something in your immediate space.","memory_tip":"这 (this, near me) vs 那 (that, over there). The movement radical (辶) in 这 says: you're gesturing TOWARD something close. 这个 = this one. 这里/这儿 = here. 这么 = this way. These vs. those: 这些 (these near ones) vs 那些 (those distant ones). 这 = here, nearby, within reach. Everything close is 这!","examples":[{"cn":"这是什么？","pinyin":"Zhè shì shénme?","en":"What is this?"},{"cn":"这本书是我的。","pinyin":"Zhè běn shū shì wǒ de.","en":"This book is mine."},{"cn":"这里有医院吗？","pinyin":"Zhèlǐ yǒu yīyuàn ma?","en":"Is there a hospital here?"}]},"c:中国":{"radicals":[{"char":"中","pinyin":"zhōng","meaning":"middle/center","role":"a vertical arrow or flag through the center of a target — the center, the bull's-eye"},{"char":"国","pinyin":"guó","meaning":"country/nation","role":"a boundary (囗) protecting a treasure (玉 jade, simplified to 口) — a nation guards its wealth"}],"etymology":"中 shows a vertical line through the center of a target or enclosure — the exact middle, the bull's-eye. Ancient China saw itself as the center of the civilized world (中央 = center, 中原 = Central Plains). 国 depicts a walled boundary (囗) protecting a jade treasure (玉) — a nation is a boundary protecting what's most precious. 中国 = Middle Kingdom.","memory_tip":"中 = arrow through the CENTER of a target = the middle. 国 = jade (玉/口) inside a wall (囗) = a nation guards its treasure. Center + Nation = 中国 = The Middle Kingdom! China named itself the center of civilization. Also: 中 appears everywhere as 'middle': 中文 (Chinese language), 中午 (noon = mid-day), 中间 (in the middle).","examples":[{"cn":"我是中国人。","pinyin":"Wǒ shì Zhōngguó rén.","en":"I am Chinese."},{"cn":"中国在东亚。","pinyin":"Zhōngguó zài Dōng Yà.","en":"China is in East Asia."},{"cn":"我想去中国。","pinyin":"Wǒ xiǎng qù Zhōngguó.","en":"I want to go to China."}]},"c:中午":{"radicals":[{"char":"中","pinyin":"zhōng","meaning":"middle/center","role":"the midpoint — the exact middle of the day"},{"char":"午","pinyin":"wǔ","meaning":"noon","role":"the sundial gnomon at its peak — the precise midday moment"}],"etymology":"中 (middle/center) + 午 (noon, the sun's zenith) = the middle of noon = midday. 午 depicted the gnomon of a sundial standing perfectly vertical at noon, when shadows are shortest. 中午 = the exact center of the day. Compare: 上午 (morning = before noon), 中午 (noon = middle of day), 下午 (afternoon = after noon).","memory_tip":"中 (middle) + 午 (noon) = the exact middle of the day = midday! The three time periods: 上午 (AM = before noon), 中午 (noon = middle), 下午 (PM = after noon). 中午吃什么？= What are you eating for lunch? (What are you eating at midday?). 午饭 = lunch (noon meal). 中午好！= Good noon!","examples":[{"cn":"中午我们去吃饭。","pinyin":"Zhōngwǔ wǒmen qù chīfàn.","en":"We're going to eat lunch at noon."},{"cn":"中午十二点。","pinyin":"Zhōngwǔ shí'èr diǎn.","en":"Noon is twelve o'clock."},{"cn":"你中午吃什么？","pinyin":"Nǐ zhōngwǔ chī shénme?","en":"What are you eating for lunch?"}]},"c:住":{"radicals":[{"char":"亻","pinyin":"rén","meaning":"person","role":"left — person radical"},{"char":"主","pinyin":"zhǔ","meaning":"master/owner/stay","role":"right — a lamp or candle on a stand, the light of home"}],"etymology":"住 = person (亻) + master/stay (主) = a person staying as master/owner of a place = to live, reside. 主 originally depicted a lamp flame on a stand — the warm light of home, the central presence. A person who has that warm central presence in a place = one who lives there. 住 captures the permanence of residing.","memory_tip":"Person (亻) + the warm lamp of home (主) = 住 = live/reside! 主 shows a flame on a stand — the hearth light, the center of home. A person settled by the home-light = someone who lives there. 你住哪儿？= Where do you live? 我住北京 = I live in Beijing. 住 = the person rooted by their home's lamp.","examples":[{"cn":"你住哪儿？","pinyin":"Nǐ zhù nǎr?","en":"Where do you live?"},{"cn":"我住北京。","pinyin":"Wǒ zhù Běijīng.","en":"I live in Beijing."},{"cn":"他住在学校附近。","pinyin":"Tā zhù zài xuéxiào fùjìn.","en":"He lives near the school."}]},"c:桌子":{"radicals":[{"char":"木","pinyin":"mù","meaning":"wood/tree","role":"left of 桌 — tables are made of wood"},{"char":"卓","pinyin":"zhuó","meaning":"outstanding/high","role":"right of 桌 — tall, elevated, rising above"},{"char":"子","pinyin":"zǐ","meaning":"child/object","role":"noun suffix — marks it as a concrete thing"}],"etymology":"桌 has the wood radical (木) since tables are wooden, with 卓 (tall, outstanding, elevated) — a table rises above the floor to a convenient height. The 子 noun suffix, shared with 椅子 (chair), 杯子 (cup), marks it as a physical object. 桌子 = elevated wooden thing = table/desk.","memory_tip":"Wood radical (木) = it's wooden. 卓 = tall/elevated (a table stands above the floor!). 子 = object suffix. Elevated wooden object = 桌子 = table! 卓 itself means 'outstanding/elevated' — used in names and expressions of excellence (卓越 = outstanding). Your 桌子 literally stands above others. 书在桌子上 = book on the table.","examples":[{"cn":"书在桌子上。","pinyin":"Shū zài zhuōzi shàng.","en":"The book is on the table."},{"cn":"桌子上有什么？","pinyin":"Zhuōzi shàng yǒu shénme?","en":"What is on the table?"},{"cn":"这个桌子很大。","pinyin":"Zhège zhuōzi hěn dà.","en":"This table is very big."}]},"c:字":{"radicals":[{"char":"宀","pinyin":"mián","meaning":"roof/cover","role":"top — a roof, the school or writing hall"},{"char":"子","pinyin":"zǐ","meaning":"child","role":"bottom — a child learning to write"}],"etymology":"字 shows a child (子) under a roof (宀) — a child inside a school or study hall, learning to form characters. The character literally depicts the act of character-learning. 字 means written character, word, or handwriting style. 汉字 = Chinese characters (Han-characters). Writing is what happens when a child takes shelter and learns under a roof.","memory_tip":"Child (子) under a roof (宀) = 字 = written character! A child sheltered in school learning to write — that's the origin of every character. 你会写这个字吗？= Can you write this character? 汉字 = Chinese characters (Han-字). 名字 = name (name-character). 字典 = dictionary (character-reference). Every 字 was once a child's first lesson.","examples":[{"cn":"这个字怎么写？","pinyin":"Zhège zì zěnme xiě?","en":"How do you write this character?"},{"cn":"汉字很有意思。","pinyin":"Hànzì hěn yǒu yìsi.","en":"Chinese characters are very interesting."},{"cn":"我会写一百个汉字。","pinyin":"Wǒ huì xiě yībǎi gè Hànzì.","en":"I can write 100 Chinese characters."}]},"c:昨天":{"radicals":[{"char":"昨","pinyin":"zuó","meaning":"yesterday","role":"sun (日) + 昨-phonetic — the sun of the day that has passed"},{"char":"天","pinyin":"tiān","meaning":"sky/heaven/day","role":"big person (大) with sky above — a day marked by its sky"}],"etymology":"昨 has the sun radical (日) indicating a day, with a phonetic component providing the zuó sound. 天 = sky/day (a person with sky above). 昨天 = yesterday's sky = yesterday. The three-day family: 昨天 (yesterday = old day), 今天 (today = present day), 明天 (tomorrow = bright next day). Each is a different sky overhead.","memory_tip":"昨 (a past sun/day) + 天 (sky/day) = yesterday's sky = 昨天 = yesterday! The time family: 昨天 → 今天 → 明天 = yesterday → today → tomorrow. Three skies in a row. Also extended: 昨年 = last year? No — use 去年 (last year). But 前天 = day before yesterday and 后天 = day after tomorrow extend the pattern further!","examples":[{"cn":"昨天我去了北京。","pinyin":"Zuótiān wǒ qù le Běijīng.","en":"Yesterday I went to Beijing."},{"cn":"昨天天气怎么样？","pinyin":"Zuótiān tiānqì zěnmeyàng?","en":"What was the weather like yesterday?"},{"cn":"昨天我没有吃早饭。","pinyin":"Zuótiān wǒ méiyǒu chī zǎofàn.","en":"Yesterday I didn't eat breakfast."}]},"c:坐":{"radicals":[{"char":"土","pinyin":"tǔ","meaning":"earth/ground","role":"bottom — the ground being sat upon"},{"char":"人","pinyin":"rén","meaning":"person","role":"two people sitting on the ground — the act of sitting"}],"etymology":"坐 shows two people (人人) sitting on the ground (土) — a simple, vivid pictograph of the act of sitting. Two figures seated on earth = 坐. Extended to mean 'ride' in certain contexts (坐车 = ride a vehicle = sit in a vehicle). The image of two seated figures is clear and memorable.","memory_tip":"Two people (人人) sitting on the ground (土) = 坐 = sit! It's a tiny scene: two figures, legs folded, on the earth. 坐 also means 'ride' for seated transport: 坐出租车 (ride a taxi), 坐飞机 (take a plane), 坐船 (take a boat) — because you sit in all of them. 请坐！= Please sit down! (The two-person welcome.)","examples":[{"cn":"请坐！","pinyin":"Qǐng zuò!","en":"Please sit down!"},{"cn":"他坐在椅子上。","pinyin":"Tā zuò zài yǐzi shàng.","en":"He is sitting on the chair."},{"cn":"我们坐飞机去北京。","pinyin":"Wǒmen zuò fēijī qù Běijīng.","en":"We are taking a plane to Beijing."}]},"c:做":{"radicals":[{"char":"亻","pinyin":"rén","meaning":"person","role":"left — person radical, a person performing actions"},{"char":"故","pinyin":"gù","meaning":"reason/cause/incident","role":"right — phonetic; something done on purpose, intentional action"}],"etymology":"做 = person (亻) + 故 (purposeful cause/action) = a person doing something deliberately = do/make. 做 emphasizes deliberate, crafted action: 做饭 (cook = make food), 做作业 (do homework), 做生意 (do business). Compare with 干 (do, more physical labor) and 作 (make/create, more artistic). 做 = the purposeful person in action.","memory_tip":"Person (亻) doing something on purpose (故 = intentional cause) = 做 = do/make! 做 is deliberate action: 做饭 (cook/make food), 做作业 (do homework), 做梦 (dream = do a dream), 做朋友 (be friends = make friendship). 你做什么工作？= What work do you do? 做 is the all-purpose 'do/make' for intentional human activity.","examples":[{"cn":"他会做饭。","pinyin":"Tā huì zuò fàn.","en":"He can cook."},{"cn":"你在做什么？","pinyin":"Nǐ zài zuò shénme?","en":"What are you doing?"},{"cn":"我做了一个蛋糕。","pinyin":"Wǒ zuò le yī gè dàngāo.","en":"I made a cake."}]},"c:哪":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"left — asking is a spoken act"},{"char":"那","pinyin":"nà","meaning":"that/there","role":"right — 那 provides the nǎ sound; 哪 = asking about 'that' direction"}],"etymology":"哪 has the mouth radical (口) because asking 'which?' is an oral act, combined with 那 (that) as the phonetic component. 哪 and 那 are a minimal pair differing only in tone: 哪 (nǎ, 3rd tone) = which?, 那 (nà, 4th tone) = that. The mouth radical distinguishes the question form. 哪 is used before measure words: 哪个 (which one?), 哪本书 (which book?).","memory_tip":"哪 = mouth (口) + 那 (that) = asking about 'which that one'! Tone is everything: 哪 (nǎ, 3rd tone, falling-rising) = WHICH?, 那 (nà, 4th tone, falling) = THAT. Same character shape, different tone, totally different meaning. 哪个？= Which one? 哪本？= Which book? When you hear the questioning rise in the tone, that's 哪.","examples":[{"cn":"你喜欢哪个？","pinyin":"Nǐ xǐhuān nǎ gè?","en":"Which one do you like?"},{"cn":"你是哪国人？","pinyin":"Nǐ shì nǎ guó rén?","en":"What country are you from?"},{"cn":"哪本书是你的？","pinyin":"Nǎ běn shū shì nǐ de?","en":"Which book is yours?"}]},"c:哪儿":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"left of 哪 — a spoken question"},{"char":"那","pinyin":"nà","meaning":"that","role":"phonetic base of 哪"},{"char":"儿","pinyin":"ér","meaning":"erhua suffix","role":"Beijing 'r' curl — converts 哪 into the colloquial 'where?'"}],"etymology":"哪儿 = 哪 (which?) + 儿 (erhua 'r' suffix) = where? The 儿 suffix is characteristic of northern Mandarin, especially Beijing speech, and is used to make location question words: 哪儿 (where?), 这儿 (here), 那儿 (there). In southern China and Taiwan, 哪里 is preferred. Both mean the same thing; 哪儿 is more colloquial and northern.","memory_tip":"哪 (which?) + 儿 (Beijing 'r' curl) = 哪儿 = WHERE? The 儿 suffix creates location words: 这儿 (here), 那儿 (there), 哪儿 (where?). It's the Beijing accent's location-marker. In Beijing: 哪儿？In Taiwan/south: 哪里？Same meaning, different flavor. 你在哪儿？= Where are you? The most useful location question.","examples":[{"cn":"你在哪儿？","pinyin":"Nǐ zài nǎr?","en":"Where are you?"},{"cn":"厕所在哪儿？","pinyin":"Cèsuǒ zài nǎr?","en":"Where is the bathroom?"},{"cn":"你从哪儿来？","pinyin":"Nǐ cóng nǎr lái?","en":"Where are you from?"}]},"c:那":{"radicals":[{"char":"冄","pinyin":"rǎn","meaning":"whiskers/flowing","role":"left — a flowing form"},{"char":"阝","pinyin":"yì","meaning":"city/mound","role":"right — the right-side city/place radical"}],"etymology":"那 originally depicted a place at a distance — the city/place radical (阝) combined with a flowing form suggesting something over there, away. It is the distal demonstrative: 那 (that, over there) contrasting with 这 (this, near here). As a minimal pair with 哪: 那 (nà, 4th tone) = that, 哪 (nǎ, 3rd tone) = which?","memory_tip":"那 (nà, falling 4th tone) = THAT (over there). 这 (zhè) = THIS (near me). Near = 这; Far = 那. The contrast defines Chinese demonstratives. Tone alert: 那 (nà, that) vs 哪 (nǎ, which?) — same shape, different tones! 那个 = that one. 那些 = those. 那里/那儿 = there. Point away from yourself and say 那!","examples":[{"cn":"那是什么？","pinyin":"Nà shì shénme?","en":"What is that?"},{"cn":"那个人是谁？","pinyin":"Nà gè rén shì shéi?","en":"Who is that person?"},{"cn":"那本书是我的。","pinyin":"Nà běn shū shì wǒ de.","en":"That book is mine."}]},"c:呢":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"left — a spoken/voiced particle"},{"char":"尼","pinyin":"ní","meaning":"nun/close","role":"right — phonetic, gives the ne sound; also suggests closeness or continuation"}],"etymology":"呢 has the mouth radical (口) because it is a purely spoken grammatical particle — it has no meaning without being voiced in context. 呢 serves multiple functions: a tag question (你呢？= And you?), a soft question at the end of a statement (你在哪儿呢？= Where are you?), and marks ongoing situations (他在睡觉呢 = he's sleeping right now). It adds softness and continuity.","memory_tip":"呢 = the 'and you?' particle! After answering a question, add 呢 to bounce it back: 我很好，你呢？= I'm fine, and you? It softens everything it touches — questions become gentler, statements become more conversational. 你在哪儿呢？= Where are you? (softer than 你在哪儿). 他在睡觉呢 = He's sleeping (right now, ongoing). The conversational glue.","examples":[{"cn":"我很好，你呢？","pinyin":"Wǒ hěn hǎo, nǐ ne?","en":"I'm fine, and you?"},{"cn":"他在哪儿呢？","pinyin":"Tā zài nǎr ne?","en":"Where is he?"},{"cn":"你吃了，我呢？","pinyin":"Nǐ chī le, wǒ ne?","en":"You ate — what about me?"}]},"c:能":{"radicals":[{"char":"厶","pinyin":"sī","meaning":"private/self","role":"upper left — self, inner capacity"},{"char":"月","pinyin":"yuè","meaning":"flesh/body","role":"middle — physical, bodily capability"},{"char":"匕匕","pinyin":"bǐ","meaning":"spoons/bears","role":"lower — original pictograph of a bear, the animal of great strength"}],"etymology":"能 was originally a pictograph of a bear — the animal of tremendous physical power in ancient China. Bears could do things humans couldn't: smash through trees, catch fish with paws, endure winter. From 'having a bear's capability' came the meaning 'to be physically able to, to be capable'. The bear's strength = capability = 能.","memory_tip":"能 was originally a BEAR — the most powerful animal! Bears could do things humans couldn't, so 能 came to mean physical capability. 我能 = I can (I have bear-strength for this). Compare: 会 (can = learned skill: 我会说中文), 能 (can = have the ability/capacity: 我能来 = I'm able to come). 能 is raw capacity; 会 is acquired skill.","examples":[{"cn":"你能帮我吗？","pinyin":"Nǐ néng bāng wǒ ma?","en":"Can you help me?"},{"cn":"我能说一点儿汉语。","pinyin":"Wǒ néng shuō yīdiǎnr Hànyǔ.","en":"I can speak a little Chinese."},{"cn":"他今天不能来。","pinyin":"Tā jīntiān bù néng lái.","en":"He can't come today."}]},"c:你":{"radicals":[{"char":"亻","pinyin":"rén","meaning":"person","role":"left — the person radical"},{"char":"尔","pinyin":"ěr","meaning":"you (archaic)","role":"right — the ancient word for 'you', now rarely used alone"}],"etymology":"你 = person (亻) + 尔 (archaic 'you') = you! 尔 was the classical Chinese word for 'you' (as in 尔等 = you all). The modern 你 simply makes it explicit with the person radical — adding 亻 specifies it is a person being addressed. Polite form: 您 (nín) = respectful you, adding 心 (heart) — addressing someone with heartfelt respect.","memory_tip":"Person (亻) + ancient 'you' (尔) = 你 = you! The person radical (亻) marks it as addressing a specific human. Polite upgrade: 您 = 你 + 心 (heart) = you with heartfelt respect. Use 您 with elders and seniors. The trio: 我 (I) + 你 (you) + 他/她 (he/she) = the three persons of Chinese grammar. 你好 = Hello! (you-good!)","examples":[{"cn":"你好！","pinyin":"Nǐ hǎo!","en":"Hello!"},{"cn":"你是学生吗？","pinyin":"Nǐ shì xuésheng ma?","en":"Are you a student?"},{"cn":"你叫什么名字？","pinyin":"Nǐ jiào shénme míngzi?","en":"What is your name?"}]}};</script>

// CACHE — File System Access API with localStorage fallback

let cacheData = {};     // { [charKey]: aiInfo }
let fileHandle = null;  // FileSystemFileHandle

async function initCache() {
  // Standalone build: cache embedded at build time
  if (window.__EMBEDDED_CACHE__) {
    cacheData = window.__EMBEDDED_CACHE__;
    markFileBtnAutoLoaded();
    return;
  }

  // Try to restore saved file handle from IndexedDB
  try {
    fileHandle = await idbGet('cacheFileHandle');
    if (fileHandle) {
      const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        await loadCacheFromFile();
        markFileBtnLinked(fileHandle.name);
        return;
      } else {
        fileHandle = null;
      }
    }
  } catch(e) { fileHandle = null; }

  // Auto-load from served cache file (works when running via dev server or same origin)
  try {
    const res = await fetch('./hsk1-cache.json');
    if (res.ok) {
      const parsed = await res.json();
      cacheData = parsed.cache || parsed;
      markFileBtnAutoLoaded();
      return;
    }
  } catch(e) {}

  // Fallback: load from localStorage
  try {
    const raw = localStorage.getItem('hsk1_cache_v2');
    if (raw) cacheData = JSON.parse(raw);
  } catch(e) {}
}

async function loadCacheFromFile() {
  try {
    const file = await fileHandle.getFile();
    const text = await file.text();
    const parsed = JSON.parse(text);
    // Handle both generator format {cache,errors,count} and flat format
    cacheData = parsed.cache || parsed;
  } catch(e) { cacheData = {}; }
}

async function saveCache() {
  const json = JSON.stringify(cacheData, null, 2);
  if (fileHandle) {
    try {
      const perm = await fileHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        const writable = await fileHandle.createWritable();
        await writable.write(json);
        await writable.close();
        return;
      }
    } catch(e) {}
  }
  // Fallback to localStorage
  try { localStorage.setItem('hsk1_cache_v2', json); } catch(e) {}
}

async function handleCacheFile() {
  if (!window.showOpenFilePicker && !window.showSaveFilePicker) {
    toast('File System API not supported in this browser. Using localStorage.');
    return;
  }
  try {
    // Try to open existing cache file
    const [fh] = await window.showOpenFilePicker({
      types: [{ description: 'Cache JSON', accept: { 'application/json': ['.json'] } }],
      multiple: false
    });
    fileHandle = fh;
    await idbSet('cacheFileHandle', fileHandle);
    await loadCacheFromFile();
    markFileBtnLinked(fileHandle.name);
    renderGrid();
    updateCacheStats();
    toast(`Linked: ${fileHandle.name} (${Object.keys(cacheData).length} entries loaded)`);
  } catch(e) {
    if (e.name === 'AbortError') return;
    // Maybe they want to create a new file
    try {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: 'hsk1-cache.json',
        types: [{ description: 'Cache JSON', accept: { 'application/json': ['.json'] } }]
      });
      await idbSet('cacheFileHandle', fileHandle);
      await saveCache();
      markFileBtnLinked(fileHandle.name);
      toast(`Created: ${fileHandle.name}`);
    } catch(e2) { if (e2.name !== 'AbortError') toast('Could not link file.'); }
  }
}

// ─────────────────────────────────────────────
// IndexedDB helpers (for persisting file handle)
// ─────────────────────────────────────────────
function idbGet(key) {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open('hsk1app', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('store');
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('store', 'readonly');
        const r = tx.objectStore('store').get(key);
        r.onsuccess = () => resolve(r.result ?? null);
        r.onerror = () => resolve(null);
      };
      req.onerror = () => resolve(null);
    } catch(e) { resolve(null); }
  });
}

function idbSet(key, value) {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open('hsk1app', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('store');
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('store', 'readwrite');
        tx.objectStore('store').put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => resolve();
      };
      req.onerror = () => resolve();
    } catch(e) { resolve(); }
  });
}

function cacheKey(word) {
  const prefix = activeCollection.id === 'hsk1' ? '' : activeCollection.id + ':';
  return prefix + 'c:' + word.c;
}
function loadFromCache(word) { return cacheData[cacheKey(word)] || null; }
function saveToCache(word, info) {
  cacheData[cacheKey(word)] = info;
  saveCache();
}
function cachedCount() {
  const prefix = activeCollection.id === 'hsk1' ? 'c:' : activeCollection.id + ':c:';
  return Object.keys(cacheData).filter(k => k.startsWith(prefix)).length;
}
function updateCacheStats() {
  const el = document.getElementById('cacheStats');
  if (el) el.textContent = `${cachedCount()} / ${activeCollection.chars.length} cached`;
}

function filterChars() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortSelect').value;
  filtered = activeCollection.chars.filter(w => {
    const mq = !q || w.c.includes(q) || w.p.toLowerCase().includes(q) || w.e.toLowerCase().includes(q);
    const mc = !cat || w.cat === cat;
    return mq && mc;
  });
  if (sort === 'pinyin') filtered.sort((a,b) => a.p.localeCompare(b.p, 'zh'));
  else if (sort === 'strokes') filtered.sort((a,b) => a.s - b.s);
  document.getElementById('charCount').textContent = `${filtered.length} character${filtered.length!==1?'s':''}`;
  activeIdx = null;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = filtered.map((w, i) => {
    const isActive = i === activeIdx;
    const isCached = !!loadFromCache(w);
    return `<button class="char-btn${isActive?' active':''}${isCached?' cached':''}" onclick="selectChar(${i})" title="${w.c} · ${w.p} · ${w.e}">
      <span class="cb-char">${w.c[0]}</span>
      <div class="cb-pin">${w.p.split(' ')[0]}</div>
      <div class="cb-en">${w.e.split('/')[0].trim()}</div>
    </button>`;
  }).join('');
}

function selectChar(idx, switchToTab) {
  activeIdx = idx;
  activeExprIdx = null;
  activeWord = filtered[idx];
  if (switchToTab) {
    document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.stab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.stab').classList.add('active');
    document.getElementById('tab-chars').classList.add('active');
  }
  renderGrid();
  renderExprList();
  showCharDetail(activeWord, idx);
}

// Navigate to a character by its glyph (used from compound/expression links)
function goToChar(glyph) {
  const idx = activeCollection.chars.findIndex(w => w.c[0] === glyph || w.c === glyph);
  if (idx === -1) { toast(`${glyph} is not in this collection`); return; }
  // Reset filter so character is visible
  document.getElementById('searchInput').value = '';
  document.getElementById('catFilter').value = '';
  document.getElementById('sortSelect').value = 'hsk';
  filtered = [...activeCollection.chars];
  document.getElementById('charCount').textContent = `${filtered.length} characters`;
  const filtIdx = filtered.findIndex(w => w.c === activeCollection.chars[idx].c);
  selectChar(filtIdx, true);
  // Scroll char into view
  setTimeout(() => {
    const btns = document.querySelectorAll('.char-btn');
    if (btns[filtIdx]) btns[filtIdx].scrollIntoView({ block: 'nearest' });
  }, 50);
}

async function loadAI(word, idx) {
  const prompt = `You are a Mandarin Chinese teacher and linguist. Analyze the HSK 1 character/word: ${word.c} (pinyin: ${word.p}, meaning: ${word.e}).

Respond ONLY with a valid JSON object (no markdown, no backticks, no extra text) with exactly these keys:
{
  "radicals": [{"char": "radical_character", "pinyin": "pīnyīn", "meaning": "meaning in English", "role": "brief description of its role or contribution to this character"}],
  "etymology": "2-3 sentences on pictographic origin, semantic logic, or historical evolution. Be specific and interesting.",
  "memory_tip": "A vivid 2-3 sentence mnemonic or visual story to help remember this character. Make it fun and concrete.",
  "examples": [
    {"cn": "sentence using ${word.c[0]}", "pinyin": "full pinyin with tones", "en": "English translation"},
    {"cn": "sentence using ${word.c[0]}", "pinyin": "full pinyin with tones", "en": "English translation"},
    {"cn": "sentence using ${word.c[0]}", "pinyin": "full pinyin with tones", "en": "English translation"}
  ]
}

Rules: analyze primary character ${word.c[0]}. Example sentences use mostly HSK 1 vocabulary. Return ONLY the JSON.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const raw = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '';
    let info;
    try { info = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e) { throw new Error('Parse error'); }
    saveToCache(word, info);
    updateCacheStats();
    const container = document.getElementById('aiContent');
    if (!container || activeIdx !== idx) return;
    container.innerHTML = renderAI(info, false);
  } catch(err) {
    const container = document.getElementById('aiContent');
    if (container && activeIdx === idx) {
      container.innerHTML = `<div class="error-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Could not load analysis. Please try again.
      </div>`;
    }
  }
}

// ─────────────────────────────────────────────
// EXPRESSIONS
// ─────────────────────────────────────────────
let filteredExprs = [...activeCollection.expressions];

function filterExprs() {
  const q = document.getElementById('exprSearch').value.toLowerCase();
  filteredExprs = activeCollection.expressions.filter(ex =>
    !q || ex.c.includes(q) || ex.p.toLowerCase().includes(q) || ex.e.toLowerCase().includes(q)
  );
  document.getElementById('exprCount').textContent = `${filteredExprs.length} expression${filteredExprs.length!==1?'s':''}`;
  renderExprList();
}

function renderExprList() {
  const list = document.getElementById('exprList');
  list.innerHTML = filteredExprs.map((ex, i) => {
    const isActive = i === activeExprIdx;
    return `<button class="expr-btn${isActive?' active':''}" onclick="selectExpr(${i})">
      <div class="eb-cn">${ex.c}</div>
      <div class="eb-pin">${ex.p}</div>
      <div class="eb-en">${ex.e}</div>
    </button>`;
  }).join('');
}

function selectExpr(idx) {
  activeExprIdx = idx;
  activeIdx = null;
  renderExprList();
  renderGrid();
  showExprDetail(filteredExprs[idx]);
}

function showExprDetail(expr) {
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-content">
      <div class="detail-hero">
        <div class="hero-char" style="font-size:48px; padding-top:12px;">${expr.c}</div>
        <div class="hero-meta">
          <div class="hero-pinyin">${expr.p}</div>
          <div class="hero-tags"><span class="tag tag-expr">expression</span></div>
          <div class="hero-meaning">${expr.e}</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header"><span class="section-label">Character breakdown</span><div class="section-line"></div></div>
        <div class="expr-detail-box">
          <div class="expr-hero-cn">
            ${expr.chars.map(ch => ch.link
              ? `<button class="expr-hero-char-link" onclick="goToChar('${ch.g}')" title="View ${ch.g}">${ch.g}</button>`
              : `<span title="${ch.p}: ${ch.e}">${ch.g}</span>`
            ).join('')}
          </div>
          <div class="expr-hero-pin">${expr.p}</div>
          <div class="expr-hero-en">${expr.e}</div>
          <div class="expr-breakdown">
            ${expr.chars.map(ch => `
              <div class="expr-char-row">
                <div class="expr-char-glyph">${ch.g}</div>
                <div class="expr-char-info">
                  <div class="expr-char-top">
                    <span class="expr-char-pin">${ch.p}</span>
                    <span class="expr-char-meaning">${ch.e}</span>
                  </div>
                  ${ch.role ? `<div class="expr-char-role">${ch.role}</div>` : ''}
                </div>
                ${ch.link ? `<button class="expr-link-btn" onclick="goToChar('${ch.g}')">Study ${ch.g} →</button>` : ''}
              </div>`).join('')}
          </div>
          ${expr.note ? `<div class="expr-note">${expr.note}</div>` : ''}
        </div>
      </div>
    </div>
  `;
  panel.scrollTop = 0;
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
(async () => {
  try {
    const savedId = localStorage.getItem('activeCollectionId');
    const saved = COLLECTIONS.find(c => c.id === savedId);
    if (saved) activeCollection = saved;
  } catch(e) {}

  document.getElementById('collectionSubtitle').textContent = activeCollection.subtitle;
  populateCollectionSelect();
  filtered = [...activeCollection.chars];
  filteredExprs = [...activeCollection.expressions];

  await initCache();
  filterChars();
  filterExprs();
  updateCacheStats();
})();
</script>
</body>
</html>
