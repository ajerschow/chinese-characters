 lěng sound"}],"etymology":"冷 has the ice radical (冫) on the left — two stylized ice crystals indicating temperature. The right side 令 is purely phonetic. The ice radical (冫) appears in many cold-temperature words: 冰 (ice), 冻 (freeze), 凉 (cool). Whenever you see those two dots on the left of a character, cold or frozen is involved.","memory_tip":"Two ice crystals on the left (冫) — brrr! That's the cold/ice radical. Whenever 冫 appears on the left, the character involves cold: 冷 (cold), 冰 (ice), 凉 (cool), 冻 (freeze). Compare: 冷 (cold, ice radical) vs 热 (hot, fire radical 灬 at bottom). Ice vs fire — opposite radicals, opposite temperatures!","examples":[{"cn":"今天很冷。","pinyin":"Jīntiān hěn lěng.","en":"Today is very cold."},{"cn":"冬天北京很冷。","pinyin":"Dōngtiān Běijīng hěn lěng.","en":"Beijing is very cold in winter."},{"cn":"这杯水冷了。","pinyin":"Zhè bēi shuǐ lěng le.","en":"This cup of water has gone cold."}]},"c:里":{"radicals":[{"char":"里","pinyin":"lǐ","meaning":"inside/village","role":"field (田) over earth (土) — the interior of a settlement, cultivated inner space"}],"etymology":"里 originally depicted a field (田) over earth (土) — the cultivated interior of a village, the space inside its boundaries. It became the general word for 'inside, within'. Also a traditional unit of distance (Chinese mile ≈ 500m — 公里 = kilometer). The interior of a settled, cultivated space = inside.","memory_tip":"Field (田) sitting on earth (土) = the inside of a settlement. 里 = inside. 里面 = inside (inner face). Pattern: 里 (inside), 外 (outside), 上 (above), 下 (below), 前 (front), 后 (back), 左 (left), 右 (right) — these eight directions are the core location words. 书在桌子里 = the book is inside the desk.","examples":[{"cn":"书在桌子里。","pinyin":"Shū zài zhuōzi lǐ.","en":"The book is in the desk."},{"cn":"家里有猫。","pinyin":"Jiā lǐ yǒu māo.","en":"There is a cat at home."},{"cn":"里面有人吗？","pinyin":"Lǐmiàn yǒu rén ma?","en":"Is there anyone inside?"}]},"c:六":{"radicals":[{"char":"亠","pinyin":"tóu","meaning":"lid/cover","role":"top — a rounded cover or roof"},{"char":"八","pinyin":"bā","meaning":"divide","role":"bottom — two diverging strokes below the cover"}],"etymology":"六 is among the most ancient number characters. The rounded top (亠) with two diverging strokes (八) below may represent a tent or shelter. Six in ancient Chinese cosmology represented yin and the human realm — between heaven (9) and earth (3). It is also the number of directions (up, down, and four cardinal points).","memory_tip":"六 looks like a little tent or hut — rounded roof (亠) over two splaying legs (八). It's the tent-shaped number. Remember its neighbors: 五 (5) has crossing strokes, 六 (6) has the tent shape, 七 (7) has a horizontal cut. Count: 四五六七八 (4-5-6-7-8) — learn them as a sequence and the shapes become familiar.","examples":[{"cn":"我有六个朋友。","pinyin":"Wǒ yǒu liù gè péngyou.","en":"I have six friends."},{"cn":"六月天气很好。","pinyin":"Liù yuè tiānqì hěn hǎo.","en":"June has good weather."},{"cn":"他六岁了。","pinyin":"Tā liù suì le.","en":"He is six years old."}]},"c:妈妈":{"radicals":[{"char":"女","pinyin":"nǚ","meaning":"woman/female","role":"left of 妈 — the woman/female radical"},{"char":"马","pinyin":"mǎ","meaning":"horse","role":"right of 妈 — phonetic only, gives the mā sound"}],"etymology":"妈 combines the woman radical (女) with 马 (horse) purely for its mā sound. Reduplicated as 妈妈 because babies naturally repeat syllables. The 'mama' sound is cross-linguistic: infants in every culture produce bilabial nasal sounds (m) first, leading to mama/maman/мама/أمّ across languages. Chinese simply formalized it with characters.","memory_tip":"女 (woman) + 马 (horse, just for the sound 'mā') = 妈, doubled to 妈妈. The horse is just a sound-hint — the woman radical carries the meaning. It's the same story worldwide: babies say 'mama' because m is the first consonant they can make. 妈妈, mama, maman, мама — all the same infant cry, different characters.","examples":[{"cn":"我妈妈是老师。","pinyin":"Wǒ māma shì lǎoshī.","en":"My mom is a teacher."},{"cn":"妈妈在家吗？","pinyin":"Māma zài jiā ma?","en":"Is mom at home?"},{"cn":"我想妈妈了。","pinyin":"Wǒ xiǎng māma le.","en":"I miss my mom."}]},"c:买":{"radicals":[{"char":"买","pinyin":"mǎi","meaning":"buy","role":"network/net (罒) over cowrie shell (贝) — catching goods with money"}],"etymology":"买 (simplified) originally showed a net (罒) over a cowrie shell (贝). Cowrie shells were ancient Chinese currency — the original money, used for over a millennium before metal coins. 'Casting a net to catch shells' = spending money to acquire things = buy. Compare 卖 (sell) which has an exit stroke on top, sending things away.","memory_tip":"Net (罒) over cowrie shell money (贝) = buy! You're netting goods with your shells (money). In ancient China, cowrie shells were actual currency — 贝 is the money/treasure radical. 买 (buy) vs 卖 (sell): 买 has a net catching things coming TO you; 卖 sends things away. Net + shells = buying.","examples":[{"cn":"我去买东西。","pinyin":"Wǒ qù mǎi dōngxi.","en":"I'm going to buy things."},{"cn":"你买了什么？","pinyin":"Nǐ mǎi le shénme?","en":"What did you buy?"},{"cn":"这个我要买。","pinyin":"Zhège wǒ yào mǎi.","en":"I want to buy this."}]},"c:猫":{"radicals":[{"char":"犭","pinyin":"quǎn","meaning":"animal/dog radical","role":"left — the animal radical, a running creature"},{"char":"苗","pinyin":"miáo","meaning":"seedling/sprout","role":"right — phonetic giving the māo sound; seedling's slender delicate form"}],"etymology":"猫 has the animal radical (犭) indicating it's a creature. The right side 苗 (seedling) provides the māo sound and perhaps evokes the cat's slender, graceful form — like a delicate plant. Fascinatingly, 苗 gives both the pronunciation AND a visual quality: a cat is as sleek and elegant as a young sprout.","memory_tip":"Animal radical (犭) on the left — it's a creature! The right side (苗) makes the māo sound — just like the sound a cat makes! 猫 literally contains its own meow: māo = meow! The animal that says its own name. Every time you say 猫, you're saying 'meow' in Chinese. The animal radical tells you it's a creature; the sound tells you which one.","examples":[{"cn":"我家有两只猫。","pinyin":"Wǒ jiā yǒu liǎng zhī māo.","en":"My family has two cats."},{"cn":"这只猫很可爱。","pinyin":"Zhè zhī māo hěn kě'ài.","en":"This cat is very cute."},{"cn":"猫在哪儿？","pinyin":"Māo zài nǎr?","en":"Where is the cat?"}]},"c:没关系":{"radicals":[{"char":"没","pinyin":"méi","meaning":"not have/sink","role":"water radical (氵) + phonetic — absence, something submerged and gone"},{"char":"关","pinyin":"guān","meaning":"close/connect/relate","role":"hands (廾) operating a gate bolt (门 shape) — closing, connecting things"},{"char":"系","pinyin":"xì","meaning":"connect/tie/system","role":"silk thread (糸) and hand — threading connections together"}],"etymology":"没 uses water (氵) to suggest disappearance — submerged and gone. 关 shows hands operating a latch — closing or connecting. 系 depicts silk threads being spun into connections. 没关系 = there is no (没) connection (关系) = it doesn't matter. Like cutting the thread between an apology and lasting resentment.","memory_tip":"没 (no/gone) + 关系 (connection/relationship) = no connection = it doesn't matter! When someone apologizes, you offer 没关系 and cut the thread of the apology. 关系 is a big word in Chinese culture — connections/relationships matter enormously. 没关系 says: I'm releasing you from this; no connection to any problem.","examples":[{"cn":"A: 对不起！B: 没关系！","pinyin":"A: Duìbuqǐ! B: Méi guānxi!","en":"A: Sorry! B: No worries!"},{"cn":"迟到了没关系。","pinyin":"Chídào le méi guānxi.","en":"Being late is fine."},{"cn":"没关系，下次注意就好。","pinyin":"Méi guānxi, xià cì zhùyì jiù hǎo.","en":"No worries — just be careful next time."}]},"c:没有":{"radicals":[{"char":"没","pinyin":"méi","meaning":"not have/submerge","role":"water radical (氵) + phonetic — absence, gone under water"},{"char":"有","pinyin":"yǒu","meaning":"have/possess","role":"hand (又) holding meat (月/肉) — holding something tangible"}],"etymology":"没 uses the water radical to suggest submersion — something gone under the surface, absent. 有 shows a hand (又) holding a piece of meat (月/肉 — the most valued possession in ancient times). 没有 = the absence of having = don't have, there is no. The contrast between holding-in-hand and water-submerged-absence is vivid.","memory_tip":"没 = something submerged and gone (water radical). 有 = hand holding meat = having something. 没有 = not holding, gone under = don't have! Imagine dropping something in deep water (没) — now you no longer have it (有). Splash! 没有. 我没有钱 = I have no money (my money went under).","examples":[{"cn":"我没有钱。","pinyin":"Wǒ méiyǒu qián.","en":"I don't have money."},{"cn":"家里没有水果。","pinyin":"Jiā lǐ méiyǒu shuǐguǒ.","en":"There is no fruit at home."},{"cn":"他没有来。","pinyin":"Tā méiyǒu lái.","en":"He didn't come."}]},"c:米饭":{"radicals":[{"char":"米","pinyin":"mǐ","meaning":"rice/grain","role":"a plant with grains scattering — rice grains on a stalk"},{"char":"饭","pinyin":"fàn","meaning":"cooked rice/meal","role":"food radical (饣) + reverse/transform (反) — raw grain transformed by cooking"}],"etymology":"米 depicts rice grains scattering from a central stalk — the dots represent individual rice kernels. 饭 has the food radical (饣, chopsticks over a bowl) with 反 (reverse/transform), indicating that raw grain has been turned into something by cooking. 米饭 = raw rice that has been cooked = steamed white rice.","memory_tip":"米 has a central cross (the rice stalk) with dots all around (the grains flying off)! Those dots ARE the rice kernels. Add 饭 (transformed food) and you get cooked rice. The food radical 饣 looks like a bowl with chopsticks — eating! 米饭 = 米 (grain dots) + 饣 (bowl-and-chopsticks) = cooked rice in a bowl.","examples":[{"cn":"我喜欢吃米饭。","pinyin":"Wǒ xǐhuān chī mǐfàn.","en":"I like eating rice."},{"cn":"晚饭有米饭吗？","pinyin":"Wǎnfàn yǒu mǐfàn ma?","en":"Is there rice for dinner?"},{"cn":"给我一碗米饭。","pinyin":"Gěi wǒ yī wǎn mǐfàn.","en":"Give me a bowl of rice."}]},"c:明天":{"radicals":[{"char":"明","pinyin":"míng","meaning":"bright/clear/next","role":"sun (日) + moon (月) — the two great lights = ultimate brightness = next"},{"char":"天","pinyin":"tiān","meaning":"sky/heaven/day","role":"big person (大) with a line above — the sky overhead, a day"}],"etymology":"明 is sun (日) + moon (月) = the two great lights combined = maximum brightness and clarity. It also means 'next' (the next bright day). 天 = the sky above a person = a day. 明天 = the next bright day = tomorrow. The three-day sequence: 昨天 (yesterday = old day), 今天 (today = now-day), 明天 (tomorrow = bright next-day).","memory_tip":"明 = sun (日) + moon (月) = two lights blazing = BRIGHT = next. 天 = sky/day. Bright next day = tomorrow = 明天! The beautiful sequence: 昨天 (yesterday, the past day), 今天 (today, the present day), 明天 (tomorrow, the bright future day). Two luminaries together herald the coming day.","examples":[{"cn":"明天见！","pinyin":"Míngtiān jiàn!","en":"See you tomorrow!"},{"cn":"明天我去北京。","pinyin":"Míngtiān wǒ qù Běijīng.","en":"Tomorrow I'm going to Beijing."},{"cn":"明天天气怎么样？","pinyin":"Míngtiān tiānqì zěnmeyàng?","en":"What's the weather like tomorrow?"}]},"c:名字":{"radicals":[{"char":"名","pinyin":"míng","meaning":"name/fame","role":"evening (夕) + mouth (口) — calling out in the dark so others know who you are"},{"char":"字","pinyin":"zì","meaning":"character/word","role":"child (子) under a roof (宀) — a child under a roof learning to write characters"}],"etymology":"名 is evening (夕) over mouth (口) — in the dark you call out your name so others know who you are. Your name is how you identify yourself when you cannot be seen. 字 shows a child (子) under a roof (宀) — characters/words are what children learn at school. 名字 = spoken name + written character = your full name.","memory_tip":"名 = calling out in the dark (mouth/口 + evening/夕) — your name announces you when unseen! 字 = child under a roof learning to write. Spoken name + written character = 名字 = your name. 你叫什么名字？= What name do you call out? What character is written for you? Your name lives in both sound and ink.","examples":[{"cn":"你叫什么名字？","pinyin":"Nǐ jiào shénme míngzi?","en":"What is your name?"},{"cn":"我的名字是李明。","pinyin":"Wǒ de míngzi shì Lǐ Míng.","en":"My name is Li Ming."},{"cn":"请写你的名字。","pinyin":"Qǐng xiě nǐ de míngzi.","en":"Please write your name."}]},"c:你好":{"radicals":[{"char":"你","pinyin":"nǐ","meaning":"you","role":"person radical (亻) + archaic 'you' (尔) — addressing another person"},{"char":"好","pinyin":"hǎo","meaning":"good","role":"woman (女) + child (子) — the image of harmony and goodness"}],"etymology":"你好 = you + good = Hello! Unlike English greetings that ask 'how are you?' (a question), 你好 is a declaration of goodwill: 'You are well! You are good!' It's a blessing framed as a greeting. The words affirm the other person's wellbeing rather than inquiring about it.","memory_tip":"你 (you) + 好 (good) = you are good = Hello! Chinese greetings declare rather than question — you're affirming the other person's wellbeing as a gift. 你好 = 'You are well!' vs English 'How are you?' (a question). 老师好！= Hello teacher! (teacher is good!). A greeting as a blessing.","examples":[{"cn":"你好！我叫王明。","pinyin":"Nǐ hǎo! Wǒ jiào Wáng Míng.","en":"Hello! My name is Wang Ming."},{"cn":"老师好！","pinyin":"Lǎoshī hǎo!","en":"Hello, teacher!"},{"cn":"你好，请问你是哪国人？","pinyin":"Nǐ hǎo, qǐngwèn nǐ shì nǎ guó rén?","en":"Hello, may I ask what country you're from?"}]},"c:年":{"radicals":[{"char":"禾","pinyin":"hé","meaning":"grain/harvest","role":"upper portion — grain stalks bending with their load"},{"char":"千","pinyin":"qiān","meaning":"thousand (phonetic)","role":"lower portion — phonetic, gives the nián sound"}],"etymology":"年 originally depicted a person carrying a sheaf of grain on their back — the annual harvest. A year was defined by the agricultural cycle: plant, grow, harvest, repeat. One harvest = one year. The character evolved from showing the full cycle of growth and gathering, with the grain stalk visible at the top.","memory_tip":"年 = the grain harvest (禾 at top) — one complete agricultural cycle = one year! Ancient farmers measured time by harvests, not calendars. One harvest = 一年. 今年 (this year), 明年 (next year), 去年 (last year). 新年快乐！= Happy New Year! (Happy new harvest!) The grain cycle gave us time.","examples":[{"cn":"今年我学汉语。","pinyin":"Jīnnián wǒ xué Hànyǔ.","en":"This year I'm studying Chinese."},{"cn":"你学了几年汉语？","pinyin":"Nǐ xué le jǐ nián Hànyǔ?","en":"How many years have you studied Chinese?"},{"cn":"新年快乐！","pinyin":"Xīnnián kuàilè!","en":"Happy New Year!"}]},"c:女儿":{"radicals":[{"char":"女","pinyin":"nǚ","meaning":"woman/female","role":"the female radical — a woman in a graceful posture"},{"char":"儿","pinyin":"ér","meaning":"child","role":"a simplified person with two prominent legs — a toddler"}],"etymology":"女 is an ancient pictograph of a woman in a graceful seated posture. 儿 shows a simplified person with two prominent legs — a toddler walking. Together: female child = daughter. Compare with 儿子 (son): 儿子 uses both child characters (儿 + 子); 女儿 uses the female marker (女) + child (儿). Elegant gender symmetry.","memory_tip":"女 (female) + 儿 (child/toddler) = daughter! Compare: 儿子 (son) = child + child. 女儿 (daughter) = female + child. The female radical (女) specifies it's a girl-child. Family vocabulary pattern: 女 = female marker. 妈妈 (mom), 女儿 (daughter), 姐姐 (older sister), 妹妹 (younger sister) — all have 女.","examples":[{"cn":"他有一个女儿。","pinyin":"Tā yǒu yī gè nǚér.","en":"He has a daughter."},{"cn":"我的女儿五岁了。","pinyin":"Wǒ de nǚér wǔ suì le.","en":"My daughter is five years old."},{"cn":"她是我的女儿。","pinyin":"Tā shì wǒ de nǚér.","en":"She is my daughter."}]},"c:朋友":{"radicals":[{"char":"朋","pinyin":"péng","meaning":"friend/associate","role":"two strings of cowrie shells — equals sharing wealth together"},{"char":"友","pinyin":"yǒu","meaning":"friend/companion","role":"two hands reaching toward each other — mutual helping"}],"etymology":"朋 originally showed two strings of cowrie shell currency side by side — friends are people you share your wealth with equally. 友 shows two hands reaching toward each other — mutual assistance. 朋友 = sharing wealth + helping hands = true friendship. The character encodes both dimensions: material sharing (朋) and action sharing (友).","memory_tip":"朋 = two strings of coins side by side (friends share wealth equally). 友 = two hands clasped (friends help each other). Sharing + helping hands = 朋友 = true friend! Both characters independently mean friend — doubling them means REAL friend. 好朋友 = good friend. 老朋友 = old friend. 你是我最好的朋友！","examples":[{"cn":"他是我的好朋友。","pinyin":"Tā shì wǒ de hǎo péngyou.","en":"He is my good friend."},{"cn":"我有很多朋友。","pinyin":"Wǒ yǒu hěn duō péngyou.","en":"I have many friends."},{"cn":"你的朋友叫什么名字？","pinyin":"Nǐ de péngyou jiào shénme míngzi?","en":"What is your friend's name?"}]},"c:漂亮":{"radicals":[{"char":"氵","pinyin":"shuǐ","meaning":"water","role":"left of 漂 — water, graceful flow and clarity"},{"char":"票","pinyin":"piào","meaning":"float/ticket","role":"right of 漂 — floating lightly, like something drifting on water"},{"char":"亮","pinyin":"liàng","meaning":"bright/shine","role":"high (亠) + brilliant torch below — something elevated and radiant"}],"etymology":"漂 has water (氵) with 票 (float, ticket) — something floating gracefully on water, light and elegant. 亮 shows a high platform (亠) with a brilliant lamp below — elevated brightness. 漂亮 = gracefully floating + brilliantly shining = beautiful. Chinese beauty is described as simultaneously light/graceful and radiant/bright.","memory_tip":"漂 = gracefully floating on water (like a lotus flower drifting). 亮 = brilliantly shining bright (torch on high). Float + shine = 漂亮 = beautiful! Chinese aesthetic: beauty is light (not heavy) AND luminous (not dull). When someone is 漂亮, they float with grace and shine with light. Elegant and radiant.","examples":[{"cn":"她很漂亮。","pinyin":"Tā hěn piàoliang.","en":"She is very beautiful."},{"cn":"这件衣服很漂亮。","pinyin":"Zhè jiàn yīfu hěn piàoliang.","en":"This piece of clothing is very beautiful."},{"cn":"今天天气很漂亮。","pinyin":"Jīntiān tiānqì hěn piàoliang.","en":"The weather today is beautiful."}]},"c:苹果":{"radicals":[{"char":"艹","pinyin":"cǎo","meaning":"grass/plant","role":"top of 苹 — the plant radical"},{"char":"平","pinyin":"píng","meaning":"flat/peaceful","role":"phonetic in 苹 — flat, even, level"},{"char":"果","pinyin":"guǒ","meaning":"fruit/result","role":"field/round fruit (田) on tree (木) — a round fruit growing on a tree"}],"etymology":"苹 has the plant radical (艹) with 平 (flat/level) — a flat-leafed plant. 果 is a picture of a round fruit (田 = round field shape) sitting atop a tree (木). Together: flat-leafed plant + fruit-on-tree = apple. 果 alone means any fruit or result — it's the 'result' of a plant's growth, which is why 结果 means 'result/outcome'.","memory_tip":"苹 = flat plant (grass crown + flat). 果 = fruit on a tree — LOOK at 果: a round fruit (田) sitting on top of a tree (木)! You can see it! Round ball balanced on top of two tree-legs. That visual IS 果. 苹果 = flat-leafed tree with round fruit = apple. 果 also means 'result' — the fruit of your efforts.","examples":[{"cn":"我喜欢吃苹果。","pinyin":"Wǒ xǐhuān chī píngguǒ.","en":"I like eating apples."},{"cn":"桌子上有三个苹果。","pinyin":"Zhuōzi shàng yǒu sān gè píngguǒ.","en":"There are three apples on the table."},{"cn":"这个苹果多少钱？","pinyin":"Zhège píngguǒ duōshao qián?","en":"How much is this apple?"}]},"c:七":{"radicals":[{"char":"七","pinyin":"qī","meaning":"seven","role":"the whole character — a horizontal stroke with a vertical cutting through"}],"etymology":"七 resembles the number 7 with an added horizontal base stroke — a cutting or dividing mark. Seven was significant in Chinese culture and Buddhism (seven days of creation of the week, the seven-character poem form). The character has clear horizontal-vertical geometry, distinct from its neighbors 六 (tent-shaped) and 八 (diverging).","memory_tip":"七 looks like a 7 with a horizontal stroke added at the bottom — a 7 with a foot! Compare its neighbors: 六 (tent shape), 七 (7 with foot), 八 (two lines diverging). Learn them in sequence: 五六七八九十 (5-6-7-8-9-10). Chant them and the shapes stick. 七月 = July, 七岁 = seven years old.","examples":[{"cn":"我有七个苹果。","pinyin":"Wǒ yǒu qī gè píngguǒ.","en":"I have seven apples."},{"cn":"七月很热。","pinyin":"Qī yuè hěn rè.","en":"July is very hot."},{"cn":"他七岁了。","pinyin":"Tā qī suì le.","en":"He is seven years old."}]},"c:钱":{"radicals":[{"char":"钅","pinyin":"jīn","meaning":"metal/gold","role":"left — the metal radical, indicating a metal object"},{"char":"戋","pinyin":"jiān","meaning":"small/thin","role":"right — small, thin; phonetic component"}],"etymology":"钱 has the metal radical (钅) indicating it is made of metal, combined with 戋 (small, thin) — small thin pieces of metal = coins. Ancient Chinese coins were indeed thin bronze discs with holes in the center. The character literally describes what coins are: small thin metal pieces. 钱 is also among China's most common surnames.","memory_tip":"Metal radical (钅) on the left — it's a metal object! + 戋 (small thin) = small thin metal pieces = coins = money! The character describes coins perfectly: thin metal. 多少钱？= How many thin-metal-pieces? = How much money? 有钱 = have money (wealthy). 没钱 = no money. Thin metal = 钱.","examples":[{"cn":"你有钱吗？","pinyin":"Nǐ yǒu qián ma?","en":"Do you have money?"},{"cn":"这个多少钱？","pinyin":"Zhège duōshao qián?","en":"How much money is this?"},{"cn":"我没有钱。","pinyin":"Wǒ méiyǒu qián.","en":"I don't have money."}]},"c:前面":{"radicals":[{"char":"前","pinyin":"qián","meaning":"front/before/forward","role":"boat (舟) + cutting blade (刈) — a boat cutting forward through water"},{"char":"面","pinyin":"miàn","meaning":"face/surface/side","role":"eye (目) within an outline — a face looking outward, a surface"}],"etymology":"前 shows a boat (舟) advancing with a cutting motion (刈, like a blade through water) — the forward thrust of a vessel. The forward movement became 'front, before'. Combined with 面 (face/side), 前面 = the front side = in front of. Together with 后面 (behind), they form the front-back axis of Chinese spatial language.","memory_tip":"前 = boat cutting forward (advance!). 面 = a face or side (eye in an outline). Front-face = 前面 = in front! The 面-suffix family: 前面 (front), 后面 (back), 左面 (left), 右面 (right), 里面 (inside), 外面 (outside). Learn 面 = side/face and attach any direction to make a location word.","examples":[{"cn":"学校在医院前面。","pinyin":"Xuéxiào zài yīyuàn qiánmiàn.","en":"The school is in front of the hospital."},{"cn":"我在你前面。","pinyin":"Wǒ zài nǐ qiánmiàn.","en":"I'm in front of you."},{"cn":"前面有一个商店。","pinyin":"Qiánmiàn yǒu yī gè shāngdiàn.","en":"There is a shop ahead."}]},"c:请":{"radicals":[{"char":"讠","pinyin":"yán","meaning":"speech/words","role":"left — the speech radical; please is expressed in words"},{"char":"青","pinyin":"qīng","meaning":"blue-green/young/pure","role":"right — fresh, pure, sincere; phonetic and semantic"}],"etymology":"请 has the speech radical (讠) indicating it involves words, with 青 (green/fresh/pure) providing both sound and nuance. 青 is the color of spring growth — fresh, young, pure, sincere. 请 = pure sincere speech = please, invite. The freshness of 青 gives 请 its quality of genuine, earnest courtesy.","memory_tip":"Speech radical (讠) + fresh/pure (青) = sincere words = please! 青 is spring-green freshness — that's the spirit of 请: pure, genuine, earnest politeness. 请进！= Please come in! 请坐！= Please sit! 请问！= May I ask? Every polite invitation uses 请. Spring-fresh sincere speech.","examples":[{"cn":"请进！","pinyin":"Qǐng jìn!","en":"Please come in!"},{"cn":"请问，厕所在哪儿？","pinyin":"Qǐngwèn, cèsuǒ zài nǎr?","en":"Excuse me, where is the bathroom?"},{"cn":"请坐！","pinyin":"Qǐng zuò!","en":"Please sit down!"}]},"c:去":{"radicals":[{"char":"土","pinyin":"tǔ","meaning":"earth/ground","role":"bottom — the ground being left behind"},{"char":"ム","pinyin":"sī","meaning":"self/private","role":"top — the self departing upward, away"}],"etymology":"去 originally showed a person departing from a place — the self lifting off from the earth, going away. The image: feet leaving the ground, a person moving away from the speaker. Contrast with 来 (come, approaching): 去 = movement away; 来 = movement toward. These two verbs define Chinese directional thinking.","memory_tip":"Person (top) lifting off the ground (土) = going away = 去! Compare: 来 (come toward me) vs 去 (go away from me). Chinese always centers the speaker: 去 = leaving MY location; 来 = arriving at MY location. 你去哪儿？= Where are you going (away from here)? 你来我家 = Come to my house (toward me).","examples":[{"cn":"我去学校。","pinyin":"Wǒ qù xuéxiào.","en":"I'm going to school."},{"cn":"你去哪儿？","pinyin":"Nǐ qù nǎr?","en":"Where are you going?"},{"cn":"他去北京了。","pinyin":"Tā qù Běijīng le.","en":"He went to Beijing."}]},"c:热":{"radicals":[{"char":"执","pinyin":"zhí","meaning":"hold/grasp","role":"upper part — grasping, holding firmly"},{"char":"灬","pinyin":"huǒ","meaning":"fire (four-dot form)","role":"bottom — four flames of the fire radical"}],"etymology":"热 has the four-dot fire radical (灬) at the bottom — the same four flames that appear in 照 (shine), 煮 (cook), and 然 (thus). The upper component relates to grasping or holding. Together: fire being held = sustained heat! The four dots are stylized flames — whenever you see 灬 at the bottom, heat or fire is involved.","memory_tip":"Four flames at the bottom (灬) = fire radical = HOT! When you see 灬 under a character, think: FIRE or HEAT. 热 = hot (fire underneath you). Compare: 冷 (cold) has ice crystals (冫) on the LEFT; 热 (hot) has fire (灬) at the BOTTOM. Ice on the side vs fire underneath — opposite radicals, opposite temperatures!","examples":[{"cn":"今天很热。","pinyin":"Jīntiān hěn rè.","en":"Today is very hot."},{"cn":"夏天北京很热。","pinyin":"Xiàtiān Běijīng hěn rè.","en":"Beijing is very hot in summer."},{"cn":"这杯茶很热。","pinyin":"Zhè bēi chá hěn rè.","en":"This cup of tea is very hot."}]},"c:人":{"radicals":[{"char":"人","pinyin":"rén","meaning":"person","role":"the whole character — a pictograph of a standing person seen in profile"}],"etymology":"人 is among the most ancient and beautiful characters: two strokes depicting a person standing upright, seen from the side. Left stroke = body/torso; right stroke = leg slightly spread for balance. It appears as a radical in hundreds of characters, either as 人 or the leaning form 亻 (used when on the left side). The most fundamental of all characters.","memory_tip":"Two strokes — a person standing sideways. Left stroke = body, right stroke = leg. It's walking! 人 is everywhere as the person radical (亻). When you see that leaning figure on the left of any character, a person is involved: 你 (you), 他 (he), 们 (plural people), 做 (do), 住 (live). The most fundamental mark in Chinese.","examples":[{"cn":"这里有很多人。","pinyin":"Zhèlǐ yǒu hěn duō rén.","en":"There are many people here."},{"cn":"他是一个好人。","pinyin":"Tā shì yī gè hǎo rén.","en":"He is a good person."},{"cn":"中国人很多。","pinyin":"Zhōngguó rén hěn duō.","en":"There are many Chinese people."}]},"c:认识":{"radicals":[{"char":"讠","pinyin":"yán","meaning":"speech","role":"left of 认 — knowing through language and conversation"},{"char":"忍","pinyin":"rěn","meaning":"endure/recognize","role":"right of 认 — patient recognition requires careful attention"},{"char":"识","pinyin":"shí","meaning":"know/recognize","role":"speech (讠) + phonetic 只 — knowing expressed through words"}],"etymology":"Both 认 and 识 carry the speech radical (讠) — knowing people is fundamentally a communicative act. 认 also contains 忍 (endure, patient attention) — recognizing takes careful, patient observation. 识 pairs speech with knowing. Together 认识 = to know/recognize a person. Crucially: 认识 is for knowing PEOPLE; 知道 is for knowing FACTS.","memory_tip":"Both characters have the speech radical (讠) — you know people through conversation! 认识 = to know/meet a person. 知道 = to know a fact/information. Key distinction: 认识王明 (know Wang Ming the person) vs 知道他的名字 (know his name, a fact). People you 认识; information you 知道. Speech connects you to people.","examples":[{"cn":"很高兴认识你。","pinyin":"Hěn gāoxìng rènshi nǐ.","en":"Very happy to meet you."},{"cn":"我不认识他。","pinyin":"Wǒ bù rènshi tā.","en":"I don't know him."},{"cn":"你认识她吗？","pinyin":"Nǐ rènshi tā ma?","en":"Do you know her?"}]},"c:日":{"radicals":[{"char":"日","pinyin":"rì","meaning":"sun/day","role":"the whole character — a pictograph of the sun with its bright center"}],"etymology":"日 is a direct pictograph of the sun: originally a circle with a dot at the center indicating the brilliant core. The squared form resulted from the evolution of brush-and-bamboo writing. 日 means both 'sun' and 'day' (a day is measured by the sun). It appears in countless compounds about time, light, and Japan (日本 = land of the sun's origin).","memory_tip":"日 = the sun squared — a circle with its bright center, made angular by brush strokes. Compare: 日 (sun, complete/full shape) vs 月 (moon, crescent/incomplete). Sun = square and full; moon = open and curved. 日 is in every time word: 今日 (today), 明日 (tomorrow), 生日 (birthday = day of birth), 日本 (Japan = sun's origin).","examples":[{"cn":"今天是星期日。","pinyin":"Jīntiān shì xīngqīrì.","en":"Today is Sunday."},{"cn":"他的生日是八月三日。","pinyin":"Tā de shēngrì shì bā yuè sān rì.","en":"His birthday is August 3rd."},{"cn":"日本在中国的东面。","pinyin":"Rìběn zài Zhōngguó de dōngmiàn.","en":"Japan is to the east of China."}]},"c:三":{"radicals":[{"char":"三","pinyin":"sān","meaning":"three","role":"the whole character — three horizontal strokes stacked, counting three"}],"etymology":"三 is pure visual counting: three horizontal strokes = three. With 一 (one) and 二 (two), they form the world's most intuitive numerals — tally marks. But 三 carries deep philosophical weight: in Chinese thought, three represents the trinity of Heaven (天), Earth (地), and Humanity (人) — the three powers that sustain the cosmos.","memory_tip":"Count the lines: one (一), two (二), three (三). Tally marks as characters! But also: 三 = heaven + earth + humans, the three powers. The most stable structure is a tripod. 三 is everywhere in culture: 三点水 (water radical with 3 drops), 三明治 (sandwich = three-bright-rule?), 早中晚三餐 (three meals). Three is the fundamental number.","examples":[{"cn":"我有三个朋友。","pinyin":"Wǒ yǒu sān gè péngyou.","en":"I have three friends."},{"cn":"他三十岁了。","pinyin":"Tā sānshí suì le.","en":"He is thirty years old."},{"cn":"三月很冷。","pinyin":"Sān yuè hěn lěng.","en":"March is very cold."}]},"c:商店":{"radicals":[{"char":"商","pinyin":"shāng","meaning":"trade/commerce","role":"a vessel or container under a cover — stored goods for commercial exchange"},{"char":"店","pinyin":"diàn","meaning":"shop/establishment","role":"shelter (广) + occupy (占) — a sheltered space occupied for business"}],"etymology":"商 was originally the name of the Shang dynasty, whose people were known as traders; 商 became synonymous with commerce. It shows goods stored under cover — merchandise ready for sale. 店 has the wide shelter radical (广) over 占 (to occupy) — a covered space taken over for business. Together: commercial establishment.","memory_tip":"商 = trade (from the merchant Shang dynasty — they basically invented Chinese commerce). 店 = sheltered business spot (广 roof + 占 occupy). Trading shelter = shop = 商店! The pattern: 商店 (shop), 饭店 (restaurant/hotel), 书店 (bookshop), 花店 (flower shop). 店 = any commercial shelter. Add what it sells!","examples":[{"cn":"商店在哪儿？","pinyin":"Shāngdiàn zài nǎr?","en":"Where is the shop?"},{"cn":"我去商店买东西。","pinyin":"Wǒ qù shāngdiàn mǎi dōngxi.","en":"I'm going to the shop to buy things."},{"cn":"这个商店很大。","pinyin":"Zhège shāngdiàn hěn dà.","en":"This shop is very big."}]},"c:上":{"radicals":[{"char":"上","pinyin":"shàng","meaning":"above/up/on","role":"the whole character — a short stroke sitting ON TOP of a base line"}],"etymology":"上 is elegantly simple: a short stroke above a longer baseline = up, above, on. Paired with 下 (below, a stroke under the baseline), these form the vertical axis of Chinese spatial language. 上 extends into many compounds: 上班 (go to work = go up to work), 上学 (go to school), 上来 (come up), 上午 (morning = above noon).","memory_tip":"上 = small stroke ON TOP of base line = up/above. 下 = small stroke HANGING BELOW = down/under. They're mirror images — draw them both and see the symmetry! 上下 = up and down. 上 is the direction of ambition: 上班 (go up to work), 上学 (go up to school), 上来 (come up). Upward is 上!","examples":[{"cn":"书在桌子上。","pinyin":"Shū zài zhuōzi shàng.","en":"The book is on the table."},{"cn":"他上楼了。","pinyin":"Tā shàng lóu le.","en":"He went upstairs."},{"cn":"你上学了吗？","pinyin":"Nǐ shàng xué le ma?","en":"Did you go to school?"}]},"c:上午":{"radicals":[{"char":"上","pinyin":"shàng","meaning":"above/before","role":"upward — before the peak"},{"char":"午","pinyin":"wǔ","meaning":"noon","role":"an ancient sundial gnomon at its highest point — the midday marker"}],"etymology":"上 (above/before) + 午 (noon, the sun's zenith) = before noon = morning. 午 originally depicted the vertical gnomon of a sundial at its highest point — noon when shadows are shortest. 上午 = the ascending half of the day; 下午 = the descending half. Noon (午) is the mountain peak dividing the day.","memory_tip":"Noon (午) is the day's peak. 上午 = climbing UP (上) toward noon = morning! 下午 = descending DOWN (下) from noon = afternoon! Think of the day as a mountain: you climb up (上午) to the noon peak (午), then descend down (下午). 上午好！= Good morning! (Good ascending-toward-noon!)","examples":[{"cn":"上午我学习，下午我休息。","pinyin":"Shàngwǔ wǒ xuéxí, xiàwǔ wǒ xiūxi.","en":"I study in the morning, rest in the afternoon."},{"cn":"他上午来。","pinyin":"Tā shàngwǔ lái.","en":"He's coming in the morning."},{"cn":"现在是上午十点。","pinyin":"Xiànzài shì shàngwǔ shí diǎn.","en":"It is now 10 AM."}]},"c:少":{"radicals":[{"char":"小","pinyin":"xiǎo","meaning":"small","role":"three dots — something small and divided"},{"char":"丿","pinyin":"piě","meaning":"slash/stroke","role":"an extra cutting stroke — reducing even further"}],"etymology":"少 is related to 小 (small) but reduced further by an extra slash — take something already small and cut it down more. 少 = few, little, lacking. The counterpart is 多 (many). Together 多少 = how many/much (spanning the full spectrum). Also: 少 as an adjective means 'few/little'; as a verb it means 'to lack/be short of'.","memory_tip":"少 = 小 (small) with an extra stroke slashing it down further. Even smaller than small = few! 多 (many) ↔ 少 (few): the quantity opposites. 多少 = how many? (asking where on the spectrum). Also: 少说 (speak less), 少吃 (eat less), 不少 (quite a few, not-few). The slash reduces; 少 means reduced.","examples":[{"cn":"这里人很少。","pinyin":"Zhèlǐ rén hěn shǎo.","en":"There are very few people here."},{"cn":"他吃得很少。","pinyin":"Tā chī de hěn shǎo.","en":"He eats very little."},{"cn":"请多说，少写。","pinyin":"Qǐng duō shuō, shǎo xiě.","en":"Please speak more, write less."}]},"c:谁":{"radicals":[{"char":"讠","pinyin":"yán","meaning":"speech","role":"left — asking 'who' is a verbal, spoken act"},{"char":"隹","pinyin":"zhuī","meaning":"short-tailed bird","role":"right — phonetic component, gives the shéi sound"}],"etymology":"谁 carries the speech radical (讠) on the left — asking 'who' is fundamentally a vocal act, a spoken question. The right side 隹 (short-tailed bird) is phonetic. 谁 is one of the core question words in Chinese: 谁 (who?), 什么 (what?), 哪 (which?), 哪儿 (where?), 为什么 (why?), 怎么 (how?), 几/多少 (how many?), 几点 (what time?).","memory_tip":"Speech radical (讠) on the left — WHO? is a spoken question! The bird (隹) on the right is just for pronunciation. Remember the question word family: 谁 (who?), 什么 (what?), 哪儿 (where?), 怎么 (how?), 多少 (how many?), 几点 (what time?). Master these seven and you can ask anything. 这是谁的？= Whose is this?","examples":[{"cn":"他是谁？","pinyin":"Tā shì shéi?","en":"Who is he?"},{"cn":"谁在学校？","pinyin":"Shéi zài xuéxiào?","en":"Who is at school?"},{"cn":"这是谁的书？","pinyin":"Zhè shì shéi de shū?","en":"Whose book is this?"}]},"c:什么":{"radicals":[{"char":"亻","pinyin":"rén","meaning":"person","role":"left of 什 — person radical"},{"char":"十","pinyin":"shí","meaning":"ten","role":"right of 什 — phonetic; ten types of people = assorted/various"},{"char":"么","pinyin":"me","meaning":"(question suffix)","role":"small, vague particle used in question and demonstrative words"}],"etymology":"什 has the person radical with 十 (ten) — originally meaning 'assorted, various' (ten kinds of people). 么 is a diminutive suffix used in question and demonstrative words. Together 什么 = what. 么 appears across the question and demonstrative word family: 什么 (what), 怎么 (how), 这么 (this way), 那么 (that way).","memory_tip":"什么 = WHAT! The most used question word. The 么 suffix is your question/demonstrative marker — it appears in 什么 (what), 怎么 (how), 这么 (this way), 那么 (that way). Spot 么 and know you're in question/pointer territory. 你在做什么？= What are you doing? 你叫什么名字？= What's your name?","examples":[{"cn":"这是什么？","pinyin":"Zhè shì shénme?","en":"What is this?"},{"cn":"你吃什么？","pinyin":"Nǐ chī shénme?","en":"What are you eating?"},{"cn":"你叫什么名字？","pinyin":"Nǐ jiào shénme míngzi?","en":"What is your name?"}]},"c:十":{"radicals":[{"char":"十","pinyin":"shí","meaning":"ten","role":"the whole character — a cross (+) marking the completion of one full counting cycle"}],"etymology":"十 is a cross — the symbol of completeness and totality appearing across many ancient cultures. One horizontal stroke (一) for the horizontal plane crossed by a vertical stroke (|) = the full measure, all directions covered. Ten completes the first cycle of counting (1-9 complete, 10 begins the tens). The intersection point = totality = ten.","memory_tip":"Plus sign (+) = 十 = ten! It's a cross marking the complete first cycle of numbers. After 九 (9), you reach the full cross: 十 (10). Then 十一 (11 = ten-one), 十二 (12 = ten-two)... The cross is complete, the new cycle begins. 十 is also in time: 十点 = 10 o'clock, 十分 = 10 minutes.","examples":[{"cn":"我有十本书。","pinyin":"Wǒ yǒu shí běn shū.","en":"I have ten books."},{"cn":"他十岁了。","pinyin":"Tā shí suì le.","en":"He is ten years old."},{"cn":"十月天气很好。","pinyin":"Shí yuè tiānqì hěn hǎo.","en":"October has very good weather."}]},"c:时候":{"radicals":[{"char":"日","pinyin":"rì","meaning":"sun/day","role":"left of 时 — the sun marks the passage of time"},{"char":"寸","pinyin":"cùn","meaning":"inch/small measure","role":"right of 时 — measuring tiny increments of time"},{"char":"候","pinyin":"hòu","meaning":"wait/season/moment","role":"person (亻) + climate marker — a person waiting for the right season"}],"etymology":"时 = sun (日) + inch (寸) — measuring the sun's movement in tiny increments. Every inch the sun travels marks a moment. 候 = a person (亻) waiting for the right seasonal or momentary conditions. Together: measured waiting-moments = time / when / the right moment. 什么时候 = at what measured, awaited moment?","memory_tip":"时 = sun measured in tiny inches = time ticking by moment by moment. 候 = person waiting for the right moment (like a farmer waiting for the season). Time + waiting-moment = 时候 = when/time. 什么时候？= When? (at what sun-inch waiting-moment?). 那个时候 = at that time (that measured moment).","examples":[{"cn":"你什么时候来？","pinyin":"Nǐ shénme shíhou lái?","en":"When are you coming?"},{"cn":"吃饭的时候不要说话。","pinyin":"Chīfàn de shíhou bú yào shuōhuà.","en":"Don't talk while eating."},{"cn":"那个时候我还小。","pinyin":"Nà gè shíhou wǒ hái xiǎo.","en":"At that time I was still young."}]},"c:是":{"radicals":[{"char":"日","pinyin":"rì","meaning":"sun","role":"top — the sun, source of all truth and light"},{"char":"疋","pinyin":"pǐ","meaning":"foot/upright","role":"bottom — walking straight, upright, correct"}],"etymology":"是 has the sun (日) at top with a component suggesting upright, correct walking. The sun shines on everything honestly and equally — it reveals what is true. From 'what the sun shows to be correct' came the copula 'to be'. 是 is also used for 'yes' when answering questions. The sun illuminates truth: 是 = to be = yes.","memory_tip":"Sun (日) on top — the sun shines honestly on everything, showing what's true. 是 = what the sun reveals as real = to be/is/am/are/yes! The sun of truth: 是! When you're sure about something, the sun of 是 shines on it. 是的 = yes (it's true). 不是 = no (it's not). 是 is your most essential verb.","examples":[{"cn":"我是学生。","pinyin":"Wǒ shì xuésheng.","en":"I am a student."},{"cn":"这是我的书。","pinyin":"Zhè shì wǒ de shū.","en":"This is my book."},{"cn":"是吗？","pinyin":"Shì ma?","en":"Really? / Is that so?"}]},"c:书":{"radicals":[{"char":"书","pinyin":"shū","meaning":"book","role":"the whole simplified character — a stylized brush making a flowing stroke"}],"etymology":"书 (simplified from 書) originally depicted a hand holding a writing brush, committing words to surface. The traditional form 書 showed 聿 (a hand grasping a brush) over 曰 (to say) — writing down what is spoken. The simplified 书 is an abstract brushstroke, elegant and flowing, capturing the motion of writing itself.","memory_tip":"书 looks like a single flowing brushstroke — the curve at top is the brush's sweep, the vertical is the handle. Writing = making books. 书 is the result of all that brushwork. 书 is everywhere: 书包 (schoolbag = book-bag), 书店 (bookstore), 图书馆 (library = picture-book-hall), 书法 (calligraphy = book-method).","examples":[{"cn":"我喜欢看书。","pinyin":"Wǒ xǐhuān kàn shū.","en":"I like reading books."},{"cn":"这本书很好看。","pinyin":"Zhè běn shū hěn hǎokàn.","en":"This book is very good."},{"cn":"书在桌子上。","pinyin":"Shū zài zhuōzi shàng.","en":"The book is on the table."}]},"c:水":{"radicals":[{"char":"水","pinyin":"shuǐ","meaning":"water","role":"the whole character — a flowing river with ripples on each side"}],"etymology":"水 is a pictograph of flowing water — the central stroke is the main current, with smaller strokes on each side representing ripples or eddies. As a radical (氵, three water-drops on the left), it identifies hundreds of water-related characters. Water is one of the Five Elements (木火土金水) in Chinese philosophy — fundamental to all existence.","memory_tip":"水 = a flowing river: central current (tall stroke) with ripples on each side. As the radical, it becomes three drops (氵) on the left: 河 (river), 海 (sea), 泳 (swim), 湖 (lake), 酒 (alcohol), 汉 (Han). Whenever you see 氵 on the left, water is involved. The river flows through hundreds of characters!","examples":[{"cn":"我想喝水。","pinyin":"Wǒ xiǎng hē shuǐ.","en":"I want to drink water."},{"cn":"这里有水吗？","pinyin":"Zhèlǐ yǒu shuǐ ma?","en":"Is there water here?"},{"cn":"喝水对身体好。","pinyin":"Hē shuǐ duì shēntǐ hǎo.","en":"Drinking water is good for your body."}]},"c:水果":{"radicals":[{"char":"水","pinyin":"shuǐ","meaning":"water","role":"water — fruit is essentially sweetened water stored in edible form"},{"char":"果","pinyin":"guǒ","meaning":"fruit/result","role":"round fruit (田) on tree (木) — a fruit growing on a tree"}],"etymology":"水 (water) + 果 (fruit growing on a tree) = water-fruit = fresh fruit! The Chinese insight: fruit is water packaged in a sweet, edible container. 果 stands alone to mean fruit or result (结果 = result, outcome). 水果 specifically means fresh fruit, distinguishing it from dried fruit (干果) or cooked food.","memory_tip":"Water (水) + fruit-on-tree (果) = water-fruit = fresh fruit! Fruit really is sweet water. 果 = round thing (田) on a tree (木) — look at it! A ball on top of two tree-legs. That round ball IS the fruit. 水果摊 = fruit stall. 你喜欢什么水果？= What's your favorite fruit? (What water-fruit do you like?)","examples":[{"cn":"我喜欢吃水果。","pinyin":"Wǒ xǐhuān chī shuǐguǒ.","en":"I like eating fruit."},{"cn":"家里有很多水果。","pinyin":"Jiā lǐ yǒu hěn duō shuǐguǒ.","en":"There is a lot of fruit at home."},{"cn":"你喜欢什么水果？","pinyin":"Nǐ xǐhuān shénme shuǐguǒ?","en":"What fruit do you like?"}]},"c:睡觉":{"radicals":[{"char":"目","pinyin":"mù","meaning":"eye","role":"left of 睡 — the eye"},{"char":"垂","pinyin":"chuí","meaning":"droop/hang down","role":"right of 睡 — drooping downward"},{"char":"觉","pinyin":"jiào","meaning":"feel/awaken/sleep","role":"see/perceive (见) under a cover — perception covered over by sleep"}],"etymology":"睡 brilliantly compounds eye (目) + droop (垂) = drooping eyelids = falling asleep! 垂 itself droops visually — the strokes literally hang down. 觉 puts a covering over perception (见) — awareness shrouded in unconsciousness. Together: droopy eyes + covered awareness = sleep.","memory_tip":"睡 = eye (目) + droop (垂) = eyelids drooping closed = sleep! Even the character 垂 LOOKS like it's drooping — strokes hanging down. 觉 = covered awareness (perception under a blanket). Droopy eyes + covered mind = 睡觉 = sleep. 你几点睡觉？= What time do you sleep? (When do your eyelids droop?)","examples":[{"cn":"我想睡觉了。","pinyin":"Wǒ xiǎng shuìjiào le.","en":"I want to sleep."},{"cn":"他在睡觉。","pinyin":"Tā zài shuìjiào.","en":"He is sleeping."},{"cn":"你几点睡觉？","pinyin":"Nǐ jǐ diǎn shuìjiào?","en":"What time do you go to sleep?"}]},"c:说话":{"radicals":[{"char":"讠","pinyin":"yán","meaning":"speech","role":"left of 说 — the speech radical"},{"char":"兑","pinyin":"duì","meaning":"exchange/speak","role":"right of 说 — exchanging words, a mutual speech act"},{"char":"话","pinyin":"huà","meaning":"speech/words","role":"speech (讠) + tongue (舌) — words produced by the tongue"}],"etymology":"说 has the speech radical (讠) with 兑 (exchange) — speaking as mutual exchange. 话 combines speech (讠) with 舌 (tongue) — literally 'tongue-speech'. Together 说话 = exchanging words + tongue-speech = to speak/talk. Both characters emphasize the oral, interpersonal, physical nature of speaking.","memory_tip":"说 = speech exchange (讠 + 兑 = speaking is exchanging). 话 = tongue-words (讠 + 舌 tongue). Exchange + tongue-words = 说话 = speak/talk! Both have the speech radical (讠). When you see 讠 on the left, language is happening: 说 (say), 话 (words), 语 (language), 请 (please), 谢 (thank), 读 (read). The talking radical!","examples":[{"cn":"请不要说话。","pinyin":"Qǐng bú yào shuōhuà.","en":"Please don't talk."},{"cn":"他说话很快。","pinyin":"Tā shuōhuà hěn kuài.","en":"He talks very fast."},{"cn":"我们来说话吧。","pinyin":"Wǒmen lái shuōhuà ba.","en":"Let's talk."}]},"c:四":{"radicals":[{"char":"囗","pinyin":"wéi","meaning":"enclosure/frame","role":"outer box — a container"},{"char":"儿","pinyin":"ér","meaning":"legs/two strokes","role":"two strokes inside — filling the enclosed space"}],"etymology":"四 evolved from tally marks showing four lines, then was stylized into an enclosure with two strokes inside. It resembles a box with legs. Cultural note: 四 (sì) sounds similar to 死 (sǐ, death), making 4 the unlucky number in Chinese culture — equivalent to Western 13. Buildings often skip floor 4; phone numbers with 4s are cheaper.","memory_tip":"四 = a box with two strokes inside — the enclosed four. Cultural warning: 4 is UNLUCKY in China because 四 (sì) ≈ 死 (sǐ, die)! Buildings skip floor 4, hospitals avoid room 4, phone numbers with 4s cost less. Western 13 = Chinese 4. But on the bright side, 一二三四 still sounds like a march: yi er san si!","examples":[{"cn":"我有四个苹果。","pinyin":"Wǒ yǒu sì gè píngguǒ.","en":"I have four apples."},{"cn":"四月天气很好。","pinyin":"Sì yuè tiānqì hěn hǎo.","en":"April has very good weather."},{"cn":"他四岁了。","pinyin":"Tā sì suì le.","en":"He is four years old."}]},"c:岁":{"radicals":[{"char":"山","pinyin":"shān","meaning":"mountain","role":"top — mountains endure through the ages, witnessing years pass"},{"char":"戌","pinyin":"xū","meaning":"11th earthly branch","role":"lower component — a time-marker in the ancient zodiac cycle"}],"etymology":"岁 originally related to the annual cycle of Jupiter's movement through the sky — the Chinese counted years by Jupiter's orbital position (approximately one zodiac station per year). The character evolved to include mountain (enduring time) with a zodiac time-marker. 岁 specifically means years of AGE, not calendar years (which use 年).","memory_tip":"岁 = years of YOUR life. Mountains (山) endure through the ages — 岁 counts how many ages you've survived! Remember: 岁 = years of age (几岁？= how old?), 年 = calendar years (几年？= how many years?). 我二十岁 = I am 20 years old. 你多大了？/ 你几岁了？= How old are you? The mountain counts your years.","examples":[{"cn":"你几岁了？","pinyin":"Nǐ jǐ suì le?","en":"How old are you?"},{"cn":"我二十岁。","pinyin":"Wǒ èrshí suì.","en":"I am twenty years old."},{"cn":"他的女儿三岁了。","pinyin":"Tā de nǚér sān suì le.","en":"His daughter is three years old."}]},"c:他":{"radicals":[{"char":"亻","pinyin":"rén","meaning":"person","role":"left — the person radical"},{"char":"也","pinyin":"yě","meaning":"also/too/likewise","role":"right — another one, one more; phonetic and semantic"}],"etymology":"他 = person (亻) + also/another (也) = another person = he/him. The 也 component suggests 'additionally, one more' — another person beyond yourself. Compare the trio: 我 (I, first person), 你 (you, second person), 他 (he — the 'also a person' over there, third person). All three have person-related components.","memory_tip":"亻 (person) + 也 (also/another) = another person = 他 = he/him. There's ME (我), YOU (你), and HE (他) — the 'also a person' over there. The three pronouns: 我 (I), 你 (you), 他/她/它 (he/she/it). Compare: 他 (he, person radical 亻), 她 (she, female radical 女), 它 (it, different component). Same 也, different radical.","examples":[{"cn":"他是我的朋友。","pinyin":"Tā shì wǒ de péngyou.","en":"He is my friend."},{"cn":"他在哪儿？","pinyin":"Tā zài nǎr?","en":"Where is he?"},{"cn":"他叫什么名字？","pinyin":"Tā jiào shénme míngzi?","en":"What is his name?"}]},"c:她":{"radicals":[{"char":"女","pinyin":"nǚ","meaning":"woman/female","role":"left — the female radical"},{"char":"也","pinyin":"yě","meaning":"also/too","role":"right — another person; same phonetic as in 他 (he)"}],"etymology":"她 = female (女) + also (也) = another female person = she/her. This character was invented in the early 20th century by Chinese linguists who needed a feminine third-person pronoun to translate Western literature accurately. Before 她 existed (created around 1917-1920), 他 served all genders. It is one of the newest characters in common use.","memory_tip":"女 (female) + 也 (also/another) = 她 = she/her. 她 is only about 100 years old! Compare: 他 (he) = 亻person + 也; 她 (she) = 女woman + 也. Same right side (也), different radical: person (亻) = male, woman (女) = female. New character, ancient components. 她是我的妈妈 = She is my mom.","examples":[{"cn":"她是我的同学。","pinyin":"Tā shì wǒ de tóngxué.","en":"She is my classmate."},{"cn":"她叫什么名字？","pinyin":"Tā jiào shénme míngzi?","en":"What is her name?"},{"cn":"她在家吗？","pinyin":"Tā zài jiā ma?","en":"Is she at home?"}]},"c:太":{"radicals":[{"char":"大","pinyin":"dà","meaning":"big/great","role":"the base — a person with arms spread wide"},{"char":"丶","pinyin":"zhǔ","meaning":"dot","role":"a single dot below the arm — pushing beyond the limit"}],"etymology":"太 = 大 (big, person with arms spread) + an extra dot pushing it further = beyond big = too much, extremely! The dot is brilliant: it takes the already-maximum 大 and signals 'even more than this'. It's a graphic intensifier: big + tipping-point = 太 (too/so/extremely). The dot is the overflow marker.","memory_tip":"太 = 大 (big) with an extra dot pushing it OVER the top! Big + push-beyond = TOO much, EXTREMELY so. 太好了！= So good it's almost too good! 太多了 = way too many. The dot is the 'exceeds the limit' signal. Pattern: 太 + adjective + 了 = 'so [adjective]!' 太漂亮了！太好吃了！太贵了！The dot tipped the scale.","examples":[{"cn":"太好了！","pinyin":"Tài hǎo le!","en":"Excellent! So great!"},{"cn":"这个太贵了。","pinyin":"Zhège tài guì le.","en":"This is too expensive."},{"cn":"你说得太快了。","pinyin":"Nǐ shuō de tài kuài le.","en":"You speak too fast."}]},"c:天气":{"radicals":[{"char":"天","pinyin":"tiān","meaning":"sky/heaven/day","role":"the sky above — weather comes from the sky"},{"char":"气","pinyin":"qì","meaning":"air/energy/vapor","role":"steam rising (原义) → air, atmosphere, energy, vital force"}],"etymology":"天 (sky) + 气 (air/vapor/energy) = sky-air = weather! 气 originally depicted steam rising from cooked rice — vapor, breath, vital energy. The atmosphere is literally the air of the sky. 气 is also central to Chinese philosophy and medicine as 'qi' — the vital life force. Weather is the sky's energy expressing itself.","memory_tip":"天 (sky) + 气 (air/vapor) = sky-air = weather! 气 is EVERYWHERE in Chinese: 天气 (weather = sky-air), 生气 (angry = living-energy burst), 力气 (strength = force-energy), 空气 (oxygen = empty-air). And in Chinese medicine: your 气 flows through meridians. Weather is just the sky's 气 at work.","examples":[{"cn":"今天天气怎么样？","pinyin":"Jīntiān tiānqì zěnmeyàng?","en":"What's the weather like today?"},{"cn":"北京的天气很好。","pinyin":"Běijīng de tiānqì hěn hǎo.","en":"Beijing's weather is very good."},{"cn":"天气太冷了。","pinyin":"Tiānqì tài lěng le.","en":"The weather is too cold."}]},"c:听":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"left — the mouth, listening involves responding"},{"char":"斤","pinyin":"jīn","meaning":"axe/catty weight","role":"right — phonetic, provides the tīng sound"}],"etymology":"听 (simplified from 聽) carries the mouth radical — because true listening is interactive. The full traditional character 聽 was rich: an ear (耳), eyes (目), heart (心), and standing straight (王) — listening with your whole body and being. The simplification loses this depth but the spirit remains: listening is an active, full-bodied act.","memory_tip":"Simplified 听 = mouth + axe-sound. But remember the original 聽 = ear + eyes + heart + upright posture = TRUE listening uses EVERYTHING! When you 听, you're not just passively hearing — you're fully present. 听音乐 = listen to music (give it your ears, eyes, heart). Chinese listening is an art. 你听我说！= Listen to me!","examples":[{"cn":"我喜欢听音乐。","pinyin":"Wǒ xǐhuān tīng yīnyuè.","en":"I like listening to music."},{"cn":"请听我说。","pinyin":"Qǐng tīng wǒ shuō.","en":"Please listen to me."},{"cn":"我听不懂。","pinyin":"Wǒ tīng bù dǒng.","en":"I can't understand (by listening)."}]},"c:同学":{"radicals":[{"char":"同","pinyin":"tóng","meaning":"same/together","role":"enclosed space (冂) + one mouth (口) — one voice in a shared space"},{"char":"学","pinyin":"xué","meaning":"study/learn","role":"hands passing knowledge (爻) to child (子) under roof (宀) — school learning"}],"etymology":"同 shows an enclosure (冂) with a single mouth (口) inside — one voice in a shared space = same, together, unified. 学 depicts hands passing down knowledge to a child under a roof — school learning. 同学 = people studying the same thing together = classmate/schoolmate. You share the same (同) learning (学).","memory_tip":"同 (same shared space) + 学 (studying under a roof) = classmate! You and your 同学 are in the SAME (同) place learning (学) together. Pattern: 同 + context = person sharing that context. 同事 = colleague (same work), 同学 (same study), 同屋 = roommate (same room). 同 is the bonding word of shared experience.","examples":[{"cn":"他是我的同学。","pinyin":"Tā shì wǒ de tóngxué.","en":"He is my classmate."},{"cn":"我和同学一起学习。","pinyin":"Wǒ hé tóngxué yīqǐ xuéxí.","en":"I study together with my classmates."},{"cn":"你有几个同学？","pinyin":"Nǐ yǒu jǐ gè tóngxué?","en":"How many classmates do you have?"}]},"c:喂":{"radicals":[{"char":"口","pinyin":"kǒu","meaning":"mouth","role":"left — a mouth calling out"},{"char":"畏","pinyin":"wèi","meaning":"fear/awe","role":"right — phonetic component, provides the wèi sound"}],"etymology":"喂 has the mouth radical (口) indicating it is a purely vocal exclamation. The right side 畏 (fear/awe) is phonetic only. 喂 serves as 'hello?' on the phone (where you can't see the caller) and as 'hey!' to get someone's attention. The mouth calling into the unknown — that is 喂.","memory_tip":"Mouth (口) calling out into the unknown: 喂！It's the phone greeting (you can't see who's there) and the attention-getter (hey, you!). 喂？= Hello? (phone). 喂！= Hey! (in person). In Chinese phone etiquette, always answer with 喂 — it's equivalent to 'hello?' The mouth calling blind = 喂.","examples":[{"cn":"喂，你好！","pinyin":"Wèi, nǐ hǎo!","en":"Hello? (on the phone)"},{"cn":"喂，请等一下！","pinyin":"Wèi, qǐng děng yīxià!","en":"Hey, please wait a moment!"},{"cn":"喂，你在吗？","pinyin":"Wèi, nǐ zài ma?","en":"Hello, are you there?"}]},"c:我":{"radicals":[{"char":"手","pinyin":"shǒu","meaning":"hand","role":"left component — a hand, agency and self-expression"},{"char":"戈","pinyin":"gē","meaning":"spear/halberd","role":"right — a spear or weapon, marking territory and asserting self"}],"etymology":"我 originally depicted a hand holding a weapon or halberd — a warrior claiming their territory, asserting their self. Hand (agency) + weapon (assertion) = the self. Ancient Chinese identity was tied to what one held and claimed. The character embodies the bold self-assertion: this space is mine; I am here.","memory_tip":"我 = hand (手) + spear (戈) = a warrior claiming: THIS IS ME! Imagine pointing a spear at yourself — bold, assertive self-declaration. 我 is the most confident 'I' imaginable. Compare to the gentle 你 (you) and 他 (he). 我 plants a flag and says: I exist, I claim, I AM. 我是学生 = I am a student (warrior-claim).","examples":[{"cn":"我是学生。","pinyin":"Wǒ shì xuésheng.","en":"I am a student."},{"cn":"我叫张明。","pinyin":"Wǒ jiào Zhāng Míng.","en":"My name is Zhang Ming."},{"cn":"我爱你。","pinyin":"Wǒ ài nǐ.","en":"I love you."}]},"c:我们":{"radicals":[{"char":"我","pinyin":"wǒ","meaning":"I/me","role":"the assertive self — hand + spear"},{"char":"们","pinyin":"men","meaning":"(plural suffix for people)","role":"person radical (亻) + gate/door (门) — many people at the entrance"}],"etymology":"们 is a plural suffix combining the person radical (亻) with 门 (gate/door) — many people gathered at the gate, a crowd of individuals. Add 们 to any personal pronoun or person-noun to make it plural: 我们 (we), 你们 (you all), 他们/她们 (they). 们 = people crowding at a door = the plural party.","memory_tip":"我 (I) + 们 (people at the door = plural) = 我们 (we/us)! 们 is the crowd-suffix: 你 → 你们 (y'all), 他/她 → 他们/她们 (they), 同学 → 同学们 (classmates). Picture people crowding at a gate (们) — that crowd is the plural! 门 = door; 亻 = person; 们 = bunch of people gathering. 我们是朋友！","examples":[{"cn":"我们是朋友。","pinyin":"Wǒmen shì péngyou.","en":"We are friends."},{"cn":"我们一起去吧。","pinyin":"Wǒmen yīqǐ qù ba.","en":"Let's go together."},{"cn":"我们都喜欢学汉语。","pinyin":"Wǒmen dōu xǐhuān xué Hànyǔ.","en":"We all like studying Chinese."}]},"c:五":{"radicals":[{"char":"五","pinyin":"wǔ","meaning":"five","role":"two horizontal lines (sky and earth) with a crossing element — the center of all things"}],"etymology":"五 shows two horizontal lines (天 sky above, 地 earth below) with an X-shaped crossing element between — the intersection point of all directions and realms. Five was cosmologically central: the Five Elements (wood, fire, earth, metal, water), Five Directions (N, S, E, W, center), Five Relationships. Five is the number of balance and the center.","memory_tip":"五 = sky-line + earth-line + crossing element = the CENTER where everything meets. Five is the central number in Chinese cosmology: 五行 (Five Elements), 五方 (Five Directions with center), 五脏 (Five Organs). When you write 五, you're drawing the cosmic intersection. 五点 = 5 o'clock = the balanced hour!","examples":[{"cn":"我有五本书。","pinyin":"Wǒ yǒu wǔ běn shū.","en":"I have five books."},{"cn":"他五岁了。","pinyin":"Tā wǔ suì le.","en":"He is five years old."},{"cn":"五月天气很好。","pinyin":"Wǔ yuè tiānqì hěn hǎo.","en":"May has very good weather."}]},"c:下":{"radicals":[{"char":"下","pinyin":"xià","meaning":"below/down/under","role":"the whole character — a short stroke hanging BELOW a base line"}],"etymology":"下 is the visual mirror of 上 (up): a short stroke hanging below the baseline = down, under, below. Together 上下 spans the vertical axis. 下 extends into many compounds: 下班 (get off work = go down from work), 下课 (end of class), 下雨 (rain = water coming down), 下午 (afternoon = after/below noon).","memory_tip":"下 = tiny stroke BELOW the base line = down/under. Mirror of 上 (stroke on top). 上下 = up and down = the whole vertical range. 下 is the direction of: rain (下雨), getting off work (下班), going downstairs (下楼), and afternoon (下午, after the noon peak). Gravity's direction = 下. Everything falling = 下!","examples":[{"cn":"猫在桌子下面。","pinyin":"Māo zài zhuōzi xiàmiàn.","en":"The cat is under the table."},{"cn":"他下楼来了。","pinyin":"Tā xià lóu lái le.","en":"He came downstairs."},{"cn":"今天下午你有空吗？","pinyin":"Jīntiān xiàwǔ nǐ yǒu kòng ma?","en":"Are you free this afternoon?"}]},"c:下午":{"radicals":[{"char":"下","pinyin":"xià","meaning":"below/after","role":"downward — the descending half of the day"},{"char":"午","pinyin":"wǔ","meaning":"noon","role":"the gnomon at its peak — the midday turning point"}],"etymology":"下 (below/after) + 午 (noon) = after noon = afternoon. Noon (午) is the day's peak — the highest point of the sun's arc. 下午 = the sun's descent from peak to horizon. The logic is elegant and physical: the day is a mountain, and 下午 is the downhill slope. 上午 (morning) is the uphill climb; 下午 (afternoon) is the descent.","memory_tip":"下 (down/after) + 午 (noon) = afternoon! Noon is the day's peak: 上午 is climbing UP to it (morning), 下午 is going DOWN from it (afternoon). 下午好！= Good afternoon! (Good descending-sun!). 下午两点 = 2 PM (two o'clock in the descending-sun period). Feel the day's arc: up, peak, down.","examples":[{"cn":"下午我去商店。","pinyin":"Xiàwǔ wǒ qù shāngdiàn.","en":"I'm going to the shop in the afternoon."},{"cn":"下午两点见。","pinyin":"Xiàwǔ liǎng diǎn jiàn.","en":"See you at 2 PM."},{"cn":"他下午在家。","pinyin":"Tā xiàwǔ zài jiā.","en":"He is at home in the afternoon."}]},"c:下雨":{"radicals":[{"char":"下","pinyin":"xià","meaning":"fall/come down","role":"downward motion — precipitation descending"},{"char":"雨","pinyin":"yǔ","meaning":"rain","role":"sky-line + cloud-line + rain-dots falling — a complete rain diagram"}],"etymology":"下 (fall/descend) + 雨 (rain) = rain falls = it rains. 雨 is a beautiful pictograph: top horizontal stroke = sky, second stroke = clouds, and four dots = raindrops falling. Every element of rain is in the character. Combined with 下 (coming down), you have the complete action: water descending from clouds.","memory_tip":"下 (down) + 雨 (rain pictograph) = it rains! Look at 雨: top line = sky, second line = clouds, four dots = raindrops. It's a weather diagram! 下雨了 = it started raining (了 = change of state). 下雪 = snow (snowing = snow falls down). 下冰雹 = hail. The 下 + weather compound = precipitation!","examples":[{"cn":"今天下雨了。","pinyin":"Jīntiān xià yǔ le.","en":"It rained today."},{"cn":"明天会下雨吗？","pinyin":"Míngtiān huì xià yǔ ma?","en":"Will it rain tomorrow?"},{"cn":"下雨了，带伞了吗？","pinyin":"Xià yǔ le, dài sǎn le ma?","en":"It's raining — did you bring an umbrella?"}]},"c:先生":{"radicals":[{"char":"先","pinyin":"xiān","meaning":"first/before/lead","role":"person walking ahead (儿 legs) + one who goes first (先)"},{"char":"生","pinyin":"shēng","meaning":"life/birth/grow/raw","role":"a plant (屮) sprouting from earth (土) — new life emerging"}],"etymology":"先 depicts someone going ahead first — leading the way. 生 shows a plant sprouting from earth — new life, fresh, raw. 先生 = one who goes ahead in life = a man of experience, a teacher, mister. Originally an honorific for elders and teachers (those who'd 'gone before' in life), it became the general polite address for men and also means husband in modern usage.","memory_tip":"先 (going first/ahead) + 生 (life/growing) = one who went ahead in life = mister/teacher/husband! Like 'sir' (from 'senior' = older/before). 王先生 = Mr. Wang. 先生，你好！= Hello, sir! Also: 她的先生 = her husband (the man who goes ahead of her? — a traditional metaphor). 先 also gives us: 先…然后 (first…then).","examples":[{"cn":"王先生，你好！","pinyin":"Wáng xiānsheng, nǐ hǎo!","en":"Hello, Mr. Wang!"},{"cn":"这位先生叫什么名字？","pinyin":"Zhè wèi xiānsheng jiào shénme míngzi?","en":"What is this gentleman's name?"},{"cn":"她的先生是医生。","pinyin":"Tā de xiānsheng shì yīshēng.","en":"Her husband is a doctor."}]},"c:现在":{"radicals":[{"char":"现","pinyin":"xiàn","meaning":"appear/present/now","role":"jade (王) + see (见) — something valuable becoming visible"},{"char":"在","pinyin":"zài","meaning":"be at/exist","role":"earth (土) + sprouting (才) — being rooted and present in a place"}],"etymology":"现 combines jade (王/玉) with seeing (见) — something precious becoming visible, appearing in the present. 在 has earth (土) with a sprouting plant (才) — being rooted in a specific place. 现在 = valuable things appearing + being rooted here = NOW. The present is when precious things become visible to you as you stand rooted in your place.","memory_tip":"现 = jade (王) becoming visible (见) = appearing = present tense. 在 = plant rooted in earth = being here. Appearing + being-here = 现在 = NOW! The present moment: when valuable things reveal themselves to you as you stand in your place. 现在几点？= What time is it now? (When are things appearing?)","examples":[{"cn":"现在几点？","pinyin":"Xiànzài jǐ diǎn?","en":"What time is it now?"},{"cn":"我现在在家。","pinyin":"Wǒ xiànzài zài jiā.","en":"I am at home now."},{"cn":"你现在有空吗？","pinyin":"Nǐ xiànzài yǒu kòng ma?","en":"Are you free now?"}]},"c:想":{"radicals":[{"char":"相","pinyin":"xiāng","meaning":"mutually/appearance","role":"tree (木) + eye (目) = looking at a tree, mutual observation, appearance"},{"char":"心","pinyin":"xīn","meaning":"heart/mind","role":"bottom — three drops forming a heart shape"}],"etymology":"想 has 相 (mutual looking, outward appearance) above 心 (heart/mind) — what your heart looks at internally, what your mind contemplates. The character captures the Chinese philosophical view that thinking (想) is the heart seeing things. Your heart gazes at something = you desire it, think about it, or miss it.","memory_tip":"相 (looking at something) ON TOP OF 心 (heart) = what your heart gazes at = thinking/wanting/missing! In Chinese philosophy, the heart (心) is the seat of both emotion AND thought. 想 = your heart's vision. 我想你 = I miss you (my heart looks for you). 你想什么？= What are you thinking? (What is your heart seeing?)","examples":[{"cn":"我想去北京。","pinyin":"Wǒ xiǎng qù Běijīng.","en":"I want to go to Beijing."},{"cn":"你在想什么？","pinyin":"Nǐ zài xiǎng shénme?","en":"What are you thinking about?"},{"cn":"我想妈妈了。","pinyin":"Wǒ xiǎng māma le.","en":"I miss my mom."}]},"c:小":{"radicals":[{"char":"小","pinyin":"xiǎo","meaning":"small/little","role":"the whole character — a central point with two tiny flanking strokes, contracting inward"}],"etymology":"小 depicts something contracting — a central dot or stroke with two small marks pulling inward toward the center. Compare with 大 (spread wide = big): 小 is the opposite, drawing inward. As a prefix, 小 indicates smallness, youth, or endearment: 小朋友 (little friend), 小姐 (young lady), 小心 (careful = small-hearted = attentive).","memory_tip":"小 = three strokes pulling inward = small! Compare: 大 (arms wide = big) vs 小 (pinching fingers together = small). 大小 = size (big-small). 小 as prefix: 小朋友 (little friend), 小姐 (miss), 小心 (careful!), 小时 (hour = small-time). 小心！is the universal Chinese warning: be careful (small your heart = be attentive)!","examples":[{"cn":"这个苹果很小。","pinyin":"Zhège píngguǒ hěn xiǎo.","en":"This apple is very small."},{"cn":"我的猫很小。","pinyin":"Wǒ de māo hěn xiǎo.","en":"My cat is very small."},{"cn":"小心！","pinyin":"Xiǎoxīn!","en":"Be careful! (lit. small heart = be attentive)"}]},"c:小姐":{"radicals":[{"char":"小","pinyin":"xiǎo","meaning":"small/young","role":"young, diminutive — a young person"},{"char":"姐","pinyin":"jiě","meaning":"older sister","role":"female radical (女) + elder (且) — a female elder"}],"etymology":"小 (small/young) + 姐 (older sister) = young lady / miss. 姐 has the female radical (女) with 且 (moreover/elder) — an older female = sister. Usage has evolved in mainland China: in some contexts 小姐 now carries informal connotations, so 女士 (madam/Ms.) is increasingly preferred in formal settings. Taiwan and Hong Kong still use 小姐 comfortably.","memory_tip":"小 (young) + 姐 (female elder/sister) = young lady / miss! 姐 = 女 (female) + 且 (elder). The female radical (女) family: 妈 (mom), 姐 (older sister), 妹 (younger sister), 女儿 (daughter), 奶奶 (grandma). All have 女. 小姐，请问… = Excuse me, miss… A polite opener that works in most contexts.","examples":[{"cn":"请问小姐，厕所在哪儿？","pinyin":"Qǐngwèn xiǎojie, cèsuǒ zài nǎr?","en":"Excuse me miss, where is the bathroom?"},{"cn":"这位小姐叫什么名字？","pinyin":"Zhè wèi xiǎojie jiào shénme míngzi?","en":"What is this young lady's name?"},{"cn":"小姐，这个多少钱？","pinyin":"Xiǎojie, zhège duōshao qián?","en":"Miss, how much is this?"}]},"c:些":{"radicals":[{"char":"此","pinyin":"cǐ","meaning":"this/here","role":"left — 'this', indicating proximity and specificity"},{"char":"二","pinyin":"èr","meaning":"two (small marks)","role":"top — indicating a small plurality or amount"}],"etymology":"些 has 此 (this, here) with two small marks (二) on top — a small amount of 'this', some of what's right here. 一些 = a few, some — not many, just a modest, indefinite quantity. It is vaguer and softer than specific numbers. 一些 = some, 这些 = these, 那些 = those.","memory_tip":"些 = 此 (this) with small marks on top = some/a few of these things. 一些 = a few (one-some). 这些 = these (these-some). 那些 = those (those-some). Use 些 for modest, vague quantities: 一些水果 (some fruit), 一些问题 (some questions). More than one, fewer than many — the comfortable middle ground of 些.","examples":[{"cn":"我买了一些水果。","pinyin":"Wǒ mǎi le yīxiē shuǐguǒ.","en":"I bought some fruit."},{"cn":"给我一些水。","pinyin":"Gěi wǒ yīxiē shuǐ.","en":"Give me some water."},{"cn":"这些是我的书。","pinyin":"Zhèxiē shì wǒ de shū.","en":"These are my books."}]},"c:写":{"radicals":[{"char":"宀","pinyin":"mián","meaning":"roof/cover","role":"top — a roof or covering, protection, the school setting"},{"char":"与","pinyin":"yǔ","meaning":"give/and","role":"lower part — giving, transferring, passing something on"}],"etymology":"写 (simplified from 寫) depicts giving or transferring under a roof — writing is the act of transferring thoughts onto a surface in a sheltered setting (home, school). The traditional form was more complex, showing birds perching (imagery of brush strokes). The simplified form retains the sense of covered, sheltered transference of ideas.","memory_tip":"写 = putting thoughts down under cover = writing! A roof (宀) over giving (与) = sheltered transfer of mind to page. Writing is giving your thoughts a permanent home. 写字 = write characters, 写信 = write a letter, 写作 = writing (as an art). Give your ideas a roof — write them down! 请写你的名字！","examples":[{"cn":"请写你的名字。","pinyin":"Qǐng xiě nǐ de míngzi.","en":"Please write your name."},{"cn":"他在写汉字。","pinyin":"Tā zài xiě Hànzì.","en":"He is writing Chinese characters."},{"cn":"你会写这个字吗？","pinyin":"Nǐ huì xiě zhège zì ma?","en":"Can you write this character?"}]},"c:谢谢":{"radicals":[{"char":"讠","pinyin":"yán","meaning":"speech","role":"left of 谢 — words of thanks are spoken words"},{"char":"射","pinyin":"shè","meaning":"shoot/emit","role":"right of 谢 — sending out, projecting; shooting thanks toward someone"}],"etymology":"谢 has the speech radical (讠) with 射 (shoot/emit) — sending out words of thanks, projecting gratitude. Reduplicated as 谢谢 (like 'thank you, thank you'), the thanks is doubled and softened — warmer, more natural. Repetition in Chinese adds warmth and naturalness, the way English speakers say 'thanks thanks!'","memory_tip":"讠 (speech) + 射 (shoot outward) = shooting out words of thanks = 谢! Say it twice: 谢谢！Shoot your gratitude like an arrow straight to someone's heart. The speech radical says: thanks is words; the shooting motion says: send those words out with force. 非常谢谢 = extremely thank you. The double-shot of gratitude!","examples":[{"cn":"谢谢你帮我。","pinyin":"Xièxie nǐ bāng wǒ.","en":"Thank you for helping me."},{"cn":"谢谢！不客气！","pinyin":"Xièxie! Bú kèqi!","en":"Thank you! You're welcome!"},{"cn":"非常谢谢你。","pinyin":"Fēicháng xièxie nǐ.","en":"Thank you very much."}]},"c:星期":{"radicals":[{"char":"星","pinyin":"xīng","meaning":"star/celestial body","role":"sun (日) + born (生) — things born from the sun's family, the stars"},{"char":"期","pinyin":"qī","meaning":"period/term/cycle","role":"moon (月) + vessel — lunar cycles, periods of time"}],"etymology":"星 = sun (日) + born (生) = born of the sun = stars (little suns). 期 = moon (月) + a vessel suggesting cycles — lunar periods. The seven days are named after the seven classical celestial bodies: 日 (sun), 月 (moon), 火 (Mars), 水 (Mercury), 木 (Jupiter), 金 (Venus), 土 (Saturn). 星期 = celestial cycle = week.","memory_tip":"星 (star/celestial) + 期 (cycle) = celestial cycle = week! The 7 days are named after 7 planets: 星期日 (Sunday/sun), 星期一 (Monday/moon), 星期二 (Tuesday/Mars/火), 星期三 (Wednesday/Mercury/水), 星期四 (Thursday/Jupiter/木), 星期五 (Friday/Venus/金), 星期六 (Saturday/Saturn/土). Astronomy in your calendar!","examples":[{"cn":"今天星期几？","pinyin":"Jīntiān xīngqī jǐ?","en":"What day of the week is today?"},{"cn":"我星期一上课。","pinyin":"Wǒ xīngqīyī shàng kè.","en":"I have class on Monday."},{"cn":"星期六我不工作。","pinyin":"Xīngqīliù wǒ bù gōngzuò.","en":"I don't work on Saturday."}]},"c:学生":{"radicals":[{"char":"学","pinyin":"xué","meaning":"study/learn","role":"hands (爻) passing knowledge to child (子) under a roof (宀/冖) — school learning"},{"char":"生","pinyin":"shēng","meaning":"life/birth/raw","role":"plant (屮) sprouting from earth (土) — fresh, new, raw, growing"}],"etymology":"学 depicts education: hands passing down knowledge to a child under a school roof. 生 shows a plant just sprouting from earth — new life, raw, fresh. 学生 = learner + fresh/raw = student. A student is like a new sprout: full of potential, tender, still growing, and hungry for light. The character pair is poetic.","memory_tip":"学 (receiving knowledge under a roof) + 生 (sprouting fresh from earth) = student = a fresh sprout of learning! You're a 学生 — a green seedling of knowledge. 小学生 = elementary student (small-study-fresh-sprout). 大学生 = university student (big-study-sprout). Keep growing! 学生好！= Hello students!","examples":[{"cn":"我是大学生。","pinyin":"Wǒ shì dàxuésheng.","en":"I am a university student."},{"cn":"学生们在学习。","pinyin":"Xuéshengmen zài xuéxí.","en":"The students are studying."},{"cn":"你是学生吗？","pinyin":"Nǐ shì xuésheng ma?","en":"Are you a student?"}]},"c:学习":{"radicals":[{"char":"学","pinyin":"xué","meaning":"study/learn","role":"hands passing knowledge to child under roof — receiving instruction"},{"char":"习","pinyin":"xí","meaning":"practice/habit","role":"a young bird (羽 wings) repeatedly practicing flight — repetition builds mastery"}],"etymology":"学 = receiving instruction. 习 (simplified from 習) depicts a young bird repeatedly flapping its wings — practicing flight over and over until it becomes instinctive. 习 means to practice, to repeat until it becomes habit or second nature. 学习 = receive knowledge + practice = study/learn. Both halves are necessary.","memory_tip":"学 (receive teaching) + 习 (flap wings like a learning bird) = study/learn! A baby bird doesn't learn to fly from one lesson — it flaps and flaps (习) until the skill is mastered. 学 is the teacher's lesson; 习 is your repeated practice. 学而时习之 (Confucius: 'Learn and practice it constantly') — 学习 in one ancient phrase!","examples":[{"cn":"我每天学习汉语。","pinyin":"Wǒ měitiān xuéxí Hànyǔ.","en":"I study Chinese every day."},{"cn":"学习很重要。","pinyin":"Xuéxí hěn zhòngyào.","en":"Studying is very important."},{"cn":"他喜欢学习。","pinyin":"Tā xǐhuān xuéxí.","en":"He likes to study."}]},"c:学校":{"radicals":[{"char":"学","pinyin":"xué","meaning":"study/learn","role":"hands teaching child under a roof — learning in a school"},{"char":"校","pinyin":"xiào","meaning":"school/compare/align","role":"wood (木) + intersect/exchange (交) — a wooden building where paths and knowledge cross"}],"etymology":"学 = learning under a roof. 校 has wood (木) — traditional school buildings were wooden — with 交 (crossroads, exchange, intersection) suggesting a place where people cross paths to exchange knowledge. 学校 = learning + knowledge-crossroads = school. The wood radical also evokes the bamboo slips once used for writing and teaching.","memory_tip":"学 (study) + 校 (wooden crossroads of knowledge) = school! 校 = 木 (wooden building) + 交 (cross/exchange) = where paths and ideas intersect. Schools are crossroads: students cross paths, ideas intersect, knowledge is exchanged. 上学校 = go to school (go to the learning-crossroads). 学校大吗？= Is your school big?","examples":[{"cn":"我的学校很大。","pinyin":"Wǒ de xuéxiào hěn dà.","en":"My school is very big."},{"cn":"学校在哪儿？","pinyin":"Xuéxiào zài nǎr?","en":"Where is the school?"},{"cn":"我每天去学校。","pinyin":"Wǒ měitiān qù xuéxiào.","en":"I go to school every day."}]},"c:一":{"radicals":[{"char":"一","pinyin":"yī","meaning":"one","role":"the whole character — a single horizontal stroke, the most fundamental mark"}],"etymology":"一 is the most fundamental character in Chinese: a single horizontal line = one. All numbers and countless compound words begin here. In Chinese philosophy (Tao Te Ching): 'The Tao produces one; one produces two; two produces three; three produces the ten thousand things.' The simplest stroke contains the seed of everything.","memory_tip":"A single line = 一 = one. THE most fundamental character — everything in Chinese counting starts here. Philosophically: the Tao produced 一 (one unity), which split into 二 (two opposites), giving rise to 三 (three powers: heaven/earth/human), from which all things emerged. Write one stroke and you've written the origin of the universe.","examples":[{"cn":"我有一本书。","pinyin":"Wǒ yǒu yī běn shū.","en":"I have one book."},{"cn":"一加一等于二。","pinyin":"Yī jiā yī děngyú èr.","en":"One plus one equals two."},{"cn":"一月很冷。","pinyin":"Yī yuè hěn lěng.","en":"January is very cold."}]},"c:一点儿":{"radicals":[{"char":"一","pinyin":"yī","meaning":"one","role":"one, a single"},{"char":"点","pinyin":"diǎn","meaning":"dot/point/small amount","role":"four fire-dots (灬) at bottom — a small precise amount"},{"char":"儿","pinyin":"ér","meaning":"erhua suffix","role":"Beijing dialect 'r' curl — adds colloquial softness"}],"etymology":"一 (one) + 点 (dot, small amount) + 儿 (Beijing 'r' suffix) = one tiny dot = a little bit. The 儿 suffix is characteristic northern Mandarin pronunciation that softens and makes expressions more colloquial. 一点儿 is among the most useful beginner phrases: 请说慢一点儿 (please speak a little slower), 我想喝一点儿茶 (I'd like a little tea).","memory_tip":"One (一) tiny dot (点) with a Beijing curl (儿) = 一点儿 = a little bit! One tiny drop. Use it constantly: 一点儿水 (a little water), 说慢一点儿 (speak a little slower), 等一点儿 (wait a bit). It's your politeness modifier! 你能说慢一点儿吗？= Can you speak a little slower? Essential for every language learner.","examples":[{"cn":"请说慢一点儿。","pinyin":"Qǐng shuō màn yīdiǎnr.","en":"Please speak a little slower."},{"cn":"我想喝一点儿茶。","pinyin":"Wǒ xiǎng hē yīdiǎnr chá.","en":"I'd like a little tea."},{"cn":"再等一点儿。","pinyin":"Zài děng yīdiǎnr.","en":"Wait just a little bit more."}]},"c:衣服":{"radicals":[{"char":"衣","pinyin":"yī","meaning":"garment/clothing","role":"a pictograph of a garment with collar at top and sleeves spreading out"},{"char":"服","pinyin":"fú","meaning":"wear/serve/submit","role":"person (亻) + body-action — a person putting on or wearing something"}],"etymology":"衣 is a beautiful pictograph: the top shows the collar, the body in the middle, and two sleeve-wings extending outward — a garment hanging and spread open. As the clothing radical (衤), it appears in fabric and clothing words. 服 has the person radical suggesting wearing/serving. 衣服 = garment + wearing = clothes.","memory_tip":"衣 literally shows a garment: collar (亠) at top, body in the middle, sleeves spreading wide — like clothes on a hanger! The clothing radical (衤) appears in: 被 (quilt), 袜 (socks), 裤 (pants), 裙 (skirt), 袖 (sleeve). Whenever you see 衤 on the left, fabric or clothing is invo
